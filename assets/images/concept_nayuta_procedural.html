<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nayuta — 程序化概念图</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.7.0/p5.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&family=Lora:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --abyss-blue: #0A0E1A;
            --nebula-purple: #1A1035;
            --fluorescent-cyan: #00FFD4;
            --void-orange: #FF6B35;
            --moonlight-white: #E8E6F0;
            --stardust-gray: #6B6B8D;
            --deep-purple: #2D1B69;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--abyss-blue);
            min-height: 100vh;
            color: var(--moonlight-white);
        }

        .container {
            display: flex;
            min-height: 100vh;
            padding: 20px;
            gap: 20px;
        }

        .sidebar {
            width: 300px;
            flex-shrink: 0;
            background: rgba(26, 16, 53, 0.95);
            backdrop-filter: blur(10px);
            padding: 24px;
            border-radius: 12px;
            border: 1px solid rgba(0, 255, 212, 0.08);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            overflow-y: auto;
            overflow-x: hidden;
        }

        .sidebar h1 {
            font-family: 'Lora', serif;
            font-size: 22px;
            font-weight: 500;
            color: var(--fluorescent-cyan);
            margin-bottom: 4px;
            letter-spacing: 2px;
        }

        .sidebar .subtitle {
            color: var(--stardust-gray);
            font-size: 13px;
            margin-bottom: 28px;
            line-height: 1.5;
        }

        .control-section {
            margin-bottom: 28px;
        }

        .control-section h3 {
            font-size: 13px;
            font-weight: 600;
            color: var(--moonlight-white);
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .control-section h3::before {
            content: '';
            width: 6px;
            height: 6px;
            background: var(--fluorescent-cyan);
            border-radius: 50%;
            box-shadow: 0 0 6px var(--fluorescent-cyan);
        }

        .seed-input {
            width: 100%;
            background: var(--abyss-blue);
            padding: 10px;
            border-radius: 6px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            margin-bottom: 10px;
            border: 1px solid rgba(0, 255, 212, 0.15);
            text-align: center;
            color: var(--moonlight-white);
        }

        .seed-input:focus {
            outline: none;
            border-color: var(--fluorescent-cyan);
            box-shadow: 0 0 0 2px rgba(0, 255, 212, 0.15);
        }

        .seed-controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
            margin-bottom: 6px;
        }

        .regen-button {
            margin-bottom: 0;
        }

        .control-group {
            margin-bottom: 18px;
        }

        .control-group label {
            display: block;
            font-size: 12px;
            font-weight: 500;
            color: var(--stardust-gray);
            margin-bottom: 6px;
            letter-spacing: 0.5px;
        }

        .slider-container {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .slider-container input[type="range"] {
            flex: 1;
            height: 3px;
            background: rgba(107, 107, 141, 0.3);
            border-radius: 2px;
            outline: none;
            -webkit-appearance: none;
        }

        .slider-container input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 14px;
            height: 14px;
            background: var(--fluorescent-cyan);
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 8px rgba(0, 255, 212, 0.4);
            transition: all 0.2s ease;
        }

        .slider-container input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.15);
            box-shadow: 0 0 12px rgba(0, 255, 212, 0.6);
        }

        .slider-container input[type="range"]::-moz-range-thumb {
            width: 14px;
            height: 14px;
            background: var(--fluorescent-cyan);
            border-radius: 50%;
            border: none;
            cursor: pointer;
            box-shadow: 0 0 8px rgba(0, 255, 212, 0.4);
        }

        .value-display {
            font-family: 'Courier New', monospace;
            font-size: 11px;
            color: var(--fluorescent-cyan);
            min-width: 40px;
            text-align: right;
        }

        .button {
            background: rgba(0, 255, 212, 0.12);
            color: var(--fluorescent-cyan);
            border: 1px solid rgba(0, 255, 212, 0.25);
            padding: 9px 14px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            width: 100%;
            font-family: 'Poppins', sans-serif;
        }

        .button:hover {
            background: rgba(0, 255, 212, 0.2);
            border-color: rgba(0, 255, 212, 0.5);
            box-shadow: 0 0 12px rgba(0, 255, 212, 0.15);
        }

        .button:active {
            transform: translateY(0);
        }

        .button.secondary {
            background: rgba(107, 107, 141, 0.15);
            color: var(--moonlight-white);
            border-color: rgba(107, 107, 141, 0.3);
        }

        .button.secondary:hover {
            background: rgba(107, 107, 141, 0.25);
            border-color: rgba(107, 107, 141, 0.5);
        }

        .button.tertiary {
            background: rgba(255, 107, 53, 0.1);
            color: var(--void-orange);
            border-color: rgba(255, 107, 53, 0.25);
        }

        .button.tertiary:hover {
            background: rgba(255, 107, 53, 0.2);
            border-color: rgba(255, 107, 53, 0.5);
        }

        .canvas-area {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            min-width: 0;
        }

        #canvas-container {
            width: 100%;
            max-width: 800px;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6), 0 0 40px rgba(0, 255, 212, 0.03);
            border: 1px solid rgba(0, 255, 212, 0.06);
        }

        #canvas-container canvas {
            display: block;
            width: 100% !important;
            height: auto !important;
        }

        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            color: var(--stardust-gray);
            height: 1000px;
        }

        .palette-strip {
            display: flex;
            gap: 4px;
            margin-top: 8px;
        }

        .palette-swatch {
            flex: 1;
            height: 20px;
            border-radius: 3px;
        }

        @media (max-width: 900px) {
            .container {
                flex-direction: column;
            }
            .sidebar {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <h1>NAYUTA</h1>
            <div class="subtitle">深渊行者 — 程序化概念图生成器<br>Cosmic Horror / Dark Fairy Tale</div>

            <div class="control-section">
                <h3>Seed</h3>
                <input type="number" id="seed-input" class="seed-input" value="42" onchange="updateSeed()">
                <div class="seed-controls">
                    <button class="button secondary" onclick="previousSeed()">← Prev</button>
                    <button class="button secondary" onclick="nextSeed()">Next →</button>
                </div>
                <button class="button tertiary regen-button" onclick="randomSeedAndUpdate()">↻ Random</button>
            </div>

            <div class="control-section">
                <h3>Parameters</h3>

                <div class="control-group">
                    <label>Cloak Flow</label>
                    <div class="slider-container">
                        <input type="range" id="cloakFlow" min="0" max="100" step="1" value="50" oninput="updateParam('cloakFlow', this.value)">
                        <span class="value-display" id="cloakFlow-value">50</span>
                    </div>
                </div>

                <div class="control-group">
                    <label>Fragment Count</label>
                    <div class="slider-container">
                        <input type="range" id="fragmentCount" min="3" max="80" step="1" value="25" oninput="updateParam('fragmentCount', this.value)">
                        <span class="value-display" id="fragmentCount-value">25</span>
                    </div>
                </div>

                <div class="control-group">
                    <label>Erosion Intensity</label>
                    <div class="slider-container">
                        <input type="range" id="erosionIntensity" min="0" max="100" step="1" value="40" oninput="updateParam('erosionIntensity', this.value)">
                        <span class="value-display" id="erosionIntensity-value">40</span>
                    </div>
                </div>

                <div class="control-group">
                    <label>Star Density</label>
                    <div class="slider-container">
                        <input type="range" id="starDensity" min="30" max="600" step="10" value="200" oninput="updateParam('starDensity', this.value)">
                        <span class="value-display" id="starDensity-value">200</span>
                    </div>
                </div>
            </div>

            <div class="control-section">
                <h3>Palette</h3>
                <div class="palette-strip">
                    <div class="palette-swatch" style="background:#0A0E1A" title="Deep Abyss Blue"></div>
                    <div class="palette-swatch" style="background:#1A1035" title="Nebula Purple"></div>
                    <div class="palette-swatch" style="background:#00FFD4" title="Fluorescent Cyan"></div>
                    <div class="palette-swatch" style="background:#FF6B35" title="Void Orange"></div>
                    <div class="palette-swatch" style="background:#E8E6F0" title="Moonlight White"></div>
                    <div class="palette-swatch" style="background:#6B6B8D" title="Stardust Gray"></div>
                </div>
            </div>

            <div class="control-section">
                <h3>Actions</h3>
                <button class="button" onclick="resetParameters()">Reset Defaults</button>
            </div>
        </div>

        <div class="canvas-area">
            <div id="canvas-container">
                <div class="loading">正在生成概念图...</div>
            </div>
        </div>
    </div>

    <script>
        let params = {
            seed: 42,
            cloakFlow: 50,
            fragmentCount: 25,
            erosionIntensity: 40,
            starDensity: 200
        };

        let defaultParams = JSON.parse(JSON.stringify(params));

        function setup() {
            let canvas = createCanvas(800, 1000);
            canvas.parent('canvas-container');
            generateArt();
            noLoop();
            document.querySelector('.loading').style.display = 'none';
        }

        function draw() {}

        function generateArt() {
            randomSeed(params.seed);
            noiseSeed(params.seed);

            background(10, 14, 26);

            drawBackgroundGradient();
            drawNebulaClouds();
            drawCosmicHorrorElements();
            drawStars();
            drawAbyssalFog();
            drawCharacterAura();
            drawCharacterCloak();
            drawCharacterHood();
            drawCharacterFace();
            drawCloakTrim();
            drawCloakFolds();
            drawHairTendrils();
            drawMemoryFragments();
            drawFloatingParticles();
            drawErosionEffects();
            drawVignette();
            drawTitle();
        }

        function drawBackgroundGradient() {
            let ctx = drawingContext;
            let grad = ctx.createRadialGradient(400, 350, 0, 400, 500, 650);
            grad.addColorStop(0, '#1A1035');
            grad.addColorStop(0.3, '#120C28');
            grad.addColorStop(0.6, '#0D1120');
            grad.addColorStop(1, '#0A0E1A');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, 800, 1000);

            let topGrad = ctx.createLinearGradient(0, 0, 0, 300);
            topGrad.addColorStop(0, 'rgba(10, 0, 5, 0.4)');
            topGrad.addColorStop(1, 'rgba(10, 0, 5, 0)');
            ctx.fillStyle = topGrad;
            ctx.fillRect(0, 0, 800, 300);
        }

        function drawNebulaClouds() {
            let ctx = drawingContext;
            for (let i = 0; i < 18; i++) {
                let nx = random(50, 750);
                let ny = random(50, 950);
                let nw = random(120, 450);
                let nh = random(60, 250);
                let alpha = random(0.015, 0.06);
                let grad = ctx.createRadialGradient(nx, ny, 0, nx, ny, nw * 0.5);
                let r = floor(random(15, 45));
                let g = floor(random(8, 25));
                let b = floor(random(40, 80));
                grad.addColorStop(0, `rgba(${r}, ${g}, ${b}, ${alpha})`);
                grad.addColorStop(0.5, `rgba(${r}, ${g}, ${b}, ${alpha * 0.4})`);
                grad.addColorStop(1, `rgba(${r}, ${g}, ${b}, 0)`);
                ctx.fillStyle = grad;
                ctx.beginPath();
                ctx.ellipse(nx, ny, nw * 0.5, nh * 0.5, random(TWO_PI), 0, TWO_PI);
                ctx.fill();
            }

            for (let i = 0; i < 4; i++) {
                let nx = random(150, 650);
                let ny = random(200, 700);
                let nr = random(80, 200);
                let grad = ctx.createRadialGradient(nx, ny, 0, nx, ny, nr);
                grad.addColorStop(0, 'rgba(0, 255, 212, 0.008)');
                grad.addColorStop(0.5, 'rgba(0, 136, 255, 0.004)');
                grad.addColorStop(1, 'rgba(0, 0, 0, 0)');
                ctx.fillStyle = grad;
                ctx.fillRect(nx - nr, ny - nr, nr * 2, nr * 2);
            }
        }

        function drawCosmicHorrorElements() {
            for (let i = 0; i < 6; i++) {
                let sx = random(800);
                let sy = random(1000);
                stroke(26, 16, 53, random(15, 35));
                strokeWeight(random(0.5, 1.5));
                noFill();
                beginShape();
                curveVertex(sx, sy);
                for (let j = 0; j < 6; j++) {
                    let nx = sx + random(-120, 120);
                    let ny = sy + random(-80, 80);
                    curveVertex(nx, ny);
                    sx = nx;
                    sy = ny;
                }
                curveVertex(sx, sy);
                endShape();
            }

            for (let i = 0; i < 10; i++) {
                let gx = random(800);
                let gy = random(1000);
                let gs = random(8, 35);
                let ga = random(8, 22);
                stroke(107, 107, 141, ga);
                strokeWeight(0.5);
                noFill();
                let sides = floor(random(3, 7));
                let angle0 = random(TWO_PI);
                beginShape();
                for (let j = 0; j <= sides; j++) {
                    let a = angle0 + j * TWO_PI / sides;
                    vertex(gx + cos(a) * gs, gy + sin(a) * gs);
                }
                endShape(CLOSE);
            }

            if (random() < 0.6) {
                let ex = random(150, 650);
                let ey = random(100, 400);
                let ew = random(60, 180);
                let eh = ew * random(0.3, 0.5);
                noFill();
                stroke(26, 16, 53, random(8, 18));
                strokeWeight(1);
                ellipse(ex, ey, ew, eh);
                let pupilW = ew * random(0.15, 0.3);
                let pupilH = eh * random(0.5, 0.8);
                fill(26, 16, 53, random(5, 12));
                noStroke();
                ellipse(ex, ey, pupilW, pupilH);
            }

            noStroke();
        }

        function drawStars() {
            let count = params.starDensity;
            for (let i = 0; i < count; i++) {
                let sx = random(800);
                let sy = random(1000);
                let ss = random(0.3, 2.2);
                let sa = random(60, 240);
                noStroke();
                fill(232, 230, 240, sa);
                ellipse(sx, sy, ss, ss);

                if (ss > 1.6 && random() < 0.3) {
                    fill(232, 230, 240, sa * 0.15);
                    ellipse(sx, sy, ss * 5, ss * 5);
                }

                if (ss > 1.8 && random() < 0.15) {
                    stroke(232, 230, 240, sa * 0.2);
                    strokeWeight(0.3);
                    let rayLen = ss * random(4, 8);
                    line(sx - rayLen, sy, sx + rayLen, sy);
                    line(sx, sy - rayLen, sx, sy + rayLen);
                    noStroke();
                }
            }
        }

        function drawAbyssalFog() {
            let ctx = drawingContext;
            for (let i = 0; i < 6; i++) {
                let fx = random(50, 750);
                let fy = random(550, 950);
                let fw = random(200, 500);
                let fh = random(40, 120);
                let grad = ctx.createRadialGradient(fx, fy, 0, fx, fy, fw * 0.5);
                grad.addColorStop(0, 'rgba(26, 16, 53, 0.08)');
                grad.addColorStop(0.5, 'rgba(15, 21, 40, 0.04)');
                grad.addColorStop(1, 'rgba(10, 14, 26, 0)');
                ctx.fillStyle = grad;
                ctx.beginPath();
                ctx.ellipse(fx, fy, fw * 0.5, fh * 0.5, 0, 0, TWO_PI);
                ctx.fill();
            }
        }

        function drawCharacterAura() {
            let ctx = drawingContext;
            let cx = 400;
            let cy = 480;

            let grad = ctx.createRadialGradient(cx, cy - 30, 0, cx, cy, 280);
            grad.addColorStop(0, 'rgba(0, 255, 212, 0.05)');
            grad.addColorStop(0.2, 'rgba(0, 255, 212, 0.03)');
            grad.addColorStop(0.5, 'rgba(0, 136, 255, 0.015)');
            grad.addColorStop(1, 'rgba(0, 0, 0, 0)');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, 800, 1000);

            let grad2 = ctx.createRadialGradient(cx, cy - 80, 0, cx, cy - 80, 180);
            grad2.addColorStop(0, 'rgba(45, 27, 105, 0.08)');
            grad2.addColorStop(0.5, 'rgba(26, 16, 53, 0.04)');
            grad2.addColorStop(1, 'rgba(0, 0, 0, 0)');
            ctx.fillStyle = grad2;
            ctx.fillRect(0, 0, 800, 1000);
        }

        function drawCharacterCloak() {
            let cx = 400;
            let flowAmt = params.cloakFlow / 100;
            let ctx = drawingContext;

            let cloakGrad = ctx.createLinearGradient(cx, 360, cx, 780);
            cloakGrad.addColorStop(0, '#2D1B69');
            cloakGrad.addColorStop(0.15, '#221448');
            cloakGrad.addColorStop(0.4, '#1A1035');
            cloakGrad.addColorStop(0.7, '#120C28');
            cloakGrad.addColorStop(1, '#0A0E1A');

            ctx.fillStyle = cloakGrad;
            ctx.beginPath();
            ctx.moveTo(cx - 52, 365);

            for (let y = 365; y <= 775; y += 2) {
                let t = (y - 365) / 410;
                let baseX = cx - 52 - t * 90;
                let n1 = noise(y * 0.006, 0.5) * flowAmt * 45;
                let n2 = noise(y * 0.015, 1.5) * flowAmt * 12;
                let wave = sin(y * 0.02 + noise(y * 0.003) * 3) * flowAmt * 8;
                ctx.lineTo(baseX - n1 - n2 + wave, y);
            }

            for (let x = cx - 142; x <= cx + 142; x += 3) {
                let n = noise(x * 0.008, 100) * flowAmt * 12;
                ctx.lineTo(x, 775 + n);
            }

            for (let y = 775; y >= 365; y -= 2) {
                let t = (y - 365) / 410;
                let baseX = cx + 52 + t * 90;
                let n1 = noise(y * 0.006, 50.5) * flowAmt * 45;
                let n2 = noise(y * 0.015, 51.5) * flowAmt * 12;
                let wave = sin(y * 0.02 + noise(y * 0.003 + 50) * 3) * flowAmt * 8;
                ctx.lineTo(baseX + n1 + n2 - wave, y);
            }

            ctx.lineTo(cx + 52, 365);
            ctx.closePath();
            ctx.fill();

            let innerGrad = ctx.createRadialGradient(cx, 500, 0, cx, 500, 120);
            innerGrad.addColorStop(0, 'rgba(45, 27, 105, 0.15)');
            innerGrad.addColorStop(1, 'rgba(26, 16, 53, 0)');
            ctx.fillStyle = innerGrad;
            ctx.beginPath();
            ctx.ellipse(cx, 500, 80, 180, 0, 0, TWO_PI);
            ctx.fill();
        }

        function drawCharacterHood() {
            let cx = 400;
            let ctx = drawingContext;

            let hoodGrad = ctx.createLinearGradient(cx, 180, cx, 340);
            hoodGrad.addColorStop(0, '#1A1035');
            hoodGrad.addColorStop(0.5, '#221448');
            hoodGrad.addColorStop(1, '#1A1035');

            ctx.fillStyle = hoodGrad;
            ctx.beginPath();
            ctx.moveTo(cx - 44, 335);

            ctx.bezierVertex(cx - 56, 300, cx - 52, 260, cx - 35, 235);
            ctx.lineTo(cx - 28, 238);
            ctx.lineTo(cx - 22, 208);
            ctx.lineTo(cx - 16, 240);
            ctx.lineTo(cx - 8, 232);
            ctx.lineTo(cx, 192);
            ctx.lineTo(cx + 8, 232);
            ctx.lineTo(cx + 16, 240);
            ctx.lineTo(cx + 22, 208);
            ctx.lineTo(cx + 28, 238);
            ctx.lineTo(cx + 35, 235);

            ctx.bezierVertex(cx + 52, 260, cx + 56, 300, cx + 44, 335);
            ctx.bezierVertex(cx + 30, 350, cx - 30, 350, cx - 44, 335);
            ctx.closePath();
            ctx.fill();

            let shadowGrad = ctx.createRadialGradient(cx, 310, 0, cx, 310, 50);
            shadowGrad.addColorStop(0, 'rgba(10, 14, 26, 0.7)');
            shadowGrad.addColorStop(0.6, 'rgba(10, 14, 26, 0.3)');
            shadowGrad.addColorStop(1, 'rgba(10, 14, 26, 0)');
            ctx.fillStyle = shadowGrad;
            ctx.beginPath();
            ctx.ellipse(cx, 310, 42, 40, 0, 0, TWO_PI);
            ctx.fill();

            for (let i = 0; i < 3; i++) {
                let px = cx + (i - 1) * 22;
                let py = i === 1 ? 192 : 208;
                let grad = ctx.createRadialGradient(px, py, 0, px, py, 8);
                grad.addColorStop(0, 'rgba(0, 255, 212, 0.06)');
                grad.addColorStop(1, 'rgba(0, 255, 212, 0)');
                ctx.fillStyle = grad;
                ctx.fillRect(px - 8, py - 8, 16, 16);
            }
        }

        function drawCharacterFace() {
            let cx = 400;
            let ctx = drawingContext;

            let faceGrad = ctx.createRadialGradient(cx - 5, 308, 0, cx, 310, 35);
            faceGrad.addColorStop(0, '#1E1538');
            faceGrad.addColorStop(0.5, '#16102C');
            faceGrad.addColorStop(1, '#100C22');
            ctx.fillStyle = faceGrad;
            ctx.beginPath();
            ctx.ellipse(cx, 310, 32, 38, 0, 0, TWO_PI);
            ctx.fill();

            let eyeGlowGrad = ctx.createRadialGradient(cx - 10, 305, 0, cx - 10, 305, 30);
            eyeGlowGrad.addColorStop(0, 'rgba(0, 255, 212, 0.06)');
            eyeGlowGrad.addColorStop(0.5, 'rgba(0, 255, 212, 0.02)');
            eyeGlowGrad.addColorStop(1, 'rgba(0, 255, 212, 0)');
            ctx.fillStyle = eyeGlowGrad;
            ctx.beginPath();
            ctx.ellipse(cx - 10, 305, 30, 30, 0, 0, TWO_PI);
            ctx.fill();

            ctx.shadowColor = '#00FFD4';
            ctx.shadowBlur = 25;
            ctx.fillStyle = '#00FFD4';
            ctx.beginPath();
            ctx.ellipse(cx - 10, 305, 6, 8, 0.1, 0, TWO_PI);
            ctx.fill();

            ctx.shadowBlur = 12;
            ctx.fillStyle = '#00FFD4';
            ctx.beginPath();
            ctx.ellipse(cx - 10, 305, 6, 8, 0.1, 0, TWO_PI);
            ctx.fill();

            ctx.shadowBlur = 0;
            ctx.fillStyle = '#0A0E1A';
            ctx.beginPath();
            ctx.ellipse(cx - 10, 305, 3, 5, 0.1, 0, TWO_PI);
            ctx.fill();

            ctx.fillStyle = 'rgba(255, 255, 255, 0.9)';
            ctx.beginPath();
            ctx.ellipse(cx - 8, 303, 1.5, 2, 0, 0, TWO_PI);
            ctx.fill();

            ctx.fillStyle = 'rgba(0, 255, 212, 0.15)';
            ctx.beginPath();
            ctx.ellipse(cx + 10, 305, 4, 5, -0.1, 0, TWO_PI);
            ctx.fill();

            for (let i = 0; i < 5; i++) {
                let angle = random(-PI * 0.8, -PI * 0.2);
                let len = random(30, 120);
                stroke(0, 255, 212, random(5, 18));
                strokeWeight(random(0.3, 0.8));
                let ex = cx - 10;
                let ey = 305;
                line(ex, ey, ex + cos(angle) * len, ey + sin(angle) * len);
            }
            noStroke();
        }

        function drawCloakTrim() {
            let cx = 400;
            let flowAmt = params.cloakFlow / 100;
            let ctx = drawingContext;

            ctx.shadowColor = '#00FFD4';
            ctx.shadowBlur = 10;
            stroke(0, 255, 212, 120);
            strokeWeight(1.5);
            noFill();

            ctx.beginPath();
            ctx.moveTo(cx - 50, 367);
            for (let y = 367; y <= 775; y += 2) {
                let t = (y - 365) / 410;
                let baseX = cx - 52 - t * 90;
                let n1 = noise(y * 0.006, 0.5) * flowAmt * 45;
                let n2 = noise(y * 0.015, 1.5) * flowAmt * 12;
                let wave = sin(y * 0.02 + noise(y * 0.003) * 3) * flowAmt * 8;
                ctx.lineTo(baseX - n1 - n2 + wave + 4, y);
            }
            ctx.stroke();

            ctx.beginPath();
            ctx.moveTo(cx + 50, 367);
            for (let y = 367; y <= 775; y += 2) {
                let t = (y - 365) / 410;
                let baseX = cx + 52 + t * 90;
                let n1 = noise(y * 0.006, 50.5) * flowAmt * 45;
                let n2 = noise(y * 0.015, 51.5) * flowAmt * 12;
                let wave = sin(y * 0.02 + noise(y * 0.003 + 50) * 3) * flowAmt * 8;
                ctx.lineTo(baseX + n1 + n2 - wave - 4, y);
            }
            ctx.stroke();

            ctx.shadowBlur = 5;
            stroke(0, 255, 212, 50);
            strokeWeight(0.8);

            ctx.beginPath();
            ctx.moveTo(cx - 50, 367);
            for (let y = 367; y <= 775; y += 2) {
                let t = (y - 365) / 410;
                let baseX = cx - 52 - t * 90;
                let n1 = noise(y * 0.006, 0.5) * flowAmt * 45;
                let n2 = noise(y * 0.015, 1.5) * flowAmt * 12;
                let wave = sin(y * 0.02 + noise(y * 0.003) * 3) * flowAmt * 8;
                ctx.lineTo(baseX - n1 - n2 + wave + 8, y);
            }
            ctx.stroke();

            ctx.beginPath();
            ctx.moveTo(cx + 50, 367);
            for (let y = 367; y <= 775; y += 2) {
                let t = (y - 365) / 410;
                let baseX = cx + 52 + t * 90;
                let n1 = noise(y * 0.006, 50.5) * flowAmt * 45;
                let n2 = noise(y * 0.015, 51.5) * flowAmt * 12;
                let wave = sin(y * 0.02 + noise(y * 0.003 + 50) * 3) * flowAmt * 8;
                ctx.lineTo(baseX + n1 + n2 - wave - 8, y);
            }
            ctx.stroke();

            ctx.shadowBlur = 0;
            noStroke();

            for (let y = 380; y < 770; y += random(15, 40)) {
                let t = (y - 365) / 410;
                let side = random() < 0.5 ? -1 : 1;
                let baseX = cx + side * (52 + t * 90);
                let n1 = noise(y * 0.006, side < 0 ? 0.5 : 50.5) * flowAmt * 45;
                let edgeX = baseX + side * (n1 + 4);
                let pulseAlpha = (sin(y * 0.05 + params.seed * 0.1) * 0.5 + 0.5) * 80 + 30;
                fill(0, 255, 212, pulseAlpha);
                noStroke();
                ellipse(edgeX, y, random(2, 4), random(2, 4));
            }
        }

        function drawCloakFolds() {
            let cx = 400;
            let flowAmt = params.cloakFlow / 100;

            for (let i = 0; i < 10; i++) {
                let xOff = random(-35, 35);
                let alpha = random(15, 40);
                stroke(45, 27, 105, alpha);
                strokeWeight(random(0.3, 0.8));
                noFill();

                beginShape();
                for (let y = 380; y <= 750; y += 4) {
                    let t = (y - 365) / 410;
                    let x = cx + xOff * (1 + t * 0.6);
                    x += noise(y * 0.008, i * 7.3) * 12 * flowAmt;
                    x += sin(y * 0.015 + i) * 3 * flowAmt;
                    vertex(x, y);
                }
                endShape();
            }

            for (let i = 0; i < 4; i++) {
                let yOff = random(420, 600);
                let alpha = random(10, 25);
                stroke(60, 35, 120, alpha);
                strokeWeight(0.4);
                noFill();
                let startX = cx + random(-30, 30);
                let endX = startX + random(-60, 60);
                bezier(startX, yOff, startX + random(-20, 20), yOff + 40, endX - random(-20, 20), yOff + 80, endX, yOff + 120);
            }

            noStroke();
        }

        function drawHairTendrils() {
            let cx = 400;

            for (let i = 0; i < 6; i++) {
                let startX = cx + random(-18, 18);
                let startY = 330;
                stroke(20, 14, 38, random(40, 80));
                strokeWeight(random(1, 2.5));
                noFill();
                beginShape();
                vertex(startX, startY);
                let cx1 = startX + random(-35, 35);
                let cy1 = startY + random(20, 60);
                let cx2 = startX + random(-50, 50);
                let cy2 = startY + random(60, 120);
                let endX = startX + random(-60, 60);
                let endY = startY + random(100, 180);
                bezierVertex(cx1, cy1, cx2, cy2, endX, endY);
                endShape();
            }

            noStroke();
        }

        function drawMemoryFragments() {
            let cx = 400;
            let cy = 480;
            let count = params.fragmentCount;
            let ctx = drawingContext;

            for (let i = 0; i < count; i++) {
                let angle = random(TWO_PI);
                let dist = random(90, 320);
                let fx = cx + cos(angle) * dist * random(0.6, 1.0);
                let fy = cy + sin(angle) * dist * random(0.4, 0.9);
                let fs = random(2, 9);
                let fa = random(80, 230);

                ctx.shadowColor = '#00FFD4';
                ctx.shadowBlur = fs * 4;

                let grad = ctx.createRadialGradient(fx, fy, 0, fx, fy, fs);
                grad.addColorStop(0, `rgba(200, 255, 245, ${fa / 255})`);
                grad.addColorStop(0.3, `rgba(0, 255, 212, ${fa / 255 * 0.8})`);
                grad.addColorStop(0.7, `rgba(0, 136, 255, ${fa / 255 * 0.3})`);
                grad.addColorStop(1, 'rgba(0, 136, 255, 0)');
                ctx.fillStyle = grad;
                ctx.beginPath();
                ctx.arc(fx, fy, fs * 2, 0, TWO_PI);
                ctx.fill();

                fill(200, 255, 245, fa);
                noStroke();
                ellipse(fx, fy, fs * 0.5, fs * 0.5);

                if (fs > 5 && random() < 0.4) {
                    let trailAngle = angle + PI + random(-0.5, 0.5);
                    let trailLen = random(10, 30);
                    stroke(0, 255, 212, fa * 0.2);
                    strokeWeight(0.5);
                    line(fx, fy, fx + cos(trailAngle) * trailLen, fy + sin(trailAngle) * trailLen);
                    noStroke();
                }
            }

            ctx.shadowBlur = 0;
        }

        function drawFloatingParticles() {
            for (let i = 0; i < 80; i++) {
                let px = random(800);
                let py = random(1000);
                let ps = random(0.3, 1.5);
                let pa = random(15, 60);
                fill(232, 230, 240, pa);
                noStroke();
                ellipse(px, py, ps, ps);
            }

            for (let i = 0; i < 20; i++) {
                let px = 400 + random(-200, 200);
                let py = random(200, 800);
                let ps = random(0.5, 1.2);
                let pa = random(20, 50);
                fill(0, 255, 212, pa);
                noStroke();
                ellipse(px, py, ps, ps);
            }
        }

        function drawErosionEffects() {
            let intensity = params.erosionIntensity / 100;
            if (intensity < 0.01) return;

            let numCracks = floor(intensity * 25);
            let ctx = drawingContext;

            for (let i = 0; i < numCracks; i++) {
                let edge = floor(random(4));
                let sx, sy, dx, dy;

                switch (edge) {
                    case 0: sx = random(800); sy = 0; dx = random(-0.3, 0.3); dy = 1; break;
                    case 1: sx = 800; sy = random(1000); dx = -1; dy = random(-0.3, 0.3); break;
                    case 2: sx = random(800); sy = 1000; dx = random(-0.3, 0.3); dy = -1; break;
                    case 3: sx = 0; sy = random(1000); dx = 1; dy = random(-0.3, 0.3); break;
                }

                let maxDepth = intensity * random(60, 220);
                drawCrackLine(sx, sy, dx, dy, maxDepth, intensity, 0);
            }

            let numGeometricFractures = floor(intensity * 8);
            for (let i = 0; i < numGeometricFractures; i++) {
                let edge = floor(random(4));
                let gx, gy;
                switch (edge) {
                    case 0: gx = random(800); gy = random(0, 50); break;
                    case 1: gx = random(750, 800); gy = random(1000); break;
                    case 2: gx = random(800); gy = random(950, 1000); break;
                    case 3: gx = random(0, 50); gy = random(1000); break;
                }

                let gs = random(10, 40) * intensity;
                let ga = random(15, 40) * intensity;
                stroke(255, 107, 53, ga);
                strokeWeight(0.5);
                noFill();

                let sides = floor(random(3, 6));
                let angle0 = random(TWO_PI);
                beginShape();
                for (let j = 0; j <= sides; j++) {
                    let a = angle0 + j * TWO_PI / sides;
                    vertex(gx + cos(a) * gs, gy + sin(a) * gs);
                }
                endShape(CLOSE);

                ctx.shadowColor = '#FF6B35';
                ctx.shadowBlur = 4;
                stroke(255, 107, 53, ga * 0.5);
                strokeWeight(0.3);
                for (let j = 0; j < 2; j++) {
                    let a1 = random(TWO_PI);
                    let a2 = a1 + random(0.5, 1.5);
                    line(gx, gy, gx + cos(a1) * gs * 1.5, gy + sin(a1) * gs * 1.5);
                }
                ctx.shadowBlur = 0;
            }

            noStroke();
        }

        function drawCrackLine(sx, sy, dx, dy, maxDepth, intensity, depth) {
            if (depth > 3) return;

            let x = sx;
            let y = sy;
            let currentDepth = 0;
            let ctx = drawingContext;

            let crackAlpha = (80 + intensity * 120) * (1 - depth * 0.25);
            let crackWidth = (1.5 - depth * 0.3) * intensity + 0.3;

            ctx.shadowColor = depth < 2 ? '#FF6B35' : '#00FFD4';
            ctx.shadowBlur = 3 + intensity * 4;
            stroke(255, 107, 53, crackAlpha);
            strokeWeight(crackWidth);
            noFill();

            beginShape();
            vertex(x, y);

            while (currentDepth < maxDepth) {
                let angle = atan2(dy, dx) + random(-0.7, 0.7);
                let step = random(6, 18);
                let nx = x + cos(angle) * step;
                let ny = y + sin(angle) * step;
                vertex(nx, ny);
                x = nx;
                y = ny;
                currentDepth += step;

                if (random() < 0.1 * intensity && currentDepth < maxDepth * 0.7) {
                    endShape();
                    let branchAngle = angle + random(-1.2, 1.2);
                    drawCrackLine(x, y, cos(branchAngle), sin(branchAngle), maxDepth * 0.35, intensity * 0.6, depth + 1);
                    stroke(255, 107, 53, crackAlpha * 0.7);
                    strokeWeight(crackWidth * 0.7);
                    beginShape();
                    vertex(x, y);
                }
            }

            endShape();
            ctx.shadowBlur = 0;
            noStroke();
        }

        function drawVignette() {
            let ctx = drawingContext;

            let grad = ctx.createRadialGradient(400, 480, 150, 400, 500, 600);
            grad.addColorStop(0, 'rgba(10, 14, 26, 0)');
            grad.addColorStop(0.5, 'rgba(10, 14, 26, 0.15)');
            grad.addColorStop(0.75, 'rgba(10, 14, 26, 0.4)');
            grad.addColorStop(1, 'rgba(10, 14, 26, 0.85)');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, 800, 1000);

            let topGrad = ctx.createLinearGradient(0, 0, 0, 120);
            topGrad.addColorStop(0, 'rgba(10, 14, 26, 0.6)');
            topGrad.addColorStop(1, 'rgba(10, 14, 26, 0)');
            ctx.fillStyle = topGrad;
            ctx.fillRect(0, 0, 800, 120);

            let botGrad = ctx.createLinearGradient(0, 880, 0, 1000);
            botGrad.addColorStop(0, 'rgba(10, 14, 26, 0)');
            botGrad.addColorStop(1, 'rgba(10, 14, 26, 0.7)');
            ctx.fillStyle = botGrad;
            ctx.fillRect(0, 880, 800, 120);
        }

        function drawTitle() {
            let ctx = drawingContext;
            textAlign(CENTER, CENTER);

            ctx.shadowColor = '#00FFD4';
            ctx.shadowBlur = 8;
            fill(232, 230, 240);
            textSize(30);
            textStyle(BOLD);
            textFont('Lora');
            text('NAYUTA', 400, 870);
            ctx.shadowBlur = 0;

            fill(107, 107, 141);
            textSize(14);
            textStyle(NORMAL);
            textFont('Poppins');
            text('那由他 — 深渊行者', 400, 900);

            fill(107, 107, 141, 120);
            textSize(10);
            text('Procedural Concept Art  |  Seed: ' + params.seed, 400, 940);

            stroke(0, 255, 212, 30);
            strokeWeight(0.5);
            line(300, 885, 500, 885);
            noStroke();
        }

        function updateParam(paramName, value) {
            params[paramName] = parseFloat(value);
            document.getElementById(paramName + '-value').textContent = value;
            generateArt();
        }

        function updateSeedDisplay() {
            document.getElementById('seed-input').value = params.seed;
        }

        function updateSeed() {
            let input = document.getElementById('seed-input');
            let newSeed = parseInt(input.value);
            if (newSeed && newSeed > 0) {
                params.seed = newSeed;
                generateArt();
            } else {
                updateSeedDisplay();
            }
        }

        function previousSeed() {
            params.seed = Math.max(1, params.seed - 1);
            updateSeedDisplay();
            generateArt();
        }

        function nextSeed() {
            params.seed = params.seed + 1;
            updateSeedDisplay();
            generateArt();
        }

        function randomSeedAndUpdate() {
            params.seed = Math.floor(Math.random() * 999999) + 1;
            updateSeedDisplay();
            generateArt();
        }

        function resetParameters() {
            params = JSON.parse(JSON.stringify(defaultParams));

            document.getElementById('cloakFlow').value = params.cloakFlow;
            document.getElementById('cloakFlow-value').textContent = params.cloakFlow;
            document.getElementById('fragmentCount').value = params.fragmentCount;
            document.getElementById('fragmentCount-value').textContent = params.fragmentCount;
            document.getElementById('erosionIntensity').value = params.erosionIntensity;
            document.getElementById('erosionIntensity-value').textContent = params.erosionIntensity;
            document.getElementById('starDensity').value = params.starDensity;
            document.getElementById('starDensity-value').textContent = params.starDensity;

            updateSeedDisplay();
            generateArt();
        }

        window.addEventListener('load', function () {
            updateSeedDisplay();
        });
    </script>
