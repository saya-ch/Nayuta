<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anchor of Memory — 记忆之锚概念图生成器</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.7.0/p5.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&family=Lora:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --anthropic-dark: #141413;
            --anthropic-light: #faf9f5;
            --anthropic-mid-gray: #b0aea5;
            --anthropic-light-gray: #e8e6dc;
            --anthropic-orange: #d97757;
            --anthropic-blue: #6a9bcc;
            --anthropic-green: #788c5d;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, var(--anthropic-light) 0%, #f5f3ee 100%);
            min-height: 100vh;
            color: var(--anthropic-dark);
        }
        .container { display: flex; min-height: 100vh; padding: 20px; gap: 20px; }
        .sidebar {
            width: 320px; flex-shrink: 0;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 24px; border-radius: 12px;
            box-shadow: 0 10px 30px rgba(20, 20, 19, 0.1);
            overflow-y: auto; overflow-x: hidden;
        }
        .sidebar h1 { font-family: 'Lora', serif; font-size: 24px; font-weight: 500; color: var(--anthropic-dark); margin-bottom: 8px; }
        .sidebar .subtitle { color: var(--anthropic-mid-gray); font-size: 14px; margin-bottom: 32px; line-height: 1.4; }
        .control-section { margin-bottom: 32px; }
        .control-section h3 { font-size: 16px; font-weight: 600; color: var(--anthropic-dark); margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
        .control-section h3::before { content: '•'; color: var(--anthropic-orange); font-weight: bold; }
        .seed-input {
            width: 100%; background: var(--anthropic-light); padding: 12px;
            border-radius: 8px; font-family: 'Courier New', monospace; font-size: 14px;
            margin-bottom: 12px; border: 1px solid var(--anthropic-light-gray); text-align: center;
        }
        .seed-input:focus { outline: none; border-color: var(--anthropic-orange); box-shadow: 0 0 0 2px rgba(217, 119, 87, 0.1); background: white; }
        .seed-controls { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }
        .regen-button { margin-bottom: 0; }
        .control-group { margin-bottom: 20px; }
        .control-group label { display: block; font-size: 14px; font-weight: 500; color: var(--anthropic-dark); margin-bottom: 8px; }
        .slider-container { display: flex; align-items: center; gap: 12px; }
        .slider-container input[type="range"] { flex: 1; height: 4px; background: var(--anthropic-light-gray); border-radius: 2px; outline: none; -webkit-appearance: none; }
        .slider-container input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 16px; height: 16px; background: var(--anthropic-orange); border-radius: 50%; cursor: pointer; transition: all 0.2s ease; }
        .slider-container input[type="range"]::-webkit-slider-thumb:hover { transform: scale(1.1); background: #c86641; }
        .slider-container input[type="range"]::-moz-range-thumb { width: 16px; height: 16px; background: var(--anthropic-orange); border-radius: 50%; border: none; cursor: pointer; }
        .value-display { font-family: 'Courier New', monospace; font-size: 12px; color: var(--anthropic-mid-gray); min-width: 60px; text-align: right; }
        .color-group { margin-bottom: 16px; }
        .color-group label { display: block; font-size: 12px; color: var(--anthropic-mid-gray); margin-bottom: 4px; }
        .color-picker-container { display: flex; align-items: center; gap: 8px; }
        .color-picker-container input[type="color"] { width: 32px; height: 32px; border: none; border-radius: 6px; cursor: pointer; background: none; padding: 0; }
        .color-value { font-family: 'Courier New', monospace; font-size: 12px; color: var(--anthropic-mid-gray); }
        .button { background: var(--anthropic-orange); color: white; border: none; padding: 10px 16px; border-radius: 6px; font-size: 14px; font-weight: 500; cursor: pointer; transition: all 0.2s ease; width: 100%; }
        .button:hover { background: #c86641; transform: translateY(-1px); }
        .button:active { transform: translateY(0); }
        .button.secondary { background: var(--anthropic-blue); }
        .button.secondary:hover { background: #5a8bb8; }
        .button.tertiary { background: var(--anthropic-green); }
        .button.tertiary:hover { background: #6b7b52; }
        .button-row { display: flex; gap: 8px; }
        .button-row .button { flex: 1; }
        .canvas-area { flex: 1; display: flex; align-items: center; justify-content: center; min-width: 0; }
        #canvas-container { width: 100%; max-width: 1000px; border-radius: 12px; overflow: hidden; box-shadow: 0 20px 40px rgba(20, 20, 19, 0.1); background: #0A0E1A; }
        #canvas-container canvas { display: block; width: 100% !important; height: auto !important; }
        .loading { display: flex; align-items: center; justify-content: center; font-size: 18px; color: var(--anthropic-mid-gray); }
        @media (max-width: 600px) { .container { flex-direction: column; } .sidebar { width: 100%; } .canvas-area { padding: 20px; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <h1>Anchor of Memory</h1>
            <div class="subtitle">记忆之锚 — 程序化概念图生成器</div>

            <div class="control-section">
                <h3>Seed</h3>
                <input type="number" id="seed-input" class="seed-input" value="42" onchange="updateSeed()">
                <div class="seed-controls">
                    <button class="button secondary" onclick="previousSeed()">← Prev</button>
                    <button class="button secondary" onclick="nextSeed()">Next →</button>
                </div>
                <button class="button tertiary regen-button" onclick="randomSeedAndUpdate()">↻ Random</button>
            </div>

            <div class="control-section">
                <h3>Parameters</h3>
                <div class="control-group">
                    <label>Orbital Rings</label>
                    <div class="slider-container">
                        <input type="range" id="orbitalRings" min="2" max="8" step="1" value="4" oninput="updateParam('orbitalRings', this.value)">
                        <span class="value-display" id="orbitalRings-value">4</span>
                    </div>
                </div>
                <div class="control-group">
                    <label>Rune Count</label>
                    <div class="slider-container">
                        <input type="range" id="runeCount" min="3" max="20" step="1" value="8" oninput="updateParam('runeCount', this.value)">
                        <span class="value-display" id="runeCount-value">8</span>
                    </div>
                </div>
                <div class="control-group">
                    <label>Erosion Intensity</label>
                    <div class="slider-container">
                        <input type="range" id="erosionIntensity" min="0" max="1" step="0.05" value="0.3" oninput="updateParam('erosionIntensity', this.value)">
                        <span class="value-display" id="erosionIntensity-value">0.3</span>
                    </div>
                </div>
                <div class="control-group">
                    <label>Pulse Speed</label>
                    <div class="slider-container">
                        <input type="range" id="pulseSpeed" min="0.5" max="3" step="0.1" value="1.2" oninput="updateParam('pulseSpeed', this.value)">
                        <span class="value-display" id="pulseSpeed-value">1.2</span>
                    </div>
                </div>
                <div class="control-group">
                    <label>Fragment Count</label>
                    <div class="slider-container">
                        <input type="range" id="fragmentCount" min="5" max="40" step="1" value="15" oninput="updateParam('fragmentCount', this.value)">
                        <span class="value-display" id="fragmentCount-value">15</span>
                    </div>
                </div>
            </div>

            <div class="control-section">
                <h3>Colors</h3>
                <div class="color-group">
                    <label>Cyan Glow</label>
                    <div class="color-picker-container">
                        <input type="color" id="cyanColor" value="#00FFD4" onchange="updateColor('cyanColor', this.value)">
                        <span class="color-value" id="cyanColor-value">#00FFD4</span>
                    </div>
                </div>
                <div class="color-group">
                    <label>Void Orange</label>
                    <div class="color-picker-container">
                        <input type="color" id="orangeColor" value="#FF6B35" onchange="updateColor('orangeColor', this.value)">
                        <span class="color-value" id="orangeColor-value">#FF6B35</span>
                    </div>
                </div>
                <div class="color-group">
                    <label>Abyss Blue</label>
                    <div class="color-picker-container">
                        <input type="color" id="bgColor" value="#0A0E1A" onchange="updateColor('bgColor', this.value)">
                        <span class="color-value" id="bgColor-value">#0A0E1A</span>
                    </div>
                </div>
            </div>

            <div class="control-section">
                <h3>Actions</h3>
                <div class="button-row">
                    <button class="button" onclick="resetParameters()">Reset</button>
                </div>
            </div>
        </div>

        <div class="canvas-area">
            <div id="canvas-container">
                <div class="loading">Initializing generative art...</div>
            </div>
        </div>
    </div>

    <script>
        let params = {
            seed: 42,
            orbitalRings: 4,
            runeCount: 8,
            erosionIntensity: 0.3,
            pulseSpeed: 1.2,
            fragmentCount: 15,
            cyanColor: '#00FFD4',
            orangeColor: '#FF6B35',
            bgColor: '#0A0E1A'
        };
        let defaultParams = JSON.parse(JSON.stringify(params));

        let time = 0;
        let runes = [];
        let fragments = [];
        let cracks = [];
        let orbitParticles = [];

        function hexToRgb(hex) {
            let r = parseInt(hex.slice(1, 3), 16);
            let g = parseInt(hex.slice(3, 5), 16);
            let b = parseInt(hex.slice(5, 7), 16);
            return { r, g, b };
        }

        function setup() {
            let canvas = createCanvas(800, 1000);
            canvas.parent('canvas-container');
            document.querySelector('.loading').style.display = 'none';
            initializeSystem();
        }

        function initializeSystem() {
            randomSeed(params.seed);
            noiseSeed(params.seed);
            time = 0;

            runes = [];
            for (let i = 0; i < params.runeCount; i++) {
                let ringIdx = floor(random(params.orbitalRings));
                runes.push({
                    angle: random(TWO_PI),
                    ring: ringIdx,
                    speed: (random() > 0.5 ? 1 : -1) * random(0.002, 0.008),
                    size: random(6, 14),
                    type: floor(random(5)),
                    phase: random(TWO_PI),
                    brightness: random(0.3, 0.8)
                });
            }

            fragments = [];
            for (let i = 0; i < params.fragmentCount; i++) {
                fragments.push({
                    angle: random(TWO_PI),
                    dist: random(60, 180),
                    size: random(3, 8),
                    rotSpeed: random(-0.01, 0.01),
                    floatPhase: random(TWO_PI),
                    floatAmp: random(5, 20),
                    alpha: random(0.2, 0.6)
                });
            }

            cracks = [];
            let crackCount = floor(params.erosionIntensity * 8) + 1;
            for (let i = 0; i < crackCount; i++) {
                let startAngle = random(TWO_PI);
                let segs = [];
                let cx = cos(startAngle) * 40;
                let cy = sin(startAngle) * 40;
                let ca = startAngle + random(-0.5, 0.5);
                let numSegs = floor(random(3, 8));
                for (let j = 0; j < numSegs; j++) {
                    let len = random(8, 25);
                    let nx = cx + cos(ca) * len;
                    let ny = cy + sin(ca) * len;
                    segs.push({ x1: cx, y1: cy, x2: nx, y2: ny });
                    cx = nx; cy = ny;
                    ca += random(-0.8, 0.8);
                }
                cracks.push({ segments: segs, growth: random(0.3, 1) });
            }

            orbitParticles = [];
            for (let i = 0; i < 60; i++) {
                orbitParticles.push({
                    ring: floor(random(params.orbitalRings)),
                    angle: random(TWO_PI),
                    speed: random(0.003, 0.012) * (random() > 0.5 ? 1 : -1),
                    size: random(1, 3),
                    alpha: random(0.1, 0.5)
                });
            }

            loop();
        }

        function draw() {
            let bg = hexToRgb(params.bgColor);
            background(bg.r, bg.g, bg.b);
            time += deltaTime * 0.001 * params.pulseSpeed;

            let cx = width / 2;
            let cy = height * 0.42;

            renderStarfield(cx, cy);
            renderNebulaGlow(cx, cy);
            renderOrbitalRings(cx, cy);
            renderOrbitParticles(cx, cy);
            renderCracks(cx, cy);
            renderAnchorCore(cx, cy);
            renderFragments(cx, cy);
            renderRunes(cx, cy);
            renderErosionOverlay(cx, cy);
            renderTitle(cx);
        }

        function renderStarfield(cx, cy) {
            randomSeed(params.seed);
            for (let i = 0; i < 80; i++) {
                let sx = random(width);
                let sy = random(height);
                let ss = random(0.5, 1.5);
                let sb = random(0.2, 0.6);
                let twinkle = 0.5 + 0.5 * sin(time * 2 + i * 0.7);
                fill(232, 230, 240, sb * twinkle * 255);
                noStroke();
                ellipse(sx, sy, ss, ss);
            }
            randomSeed(millis());
        }

        function renderNebulaGlow(cx, cy) {
            let cyan = hexToRgb(params.cyanColor);
            noStroke();
            for (let i = 3; i > 0; i--) {
                let r = 120 + i * 60;
                let pulse = 0.5 + 0.5 * sin(time * 0.8);
                let a = (0.03 + 0.02 * pulse) * (4 - i) / 3;
                fill(cyan.r, cyan.g, cyan.b, a * 255);
                ellipse(cx, cy, r * 2, r * 2);
            }
        }

        function renderOrbitalRings(cx, cy) {
            let cyan = hexToRgb(params.cyanColor);
            noFill();
            for (let i = 0; i < params.orbitalRings; i++) {
                let baseR = 50 + i * 30;
                let wobble = sin(time * 0.5 + i * 1.2) * 3;
                let r = baseR + wobble;
                let tilt = 0.3 + i * 0.08;
                let alpha = (0.15 + 0.1 * sin(time + i)) * 255;

                stroke(cyan.r, cyan.g, cyan.b, alpha);
                strokeWeight(0.8);
                push();
                translate(cx, cy);
                rotate(i * 0.15 + time * 0.02);
                ellipse(0, 0, r * 2, r * 2 * tilt);
                pop();
            }
        }

        function renderOrbitParticles(cx, cy) {
            let cyan = hexToRgb(params.cyanColor);
            noStroke();
            for (let p of orbitParticles) {
                p.angle += p.speed;
                let baseR = 50 + p.ring * 30;
                let tilt = 0.3 + p.ring * 0.08;
                let px = cx + cos(p.angle) * baseR;
                let py = cy + sin(p.angle) * baseR * tilt;
                fill(cyan.r, cyan.g, cyan.b, p.alpha * 255);
                ellipse(px, py, p.size, p.size);
            }
        }

        function renderCracks(cx, cy) {
            let orange = hexToRgb(params.orangeColor);
            for (let crack of cracks) {
                let visibleSegs = floor(crack.segments.length * crack.growth);
                for (let i = 0; i < visibleSegs; i++) {
                    let seg = crack.segments[i];
                    let flicker = 0.5 + 0.5 * sin(time * 3 + i * 0.5);
                    let a = params.erosionIntensity * flicker * 200;
                    stroke(orange.r, orange.g, orange.b, a);
                    strokeWeight(1.5);
                    line(cx + seg.x1, cy + seg.y1, cx + seg.x2, cy + seg.y2);

                    if (i === visibleSegs - 1) {
                        noStroke();
                        fill(orange.r, orange.g, orange.b, a * 0.3);
                        ellipse(cx + seg.x2, cy + seg.y2, 8, 8);
                    }
                }
            }
        }

        function renderAnchorCore(cx, cy) {
            let cyan = hexToRgb(params.cyanColor);
            let pulse = 0.5 + 0.5 * sin(time * 1.5);
            let coreSize = 18 + pulse * 6;

            noStroke();
            for (let i = 5; i > 0; i--) {
                let r = coreSize + i * 15;
                let a = (0.04 + 0.03 * pulse) * (6 - i) / 5;
                fill(cyan.r, cyan.g, cyan.b, a * 255);
                ellipse(cx, cy, r * 2, r * 2);
            }

            fill(cyan.r, cyan.g, cyan.b, 220 + pulse * 35);
            ellipse(cx, cy, coreSize * 2, coreSize * 2);

            fill(255, 255, 255, 200 + pulse * 55);
            ellipse(cx, cy, coreSize * 0.8, coreSize * 0.8);

            let innerPulse = 0.5 + 0.5 * sin(time * 2.5);
            fill(255, 255, 255, 100 + innerPulse * 80);
            ellipse(cx, cy, coreSize * 0.3, coreSize * 0.3);

            for (let i = 0; i < 6; i++) {
                let a = i * PI / 3 + time * 0.3;
                let r1 = coreSize + 5;
                let r2 = coreSize + 15 + pulse * 5;
                stroke(cyan.r, cyan.g, cyan.b, 80 + pulse * 60);
                strokeWeight(1);
                line(cx + cos(a) * r1, cy + sin(a) * r1, cx + cos(a) * r2, cy + sin(a) * r2);
            }
        }

        function renderFragments(cx, cy) {
            let cyan = hexToRgb(params.cyanColor);
            for (let f of fragments) {
                f.angle += f.rotSpeed;
                let floatY = sin(time + f.floatPhase) * f.floatAmp;
                let fx = cx + cos(f.angle) * f.dist;
                let fy = cy + sin(f.angle) * f.dist * 0.35 + floatY;
                let pulse = 0.5 + 0.5 * sin(time * 2 + f.floatPhase);

                noStroke();
                fill(cyan.r, cyan.g, cyan.b, f.alpha * pulse * 150);
                ellipse(fx, fy, f.size * 3, f.size * 3);

                fill(cyan.r, cyan.g, cyan.b, f.alpha * 255);
                push();
                translate(fx, fy);
                rotate(f.angle * 2);
                beginShape();
                for (let k = 0; k < 4; k++) {
                    let ka = k * HALF_PI;
                    let kr = f.size * (0.6 + 0.4 * noise(k * 10 + params.seed));
                    vertex(cos(ka) * kr, sin(ka) * kr);
                }
                endShape(CLOSE);
                pop();
            }
        }

        function renderRunes(cx, cy) {
            let cyan = hexToRgb(params.cyanColor);
            for (let r of runes) {
                r.angle += r.speed;
                let ringR = 50 + r.ring * 30;
                let tilt = 0.3 + r.ring * 0.08;
                let rx = cx + cos(r.angle) * ringR;
                let ry = cy + sin(r.angle) * ringR * tilt;
                let pulse = 0.5 + 0.5 * sin(time * 1.5 + r.phase);

                push();
                translate(rx, ry);
                let a = r.brightness * pulse * 200;
                stroke(cyan.r, cyan.g, cyan.b, a);
                strokeWeight(1);
                noFill();

                let s = r.size;
                switch (r.type) {
                    case 0:
                        line(-s/2, 0, s/2, 0);
                        line(0, -s/2, 0, s/2);
                        break;
                    case 1:
                        triangle(0, -s/2, -s/2, s/2, s/2, s/2);
                        break;
                    case 2:
                        ellipse(0, 0, s, s);
                        break;
                    case 3:
                        rect(-s/3, -s/3, s*2/3, s*2/3);
                        break;
                    case 4:
                        beginShape();
                        vertex(0, -s/2);
                        vertex(s/2, 0);
                        vertex(0, s/2);
                        vertex(-s/2, 0);
                        endShape(CLOSE);
                        break;
                }

                noStroke();
                fill(cyan.r, cyan.g, cyan.b, a * 0.2);
                ellipse(0, 0, s * 2.5, s * 2.5);
                pop();
            }
        }

        function renderErosionOverlay(cx, cy) {
            if (params.erosionIntensity < 0.1) return;
            let orange = hexToRgb(params.orangeColor);
            let pulse = 0.5 + 0.5 * sin(time * 0.7);

            noStroke();
            let edgeAlpha = params.erosionIntensity * 0.08 * pulse;
            fill(orange.r, orange.g, orange.b, edgeAlpha * 255);
            rect(0, 0, width, 40);
            rect(0, height - 40, width, 40);
            rect(0, 0, 40, height);
            rect(width - 40, 0, 40, height);
        }

        function renderTitle(cx) {
            let cyan = hexToRgb(params.cyanColor);
            let pulse = 0.5 + 0.5 * sin(time * 0.8);

            noStroke();
            fill(cyan.r, cyan.g, cyan.b, (0.6 + 0.3 * pulse) * 255);
            textAlign(CENTER, CENTER);
            textFont('Lora');
            textSize(28);
            text('記憶之錨', cx, height - 120);

            fill(107, 107, 141, 150);
            textFont('Poppins');
            textSize(12);
            text('Anchor of Memory — Nayuta', cx, height - 88);

            let orange = hexToRgb(params.orangeColor);
            fill(orange.r, orange.g, orange.b, (0.3 + 0.2 * pulse) * 255);
            textSize(10);
            text('深淵侵蝕度: ' + nf(params.erosionIntensity * 100, 1, 0) + '%', cx, height - 65);
        }

        function updateParam(name, value) {
            let numVal = parseFloat(value);
            params[name] = numVal;
            document.getElementById(name + '-value').textContent = numVal;
            initializeSystem();
        }

        function updateColor(colorId, value) {
            params[colorId] = value;
            document.getElementById(colorId + '-value').textContent = value;
        }

        function updateSeedDisplay() {
            document.getElementById('seed-input').value = params.seed;
        }

        function updateSeed() {
            let input = document.getElementById('seed-input');
            let newSeed = parseInt(input.value);
            if (newSeed && newSeed > 0) {
                params.seed = newSeed;
                initializeSystem();
            } else {
                updateSeedDisplay();
            }
        }

        function previousSeed() {
            params.seed = Math.max(1, params.seed - 1);
            updateSeedDisplay();
            initializeSystem();
        }

        function nextSeed() {
            params.seed = params.seed + 1;
            updateSeedDisplay();
            initializeSystem();
        }

        function randomSeedAndUpdate() {
            params.seed = Math.floor(Math.random() * 999999) + 1;
            updateSeedDisplay();
            initializeSystem();
        }

        function resetParameters() {
            params = JSON.parse(JSON.stringify(defaultParams));
            document.getElementById('orbitalRings').value = params.orbitalRings;
            document.getElementById('orbitalRings-value').textContent = params.orbitalRings;
            document.getElementById('runeCount').value = params.runeCount;
            document.getElementById('runeCount-value').textContent = params.runeCount;
            document.getElementById('erosionIntensity').value = params.erosionIntensity;
            document.getElementById('erosionIntensity-value').textContent = params.erosionIntensity;
            document.getElementById('pulseSpeed').value = params.pulseSpeed;
            document.getElementById('pulseSpeed-value').textContent = params.pulseSpeed;
            document.getElementById('fragmentCount').value = params.fragmentCount;
            document.getElementById('fragmentCount-value').textContent = params.fragmentCount;
            document.getElementById('cyanColor').value = params.cyanColor;
            document.getElementById('cyanColor-value').textContent = params.cyanColor;
            document.getElementById('orangeColor').value = params.orangeColor;
            document.getElementById('orangeColor-value').textContent = params.orangeColor;
            document.getElementById('bgColor').value = params.bgColor;
            document.getElementById('bgColor-value').textContent = params.bgColor;
            updateSeedDisplay();
            initializeSystem();
        }

        window.addEventListener('load', function() {
            updateSeedDisplay();
        });
    </script>
</body>
