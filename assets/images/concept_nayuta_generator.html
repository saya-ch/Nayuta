<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nayuta — 主角概念图生成器</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0A0E1A; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        canvas { display: block; }
    </style>
</head>
<body>
    <canvas id="canvas" width="1024" height="1024"></canvas>
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const W = 1024, H = 1024;

        ctx.fillStyle = '#0A0E1A';
        ctx.fillRect(0, 0, W, H);

        const bgGrad = ctx.createRadialGradient(W * 0.5, H * 0.4, 0, W * 0.5, H * 0.4, W * 0.6);
        bgGrad.addColorStop(0, 'rgba(26, 16, 53, 0.4)');
        bgGrad.addColorStop(0.5, 'rgba(15, 21, 40, 0.3)');
        bgGrad.addColorStop(1, 'rgba(10, 14, 26, 0)');
        ctx.fillStyle = bgGrad;
        ctx.fillRect(0, 0, W, H);

        for (let i = 0; i < 200; i++) {
            const x = Math.random() * W;
            const y = Math.random() * H;
            const s = Math.random() * 2 + 0.3;
            const a = Math.random() * 0.6 + 0.1;
            ctx.beginPath();
            ctx.arc(x, y, s, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(232, 230, 240, ${a})`;
            ctx.fill();
        }

        const cx = W * 0.5;
        const cy = H * 0.45;

        const bodyGrad = ctx.createRadialGradient(cx, cy + 60, 0, cx, cy + 60, 200);
        bodyGrad.addColorStop(0, 'rgba(0, 255, 212, 0.06)');
        bodyGrad.addColorStop(1, 'rgba(10, 14, 26, 0)');
        ctx.fillStyle = bodyGrad;
        ctx.fillRect(0, 0, W, H);

        ctx.save();
        ctx.translate(cx, cy);

        ctx.fillStyle = '#1A1035';
        ctx.beginPath();
        ctx.ellipse(0, 80, 55, 100, 0, 0, Math.PI * 2);
        ctx.fill();

        const cloakGrad = ctx.createLinearGradient(-60, -20, 60, 180);
        cloakGrad.addColorStop(0, '#2D1B69');
        cloakGrad.addColorStop(0.5, '#1A1035');
        cloakGrad.addColorStop(1, '#0A0E1A');
        ctx.fillStyle = cloakGrad;
        ctx.beginPath();
        ctx.moveTo(-55, -10);
        ctx.quadraticCurveTo(-70, 80, -50, 180);
        ctx.lineTo(50, 180);
        ctx.quadraticCurveTo(70, 80, 55, -10);
        ctx.closePath();
        ctx.fill();

        ctx.strokeStyle = 'rgba(0, 255, 212, 0.15)';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(-55, -10);
        ctx.quadraticCurveTo(-70, 80, -50, 180);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(55, -10);
        ctx.quadraticCurveTo(70, 80, 50, 180);
        ctx.stroke();

        ctx.fillStyle = '#E8E6F0';
        ctx.beginPath();
        ctx.ellipse(0, -50, 35, 40, 0, 0, Math.PI * 2);
        ctx.fill();

        const skinGrad = ctx.createRadialGradient(-5, -55, 0, 0, -50, 40);
        skinGrad.addColorStop(0, '#F0EEF5');
        skinGrad.addColorStop(1, '#D8D5E0');
        ctx.fillStyle = skinGrad;
        ctx.fill();

        ctx.fillStyle = '#0A0E1A';
        ctx.beginPath();
        ctx.ellipse(-20, -20, 35, 30, -0.2, -Math.PI * 0.5, Math.PI * 0.8);
        ctx.fill();
        ctx.beginPath();
        ctx.ellipse(20, -20, 35, 30, 0.2, Math.PI * 0.2, Math.PI * 1.5, true);
        ctx.fill();

        ctx.fillStyle = '#1A1035';
        ctx.beginPath();
        ctx.moveTo(-40, -55);
        ctx.quadraticCurveTo(-50, -100, -20, -120);
        ctx.quadraticCurveTo(0, -135, 20, -120);
        ctx.quadraticCurveTo(50, -100, 40, -55);
        ctx.quadraticCurveTo(30, -70, 0, -75);
        ctx.quadraticCurveTo(-30, -70, -40, -55);
        ctx.closePath();
        ctx.fill();

        ctx.fillStyle = '#0A0E1A';
        ctx.beginPath();
        ctx.moveTo(-30, -65);
        ctx.quadraticCurveTo(-35, -95, -10, -110);
        ctx.quadraticCurveTo(0, -115, 10, -110);
        ctx.quadraticCurveTo(35, -95, 30, -65);
        ctx.quadraticCurveTo(20, -78, 0, -80);
        ctx.quadraticCurveTo(-20, -78, -30, -65);
        ctx.closePath();
        ctx.fill();

        ctx.fillStyle = '#00FFD4';
        ctx.shadowColor = '#00FFD4';
        ctx.shadowBlur = 15;
        ctx.beginPath();
        ctx.ellipse(10, -52, 5, 6, 0.1, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.ellipse(-10, -52, 5, 6, -0.1, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowBlur = 0;

        ctx.fillStyle = '#0A0E1A';
        ctx.beginPath();
        ctx.ellipse(10, -51, 2.5, 3.5, 0.1, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.ellipse(-10, -51, 2.5, 3.5, -0.1, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = '#FFFFFF';
        ctx.beginPath();
        ctx.ellipse(11, -53, 1, 1.5, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.ellipse(-9, -53, 1, 1.5, 0, 0, Math.PI * 2);
        ctx.fill();

        ctx.strokeStyle = 'rgba(0, 255, 212, 0.3)';
        ctx.lineWidth = 0.5;
        ctx.beginPath();
        ctx.moveTo(-15, -40);
        ctx.quadraticCurveTo(0, -35, 15, -40);
        ctx.stroke();

        ctx.fillStyle = 'rgba(232, 230, 240, 0.1)';
        ctx.beginPath();
        ctx.ellipse(0, -30, 8, 3, 0, 0, Math.PI * 2);
        ctx.fill();

        for (let i = 0; i < 30; i++) {
            const angle = Math.random() * Math.PI * 2;
            const dist = 120 + Math.random() * 80;
            const px = Math.cos(angle) * dist;
            const py = Math.sin(angle) * dist - 20;
            const s = Math.random() * 3 + 1;
            const a = Math.random() * 0.4 + 0.1;
            ctx.beginPath();
            ctx.arc(px, py, s, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(0, 255, 212, ${a})`;
            ctx.fill();
        }

        ctx.restore();

        ctx.fillStyle = '#E8E6F0';
        ctx.font = '600 28px "Segoe UI", system-ui, sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText('NAYUTA', cx, H * 0.82);

        ctx.fillStyle = '#6B6B8D';
        ctx.font = '300 16px "Segoe UI", system-ui, sans-serif';
        ctx.fillText('那由他 — 深渊行者', cx, H * 0.86);

        ctx.fillStyle = '#6B6B8D';
        ctx.font = '300 12px "Segoe UI", system-ui, sans-serif';
        ctx.fillText('Concept Art — Procedural Generation', cx, H * 0.92);
    </script>
</body>
</html>
