<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abyssal Memory — 深渊记忆场景概念图</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.7.0/p5.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&family=Lora:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --anthropic-dark: #141413;
            --anthropic-light: #faf9f5;
            --anthropic-mid-gray: #b0aea5;
            --anthropic-light-gray: #e8e6dc;
            --anthropic-orange: #d97757;
            --anthropic-blue: #6a9bcc;
            --anthropic-green: #788c5d;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, var(--anthropic-light) 0%, #f5f3ee 100%);
            min-height: 100vh;
            color: var(--anthropic-dark);
        }

        .container { display: flex; min-height: 100vh; padding: 20px; gap: 20px; }

        .sidebar {
            width: 320px; flex-shrink: 0;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 24px; border-radius: 12px;
            box-shadow: 0 10px 30px rgba(20, 20, 19, 0.1);
            overflow-y: auto; overflow-x: hidden;
        }

        .sidebar h1 { font-family: 'Lora', serif; font-size: 24px; font-weight: 500; color: var(--anthropic-dark); margin-bottom: 8px; }
        .sidebar .subtitle { color: var(--anthropic-mid-gray); font-size: 14px; margin-bottom: 32px; line-height: 1.4; }

        .control-section { margin-bottom: 32px; }
        .control-section h3 { font-size: 16px; font-weight: 600; color: var(--anthropic-dark); margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
        .control-section h3::before { content: '•'; color: var(--anthropic-orange); font-weight: bold; }

        .seed-input {
            width: 100%; background: var(--anthropic-light); padding: 12px;
            border-radius: 8px; font-family: 'Courier New', monospace; font-size: 14px;
            margin-bottom: 12px; border: 1px solid var(--anthropic-light-gray); text-align: center;
        }
        .seed-input:focus { outline: none; border-color: var(--anthropic-orange); box-shadow: 0 0 0 2px rgba(217, 119, 87, 0.1); background: white; }

        .seed-controls { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }
        .regen-button { margin-bottom: 0; }

        .control-group { margin-bottom: 20px; }
        .control-group label { display: block; font-size: 14px; font-weight: 500; color: var(--anthropic-dark); margin-bottom: 8px; }
        .slider-container { display: flex; align-items: center; gap: 12px; }
        .slider-container input[type="range"] { flex: 1; height: 4px; background: var(--anthropic-light-gray); border-radius: 2px; outline: none; -webkit-appearance: none; }
        .slider-container input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 16px; height: 16px; background: var(--anthropic-orange); border-radius: 50%; cursor: pointer; transition: all 0.2s ease; }
        .slider-container input[type="range"]::-webkit-slider-thumb:hover { transform: scale(1.1); background: #c86641; }
        .value-display { font-family: 'Courier New', monospace; font-size: 12px; color: var(--anthropic-mid-gray); min-width: 60px; text-align: right; }

        .color-group { margin-bottom: 16px; }
        .color-group label { display: block; font-size: 12px; color: var(--anthropic-mid-gray); margin-bottom: 4px; }
        .color-picker-container { display: flex; align-items: center; gap: 8px; }
        .color-picker-container input[type="color"] { width: 32px; height: 32px; border: none; border-radius: 6px; cursor: pointer; background: none; padding: 0; }
        .color-value { font-family: 'Courier New', monospace; font-size: 12px; color: var(--anthropic-mid-gray); }

        .button { background: var(--anthropic-orange); color: white; border: none; padding: 10px 16px; border-radius: 6px; font-size: 14px; font-weight: 500; cursor: pointer; transition: all 0.2s ease; width: 100%; }
        .button:hover { background: #c86641; transform: translateY(-1px); }
        .button:active { transform: translateY(0); }
        .button.secondary { background: var(--anthropic-blue); }
        .button.secondary:hover { background: #5a8bb8; }
        .button.tertiary { background: var(--anthropic-green); }
        .button.tertiary:hover { background: #6b7b52; }
        .button-row { display: flex; gap: 8px; }
        .button-row .button { flex: 1; }

        .canvas-area { flex: 1; display: flex; align-items: center; justify-content: center; min-width: 0; }
        #canvas-container { width: 100%; max-width: 1000px; border-radius: 12px; overflow: hidden; box-shadow: 0 20px 40px rgba(20, 20, 19, 0.1); background: #0A0E1A; }
        #canvas-container canvas { display: block; width: 100% !important; height: auto !important; }

        @media (max-width: 600px) { .container { flex-direction: column; } .sidebar { width: 100%; } .canvas-area { padding: 20px; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <h1>Abyssal Memory</h1>
            <div class="subtitle">深渊记忆场景概念图 — Nayuta</div>

            <div class="control-section">
                <h3>Seed</h3>
                <input type="number" id="seed-input" class="seed-input" value="42" onchange="updateSeed()">
                <div class="seed-controls">
                    <button class="button secondary" onclick="previousSeed()">← Prev</button>
                    <button class="button secondary" onclick="nextSeed()">Next →</button>
                </div>
                <button class="button tertiary regen-button" onclick="randomSeedAndUpdate()">↻ Random</button>
            </div>

            <div class="control-section">
                <h3>Parameters</h3>
                <div class="control-group">
                    <label>深渊深度</label>
                    <div class="slider-container">
                        <input type="range" id="depthLevel" min="0" max="3" step="1" value="0" oninput="updateParam('depthLevel', this.value)">
                        <span class="value-display" id="depthLevel-value">0</span>
                    </div>
                </div>
                <div class="control-group">
                    <label>记忆碎片数</label>
                    <div class="slider-container">
                        <input type="range" id="fragmentCount" min="5" max="40" step="1" value="15" oninput="updateParam('fragmentCount', this.value)">
                        <span class="value-display" id="fragmentCount-value">15</span>
                    </div>
                </div>
                <div class="control-group">
                    <label>侵蚀强度</label>
                    <div class="slider-container">
                        <input type="range" id="erosionIntensity" min="0" max="1" step="0.05" value="0.3" oninput="updateParam('erosionIntensity', this.value)">
                        <span class="value-display" id="erosionIntensity-value">0.3</span>
                    </div>
                </div>
                <div class="control-group">
                    <label>荧光脉冲</label>
                    <div class="slider-container">
                        <input type="range" id="glowPulse" min="0.1" max="2.0" step="0.1" value="0.8" oninput="updateParam('glowPulse', this.value)">
                        <span class="value-display" id="glowPulse-value">0.8</span>
                    </div>
                </div>
                <div class="control-group">
                    <label>雾气浓度</label>
                    <div class="slider-container">
                        <input type="range" id="fogDensity" min="0" max="1" step="0.05" value="0.4" oninput="updateParam('fogDensity', this.value)">
                        <span class="value-display" id="fogDensity-value">0.4</span>
                    </div>
                </div>
            </div>

            <div class="control-section">
                <h3>Colors</h3>
                <div class="color-group">
                    <label>深渊底色</label>
                    <div class="color-picker-container">
                        <input type="color" id="color1" value="#0A0E1A" onchange="updateColor('color1', this.value)">
                        <span class="color-value" id="color1-value">#0A0E1A</span>
                    </div>
                </div>
                <div class="color-group">
                    <label>荧光青</label>
                    <div class="color-picker-container">
                        <input type="color" id="color2" value="#00FFD4" onchange="updateColor('color2', this.value)">
                        <span class="color-value" id="color2-value">#00FFD4</span>
                    </div>
                </div>
                <div class="color-group">
                    <label>虚空橙</label>
                    <div class="color-picker-container">
                        <input type="color" id="color3" value="#FF6B35" onchange="updateColor('color3', this.value)">
                        <span class="color-value" id="color3-value">#FF6B35</span>
                    </div>
                </div>
            </div>

            <div class="control-section">
                <h3>Actions</h3>
                <div class="button-row">
                    <button class="button" onclick="resetParameters()">Reset</button>
                </div>
            </div>
        </div>

        <div class="canvas-area">
            <div id="canvas-container">
                <div class="loading">Initializing generative art...</div>
            </div>
        </div>
    </div>

    <script>
        let params = {
            seed: 42,
            depthLevel: 0,
            fragmentCount: 15,
            erosionIntensity: 0.3,
            glowPulse: 0.8,
            fogDensity: 0.4,
            colorPalette: ['#0A0E1A', '#00FFD4', '#FF6B35']
        };

        let defaultParams = {...params};
        let fragments = [];
        let driftParticles = [];
        let fogLayers = [];
        let cracks = [];
        let time = 0;

        const depthConfigs = [
            { bg1: '#0F1A2E', bg2: '#1A2744', fog: '26, 39, 68', accent: '0, 255, 212', name: '浅层记忆' },
            { bg1: '#0F0A20', bg2: '#1A1035', fog: '26, 16, 53', accent: '138, 43, 226', name: '中层记忆' },
            { bg1: '#1A0510', bg2: '#2A0A1A', fog: '42, 10, 26', accent: '255, 107, 53', name: '深层记忆' },
            { bg1: '#050003', bg2: '#0A0005', fog: '10, 0, 5', accent: '255, 0, 68', name: '最深层' },
        ];

        function setup() {
            let canvas = createCanvas(1200, 800);
            canvas.parent('canvas-container');
            initializeSystem();
            document.querySelector('.loading').style.display = 'none';
        }

        function initializeSystem() {
            randomSeed(params.seed);
            noiseSeed(params.seed);
            time = 0;

            fragments = [];
            for (let i = 0; i < params.fragmentCount; i++) {
                fragments.push({
                    x: random(100, width - 100),
                    y: random(80, height - 80),
                    size: random(4, 14),
                    shape: floor(random(3)),
                    phase: random(TWO_PI),
                    speed: random(0.3, 1.2),
                    drift: random(-0.3, 0.3),
                    brightness: random(0.4, 1.0),
                    depth: random(),
                });
            }

            driftParticles = [];
            for (let i = 0; i < 200; i++) {
                driftParticles.push({
                    x: random(width),
                    y: random(height),
                    vx: random(-0.3, 0.3),
                    vy: random(-0.8, -0.1),
                    size: random(0.5, 3),
                    alpha: random(0.05, 0.3),
                    phase: random(TWO_PI),
                });
            }

            fogLayers = [];
            for (let i = 0; i < 5; i++) {
                fogLayers.push({
                    cx: random(width * 0.2, width * 0.8),
                    cy: random(height * 0.2, height * 0.8),
                    r: random(150, 400),
                    phase: random(TWO_PI),
                    speed: random(0.0003, 0.001),
                });
            }

            cracks = [];
            const crackCount = floor(params.erosionIntensity * 8) + 1;
            for (let i = 0; i < crackCount; i++) {
                let cx = random(width);
                let cy = random(height);
                let segs = [];
                let angle = random(TWO_PI);
                let segCount = floor(random(3, 8));
                for (let j = 0; j < segCount; j++) {
                    let len = random(15, 50);
                    let nx = cx + cos(angle) * len;
                    let ny = cy + sin(angle) * len;
                    segs.push({ x1: cx, y1: cy, x2: nx, y2: ny });
                    cx = nx;
                    cy = ny;
                    angle += random(-0.6, 0.6);
                }
                cracks.push({ segments: segs, growth: 0, maxGrowth: segCount });
            }
        }

        function draw() {
            time += deltaTime * 0.001;
            const cfg = depthConfigs[params.depthLevel];

            background(cfg.bg1);

            drawDepthGradient(cfg);
            drawFogLayers(cfg);
            drawCracks(cfg);
            drawDriftParticles(cfg);
            drawFragments(cfg);
            drawErosionOverlay(cfg);
            drawVignette();
        }

        function drawDepthGradient(cfg) {
            noStroke();
            for (let y = 0; y < height; y += 4) {
                let t = y / height;
                let c = lerpColor(color(cfg.bg1), color(cfg.bg2), t);
                c.setAlpha(255);
                fill(c);
                rect(0, y, width, 4);
            }

            let cx = width * 0.5;
            let cy = height * 0.3;
            let radGrad = drawingContext.createRadialGradient(cx, cy, 0, cx, cy, width * 0.5);
            radGrad.addColorStop(0, `rgba(${cfg.accent}, 0.015)`);
            radGrad.addColorStop(0.5, `rgba(${cfg.fog}, 0.15)`);
            radGrad.addColorStop(1, 'rgba(10, 14, 26, 0)');
            drawingContext.fillStyle = radGrad;
            drawingContext.fillRect(0, 0, width, height);
        }

        function drawFogLayers(cfg) {
            let breathCycle = sin(time * 0.8) * 0.5 + 0.5;
            for (let fog of fogLayers) {
                let driftX = sin(time * fog.speed * 1000 + fog.phase) * 40;
                let driftY = cos(time * fog.speed * 800 + fog.phase) * 25;
                let r = fog.r * (0.8 + breathCycle * 0.3);
                let cx = fog.cx + driftX;
                let cy = fog.cy + driftY;
                let fogAlpha = params.fogDensity * 0.5;

                let grad = drawingContext.createRadialGradient(cx, cy, 0, cx, cy, r);
                grad.addColorStop(0, `rgba(${cfg.fog}, ${fogAlpha * 0.5})`);
                grad.addColorStop(0.4, `rgba(${cfg.fog}, ${fogAlpha * 0.2})`);
                grad.addColorStop(1, 'rgba(10, 14, 26, 0)');
                drawingContext.fillStyle = grad;
                drawingContext.fillRect(0, 0, width, height);
            }
        }

        function drawCracks(cfg) {
            if (params.erosionIntensity < 0.1) return;
            for (let crack of cracks) {
                crack.growth = min(crack.growth + 0.01, crack.maxGrowth);
                let visibleSegs = floor(crack.growth);
                for (let i = 0; i < min(visibleSegs, crack.segments.length); i++) {
                    let seg = crack.segments[i];
                    let flicker = sin(time * 5 + i * 0.5) * 0.3 + 0.7;
                    let alpha = params.erosionIntensity * 0.4 * flicker;

                    stroke(255, 107, 53, alpha * 255);
                    strokeWeight(1.5);
                    line(seg.x1, seg.y1, seg.x2, seg.y2);

                    stroke(255, 200, 150, alpha * 0.4 * 255);
                    strokeWeight(0.5);
                    line(seg.x1, seg.y1, seg.x2, seg.y2);
                }
            }
        }

        function drawDriftParticles(cfg) {
            noStroke();
            for (let p of driftParticles) {
                p.x += p.vx;
                p.y += p.vy;
                if (p.y < -10) { p.y = height + 10; p.x = random(width); }
                if (p.x < -10) p.x = width + 10;
                if (p.x > width + 10) p.x = -10;

                let twinkle = 0.5 + 0.5 * sin(time * 3 + p.phase);
                let alpha = p.alpha * twinkle;

                if (params.depthLevel >= 2 && random() < 0.3) {
                    fill(255, 107, 53, alpha * 255);
                } else if (params.depthLevel >= 1 && random() < 0.35) {
                    fill(138, 43, 226, alpha * 255);
                } else {
                    fill(232, 230, 240, alpha * 255);
                }
                ellipse(p.x, p.y, p.size);
            }
        }

        function drawFragments(cfg) {
            for (let frag of fragments) {
                let floatY = sin(time * frag.speed + frag.phase) * 5;
                let pulse = sin(time * params.glowPulse + frag.phase) * 0.3 + 0.7;
                let fx = frag.x + sin(time * 0.5 + frag.drift) * 3;
                let fy = frag.y + floatY;

                let glowR = frag.size * 4;
                let grad = drawingContext.createRadialGradient(fx, fy, 0, fx, fy, glowR);
                grad.addColorStop(0, `rgba(${cfg.accent}, ${0.12 * pulse * frag.brightness})`);
                grad.addColorStop(1, `rgba(${cfg.accent}, 0)`);
                drawingContext.fillStyle = grad;
                drawingContext.fillRect(fx - glowR, fy - glowR, glowR * 2, glowR * 2);

                noStroke();
                fill(color(`rgba(${cfg.accent}, ${0.6 * pulse * frag.brightness})`));
                if (frag.shape === 0) {
                    drawDiamond(fx, fy, frag.size);
                } else if (frag.shape === 1) {
                    drawTriangle(fx, fy, frag.size);
                } else {
                    ellipse(fx, fy, frag.size * 1.2);
                }

                fill(255, 255, 255, 80 * pulse * frag.brightness);
                ellipse(fx, fy, frag.size * 0.3);
            }
        }

        function drawDiamond(x, y, s) {
            beginShape();
            vertex(x, y - s);
            vertex(x + s * 0.6, y);
            vertex(x, y + s);
            vertex(x - s * 0.6, y);
            endShape(CLOSE);
        }

        function drawTriangle(x, y, s) {
            beginShape();
            vertex(x, y - s);
            vertex(x + s * 0.866, y + s * 0.5);
            vertex(x - s * 0.866, y + s * 0.5);
            endShape(CLOSE);
        }

        function drawErosionOverlay(cfg) {
            if (params.erosionIntensity < 0.05) return;
            let intensity = params.erosionIntensity;

            if (intensity > 0.3) {
                for (let y = 0; y < height; y += 3) {
                    let scanAlpha = intensity * 0.03;
                    if (random() < 0.05) scanAlpha *= 3;
                    stroke(10, 14, 26, scanAlpha * 255);
                    strokeWeight(1);
                    line(0, y, width, y);
                }
            }

            if (intensity > 0.5) {
                let bleedAlpha = (intensity - 0.5) * 0.08;
                noStroke();
                fill(255, 0, 68, bleedAlpha * 255);
                rect(0, 0, width, height);
            }
        }

        function drawVignette() {
            let cx = width / 2;
            let cy = height / 2;
            let maxR = sqrt(cx * cx + cy * cy);
            let strength = 0.3 + params.depthLevel * 0.12;
            let grad = drawingContext.createRadialGradient(cx, cy, maxR * 0.4, cx, cy, maxR);
            grad.addColorStop(0, 'rgba(10, 14, 26, 0)');
            grad.addColorStop(1, `rgba(10, 14, 26, ${strength})`);
            drawingContext.fillStyle = grad;
            drawingContext.fillRect(0, 0, width, height);
        }

        function updateParam(name, value) {
            params[name] = parseFloat(value);
            document.getElementById(name + '-value').textContent = value;
            if (name === 'depthLevel' || name === 'fragmentCount' || name === 'erosionIntensity') {
                initializeSystem();
            }
        }

        function updateColor(colorId, value) {
            let idx = parseInt(colorId.replace('color', '')) - 1;
            params.colorPalette[idx] = value;
            document.getElementById(colorId + '-value').textContent = value;
        }

        function updateSeedDisplay() { document.getElementById('seed-input').value = params.seed; }
        function updateSeed() { let v = parseInt(document.getElementById('seed-input').value); if (v && v > 0) { params.seed = v; initializeSystem(); } else { updateSeedDisplay(); } }
        function previousSeed() { params.seed = Math.max(1, params.seed - 1); updateSeedDisplay(); initializeSystem(); }
        function nextSeed() { params.seed++; updateSeedDisplay(); initializeSystem(); }
        function randomSeedAndUpdate() { params.seed = Math.floor(Math.random() * 999999) + 1; updateSeedDisplay(); initializeSystem(); }

        function resetParameters() {
            params = {...defaultParams};
            document.getElementById('depthLevel').value = params.depthLevel;
            document.getElementById('depthLevel-value').textContent = params.depthLevel;
            document.getElementById('fragmentCount').value = params.fragmentCount;
            document.getElementById('fragmentCount-value').textContent = params.fragmentCount;
            document.getElementById('erosionIntensity').value = params.erosionIntensity;
            document.getElementById('erosionIntensity-value').textContent = params.erosionIntensity;
            document.getElementById('glowPulse').value = params.glowPulse;
            document.getElementById('glowPulse-value').textContent = params.glowPulse;
            document.getElementById('fogDensity').value = params.fogDensity;
            document.getElementById('fogDensity-value').textContent = params.fogDensity;
            document.getElementById('color1').value = params.colorPalette[0];
            document.getElementById('color1-value').textContent = params.colorPalette[0];
            document.getElementById('color2').value = params.colorPalette[1];
            document.getElementById('color2-value').textContent = params.colorPalette[1];
            document.getElementById('color3').value = params.colorPalette[2];
            document.getElementById('color3-value').textContent = params.colorPalette[2];
            updateSeedDisplay();
            initializeSystem();
        }

        window.addEventListener('load', function() { updateSeedDisplay(); });
    </script>
</body>
</html>
