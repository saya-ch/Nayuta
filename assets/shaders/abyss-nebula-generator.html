<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abyss Nebula Generator</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.7.0/p5.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&family=Lora:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --anthropic-dark: #141413;
            --anthropic-light: #faf9f5;
            --anthropic-mid-gray: #b0aea5;
            --anthropic-light-gray: #e8e6dc;
            --anthropic-orange: #d97757;
            --anthropic-blue: #6a9bcc;
            --anthropic-green: #788c5d;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, var(--anthropic-light) 0%, #f5f3ee 100%);
            min-height: 100vh;
            color: var(--anthropic-dark);
        }
        .container { display: flex; min-height: 100vh; padding: 20px; gap: 20px; }
        .sidebar {
            width: 320px; flex-shrink: 0;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 24px; border-radius: 12px;
            box-shadow: 0 10px 30px rgba(20, 20, 19, 0.1);
            overflow-y: auto; overflow-x: hidden;
        }
        .sidebar h1 { font-family: 'Lora', serif; font-size: 24px; font-weight: 500; color: var(--anthropic-dark); margin-bottom: 8px; }
        .sidebar .subtitle { color: var(--anthropic-mid-gray); font-size: 14px; margin-bottom: 32px; line-height: 1.4; }
        .control-section { margin-bottom: 32px; }
        .control-section h3 { font-size: 16px; font-weight: 600; color: var(--anthropic-dark); margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
        .control-section h3::before { content: '•'; color: var(--anthropic-orange); font-weight: bold; }
        .seed-input {
            width: 100%; background: var(--anthropic-light); padding: 12px;
            border-radius: 8px; font-family: 'Courier New', monospace; font-size: 14px;
            margin-bottom: 12px; border: 1px solid var(--anthropic-light-gray); text-align: center;
        }
        .seed-input:focus { outline: none; border-color: var(--anthropic-orange); box-shadow: 0 0 0 2px rgba(217, 119, 87, 0.1); background: white; }
        .seed-controls { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }
        .regen-button { margin-bottom: 0; }
        .control-group { margin-bottom: 20px; }
        .control-group label { display: block; font-size: 14px; font-weight: 500; color: var(--anthropic-dark); margin-bottom: 8px; }
        .slider-container { display: flex; align-items: center; gap: 12px; }
        .slider-container input[type="range"] { flex: 1; height: 4px; background: var(--anthropic-light-gray); border-radius: 2px; outline: none; -webkit-appearance: none; }
        .slider-container input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 16px; height: 16px; background: var(--anthropic-orange); border-radius: 50%; cursor: pointer; transition: all 0.2s ease; }
        .slider-container input[type="range"]::-webkit-slider-thumb:hover { transform: scale(1.1); background: #c86641; }
        .slider-container input[type="range"]::-moz-range-thumb { width: 16px; height: 16px; background: var(--anthropic-orange); border-radius: 50%; border: none; cursor: pointer; }
        .value-display { font-family: 'Courier New', monospace; font-size: 12px; color: var(--anthropic-mid-gray); min-width: 60px; text-align: right; }
        .color-group { margin-bottom: 16px; }
        .color-group label { display: block; font-size: 12px; color: var(--anthropic-mid-gray); margin-bottom: 4px; }
        .color-picker-container { display: flex; align-items: center; gap: 8px; }
        .color-picker-container input[type="color"] { width: 32px; height: 32px; border: none; border-radius: 6px; cursor: pointer; background: none; padding: 0; }
        .color-value { font-family: 'Courier New', monospace; font-size: 12px; color: var(--anthropic-mid-gray); }
        .button {
            background: var(--anthropic-orange); color: white; border: none;
            padding: 10px 16px; border-radius: 6px; font-size: 14px; font-weight: 500;
            cursor: pointer; transition: all 0.2s ease; width: 100%;
        }
        .button:hover { background: #c86641; transform: translateY(-1px); }
        .button:active { transform: translateY(0); }
        .button.secondary { background: var(--anthropic-blue); }
        .button.secondary:hover { background: #5a8bb8; }
        .button.tertiary { background: var(--anthropic-green); }
        .button.tertiary:hover { background: #6b7b52; }
        .button-row { display: flex; gap: 8px; }
        .button-row .button { flex: 1; }
        .canvas-area { flex: 1; display: flex; align-items: center; justify-content: center; min-width: 0; }
        #canvas-container { width: 100%; max-width: 1000px; border-radius: 12px; overflow: hidden; box-shadow: 0 20px 40px rgba(20, 20, 19, 0.1); background: #000; }
        #canvas-container canvas { display: block; width: 100% !important; height: auto !important; }
        .loading { display: flex; align-items: center; justify-content: center; font-size: 18px; color: var(--anthropic-mid-gray); }
        @media (max-width: 600px) { .container { flex-direction: column; } .sidebar { width: 100%; } .canvas-area { padding: 20px; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <h1>Abyss Nebula</h1>
            <div class="subtitle">Multi-layered cosmic nebula generator for Nayuta's deepest abyss backgrounds. Domain-warped noise fields with depth parallax and erosion.</div>
            <div class="control-section">
                <h3>Seed</h3>
                <input type="number" id="seed-input" class="seed-input" value="42" onchange="updateSeed()">
                <div class="seed-controls">
                    <button class="button secondary" onclick="previousSeed()">← Prev</button>
                    <button class="button secondary" onclick="nextSeed()">Next →</button>
                </div>
                <button class="button tertiary regen-button" onclick="randomSeedAndUpdate()">↻ Random</button>
            </div>
            <div class="control-section">
                <h3>Nebula Structure</h3>
                <div class="control-group">
                    <label>Warp Iterations</label>
                    <div class="slider-container">
                        <input type="range" id="warpIterations" min="1" max="6" step="1" value="4" oninput="updateParam('warpIterations', this.value)">
                        <span class="value-display" id="warpIterations-value">4</span>
                    </div>
                </div>
                <div class="control-group">
                    <label>Warp Strength</label>
                    <div class="slider-container">
                        <input type="range" id="warpStrength" min="0.5" max="4.0" step="0.1" value="2.0" oninput="updateParam('warpStrength', this.value)">
                        <span class="value-display" id="warpStrength-value">2.0</span>
                    </div>
                </div>
                <div class="control-group">
                    <label>Noise Scale</label>
                    <div class="slider-container">
                        <input type="range" id="noiseScale" min="0.002" max="0.02" step="0.001" value="0.006" oninput="updateParam('noiseScale', this.value)">
                        <span class="value-display" id="noiseScale-value">0.006</span>
                    </div>
                </div>
                <div class="control-group">
                    <label>Depth Layers</label>
                    <div class="slider-container">
                        <input type="range" id="depthLayers" min="2" max="6" step="1" value="4" oninput="updateParam('depthLayers', this.value)">
                        <span class="value-display" id="depthLayers-value">4</span>
                    </div>
                </div>
            </div>
            <div class="control-section">
                <h3>Visual</h3>
                <div class="control-group">
                    <label>Erosion Intensity</label>
                    <div class="slider-container">
                        <input type="range" id="erosionIntensity" min="0.0" max="1.0" step="0.05" value="0.4" oninput="updateParam('erosionIntensity', this.value)">
                        <span class="value-display" id="erosionIntensity-value">0.4</span>
                    </div>
                </div>
                <div class="control-group">
                    <label>Star Density</label>
                    <div class="slider-container">
                        <input type="range" id="starDensity" min="50" max="500" step="10" value="200" oninput="updateParam('starDensity', this.value)">
                        <span class="value-display" id="starDensity-value">200</span>
                    </div>
                </div>
                <div class="control-group">
                    <label>Glow Radius</label>
                    <div class="slider-container">
                        <input type="range" id="glowRadius" min="0.2" max="2.0" step="0.1" value="0.8" oninput="updateParam('glowRadius', this.value)">
                        <span class="value-display" id="glowRadius-value">0.8</span>
                    </div>
                </div>
            </div>
            <div class="control-section">
                <h3>Colors</h3>
                <div class="color-group">
                    <label>Outer Veil</label>
                    <div class="color-picker-container">
                        <input type="color" id="color1" value="#0a2040" onchange="updateColor('color1', this.value)">
                        <span class="color-value" id="color1-value">#0a2040</span>
                    </div>
                </div>
                <div class="color-group">
                    <label>Mid Strata</label>
                    <div class="color-picker-container">
                        <input type="color" id="color2" value="#1a1035" onchange="updateColor('color2', this.value)">
                        <span class="color-value" id="color2-value">#1a1035</span>
                    </div>
                </div>
                <div class="color-group">
                    <label>Inner Core</label>
                    <div class="color-picker-container">
                        <input type="color" id="color3" value="#2a0a1a" onchange="updateColor('color3', this.value)">
                        <span class="color-value" id="color3-value">#2a0a1a</span>
                    </div>
                </div>
                <div class="color-group">
                    <label>Accent Glow</label>
                    <div class="color-picker-container">
                        <input type="color" id="color4" value="#00ffd4" onchange="updateColor('color4', this.value)">
                        <span class="color-value" id="color4-value">#00ffd4</span>
                    </div>
                </div>
            </div>
            <div class="control-section">
                <h3>Actions</h3>
                <div class="button-row">
                    <button class="button" onclick="resetParameters()">Reset</button>
                    <button class="button tertiary" onclick="downloadPNG()">Download PNG</button>
                </div>
            </div>
        </div>
        <div class="canvas-area">
            <div id="canvas-container">
                <div class="loading">Generating abyss nebula...</div>
            </div>
        </div>
    </div>
    <script>
        let params = {
            seed: 42,
            warpIterations: 4,
            warpStrength: 2.0,
            noiseScale: 0.006,
            depthLayers: 4,
            erosionIntensity: 0.4,
            starDensity: 200,
            glowRadius: 0.8,
            colorPalette: ['#0a2040', '#1a1035', '#2a0a1a', '#00ffd4']
        };
        let defaultParams = JSON.parse(JSON.stringify(params));

        let nebulaBuffer;
        let stars = [];
        let rendering = false;

        function setup() {
            let canvas = createCanvas(1280, 720);
            canvas.parent('canvas-container');
            nebulaBuffer = createGraphics(1280, 720);
            nebulaBuffer.pixelDensity(1);
            pixelDensity(1);
            document.querySelector('.loading').style.display = 'none';
            generateNebula();
        }

        function generateNebula() {
            randomSeed(params.seed);
            noiseSeed(params.seed);

            nebulaBuffer.loadPixels();
            let w = nebulaBuffer.width;
            let h = nebulaBuffer.height;

            let c1 = color(params.colorPalette[0]);
            let c2 = color(params.colorPalette[1]);
            let c3 = color(params.colorPalette[2]);
            let cAccent = color(params.colorPalette[3]);

            for (let y = 0; y < h; y++) {
                for (let x = 0; x < w; x++) {
                    let idx = (y * w + x) * 4;

                    let nx = x * params.noiseScale;
                    let ny = y * params.noiseScale;

                    let wx = nx;
                    let wy = ny;
                    for (let i = 0; i < params.warpIterations; i++) {
                        let offset = i * 100;
                        let dx = noise(wx + offset, wy + offset) - 0.5;
                        let dy = noise(wx + offset + 50, wy + offset + 50) - 0.5;
                        wx = nx + dx * params.warpStrength;
                        wy = ny + dy * params.warpStrength;
                    }

                    let n1 = noise(wx, wy);
                    let n2 = noise(wx + 200, wy + 200);
                    let n3 = noise(wx + 400, wy + 400);

                    let depthFactor = y / h;

                    let r, g, b;
                    if (depthFactor < 0.33) {
                        let t = depthFactor / 0.33;
                        let blended = lerpColor(c1, c2, t);
                        let nBlend = n1;
                        r = red(blended) * (0.3 + 0.7 * nBlend);
                        g = green(blended) * (0.3 + 0.7 * nBlend);
                        b = blue(blended) * (0.3 + 0.7 * nBlend);
                    } else if (depthFactor < 0.66) {
                        let t = (depthFactor - 0.33) / 0.33;
                        let blended = lerpColor(c2, c3, t);
                        let nBlend = n2;
                        r = red(blended) * (0.3 + 0.7 * nBlend);
                        g = green(blended) * (0.3 + 0.7 * nBlend);
                        b = blue(blended) * (0.3 + 0.7 * nBlend);
                    } else {
                        let t = (depthFactor - 0.66) / 0.34;
                        let blended = lerpColor(c3, color(5, 0, 3), t);
                        let nBlend = n3;
                        r = red(blended) * (0.2 + 0.8 * nBlend);
                        g = green(blended) * (0.2 + 0.8 * nBlend);
                        b = blue(blended) * (0.2 + 0.8 * nBlend);
                    }

                    let accentNoise = noise(wx * 1.5 + 600, wy * 1.5 + 600);
                    if (accentNoise > 0.62) {
                        let accentStrength = map(accentNoise, 0.62, 1.0, 0, 1);
                        accentStrength = accentStrength * accentStrength;
                        r = lerp(r, red(cAccent), accentStrength * 0.3);
                        g = lerp(g, green(cAccent), accentStrength * 0.3);
                        b = lerp(b, blue(cAccent), accentStrength * 0.3);
                    }

                    let erosionNoise = noise(wx * 2 + 800, wy * 2 + 800);
                    if (erosionNoise < params.erosionIntensity * 0.5) {
                        let erosionFactor = map(erosionNoise, 0, params.erosionIntensity * 0.5, 1, 0);
                        r *= (1 - erosionFactor * 0.7);
                        g *= (1 - erosionFactor * 0.7);
                        b *= (1 - erosionFactor * 0.7);
                    }

                    let vignette = 1 - Math.pow(dist(x, y, w / 2, h / 2) / (w * 0.7), 2);
                    vignette = constrain(vignette, 0, 1);
                    r *= vignette;
                    g *= vignette;
                    b *= vignette;

                    nebulaBuffer.pixels[idx] = constrain(r, 0, 255);
                    nebulaBuffer.pixels[idx + 1] = constrain(g, 0, 255);
                    nebulaBuffer.pixels[idx + 2] = constrain(b, 0, 255);
                    nebulaBuffer.pixels[idx + 3] = 255;
                }
            }
            nebulaBuffer.updatePixels();

            generateStars();
        }

        function generateStars() {
            stars = [];
            randomSeed(params.seed + 9999);
            for (let i = 0; i < params.starDensity; i++) {
                stars.push({
                    x: random(width),
                    y: random(height),
                    size: random(0.5, 2.5),
                    brightness: random(0.3, 1.0),
                    twinklePhase: random(TWO_PI),
                    twinkleSpeed: random(0.01, 0.05),
                    depth: random() < 0.3 ? 0 : (random() < 0.6 ? 1 : 2),
                });
            }
        }

        function draw() {
            background(0);
            image(nebulaBuffer, 0, 0);

            let time = frameCount * 0.016;

            for (let s of stars) {
                let twinkle = 0.5 + 0.5 * sin(time * s.twinkleSpeed * 60 + s.twinklePhase);
                let alpha = s.brightness * twinkle;

                if (s.depth === 2) {
                    let glow = s.size * params.glowRadius * 4;
                    noStroke();
                    fill(200, 220, 255, alpha * 30);
                    ellipse(s.x, s.y, glow, glow);
                }

                noStroke();
                if (s.size > 1.5) {
                    fill(200, 230, 255, alpha * 200);
                } else {
                    fill(255, 255, 255, alpha * 255);
                }
                ellipse(s.x, s.y, s.size, s.size);
            }

            let pulseAlpha = 5 + 3 * sin(time * 0.5);
            noStroke();
            fill(red(color(params.colorPalette[3])), green(color(params.colorPalette[3])), blue(color(params.colorPalette[3])), pulseAlpha);
            rect(0, 0, width, height);
        }

        function updateParam(paramName, value) {
            let numVal = parseFloat(value);
            params[paramName] = numVal;
            document.getElementById(paramName + '-value').textContent = value;
            generateNebula();
        }

        function updateColor(colorId, value) {
            let idx = parseInt(colorId.replace('color', '')) - 1;
            params.colorPalette[idx] = value;
            document.getElementById(colorId + '-value').textContent = value;
            generateNebula();
        }

        function updateSeedDisplay() {
            document.getElementById('seed-input').value = params.seed;
        }

        function updateSeed() {
            let input = document.getElementById('seed-input');
            let newSeed = parseInt(input.value);
            if (newSeed && newSeed > 0) {
                params.seed = newSeed;
                generateNebula();
            } else {
                updateSeedDisplay();
            }
        }

        function previousSeed() {
            params.seed = Math.max(1, params.seed - 1);
            updateSeedDisplay();
            generateNebula();
        }

        function nextSeed() {
            params.seed = params.seed + 1;
            updateSeedDisplay();
            generateNebula();
        }

        function randomSeedAndUpdate() {
            params.seed = Math.floor(Math.random() * 999999) + 1;
            updateSeedDisplay();
            generateNebula();
        }

        function resetParameters() {
            params = JSON.parse(JSON.stringify(defaultParams));
            document.getElementById('warpIterations').value = params.warpIterations;
            document.getElementById('warpIterations-value').textContent = params.warpIterations;
            document.getElementById('warpStrength').value = params.warpStrength;
            document.getElementById('warpStrength-value').textContent = params.warpStrength;
            document.getElementById('noiseScale').value = params.noiseScale;
            document.getElementById('noiseScale-value').textContent = params.noiseScale;
            document.getElementById('depthLayers').value = params.depthLayers;
            document.getElementById('depthLayers-value').textContent = params.depthLayers;
            document.getElementById('erosionIntensity').value = params.erosionIntensity;
            document.getElementById('erosionIntensity-value').textContent = params.erosionIntensity;
            document.getElementById('starDensity').value = params.starDensity;
            document.getElementById('starDensity-value').textContent = params.starDensity;
            document.getElementById('glowRadius').value = params.glowRadius;
            document.getElementById('glowRadius-value').textContent = params.glowRadius;
            document.getElementById('color1').value = params.colorPalette[0];
            document.getElementById('color1-value').textContent = params.colorPalette[0];
            document.getElementById('color2').value = params.colorPalette[1];
            document.getElementById('color2-value').textContent = params.colorPalette[1];
            document.getElementById('color3').value = params.colorPalette[2];
            document.getElementById('color3-value').textContent = params.colorPalette[2];
            document.getElementById('color4').value = params.colorPalette[3];
            document.getElementById('color4-value').textContent = params.colorPalette[3];
            updateSeedDisplay();
            generateNebula();
        }

        function downloadPNG() {
            saveCanvas('abyss-nebula-seed-' + params.seed, 'png');
        }

        window.addEventListener('load', function() {
            updateSeedDisplay();
        });
    </script>
</body>
</html>
