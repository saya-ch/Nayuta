<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abyssal Genesis — 深渊创世</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.7.0/p5.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&family=Lora:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --anthropic-dark: #141413;
            --anthropic-light: #faf9f5;
            --anthropic-mid-gray: #b0aea5;
            --anthropic-light-gray: #e8e6dc;
            --anthropic-orange: #d97757;
            --anthropic-blue: #6a9bcc;
            --anthropic-green: #788c5d;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, var(--anthropic-light) 0%, #f5f3ee 100%);
            min-height: 100vh;
            color: var(--anthropic-dark);
        }
        .container { display: flex; min-height: 100vh; padding: 20px; gap: 20px; }
        .sidebar {
            width: 320px; flex-shrink: 0;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 24px; border-radius: 12px;
            box-shadow: 0 10px 30px rgba(20, 20, 19, 0.1);
            overflow-y: auto; overflow-x: hidden;
        }
        .sidebar h1 { font-family: 'Lora', serif; font-size: 24px; font-weight: 500; color: var(--anthropic-dark); margin-bottom: 8px; }
        .sidebar .subtitle { color: var(--anthropic-mid-gray); font-size: 14px; margin-bottom: 32px; line-height: 1.4; }
        .control-section { margin-bottom: 32px; }
        .control-section h3 { font-size: 16px; font-weight: 600; color: var(--anthropic-dark); margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
        .control-section h3::before { content: '•'; color: var(--anthropic-orange); font-weight: bold; }
        .seed-input { width: 100%; background: var(--anthropic-light); padding: 12px; border-radius: 8px; font-family: 'Courier New', monospace; font-size: 14px; margin-bottom: 12px; border: 1px solid var(--anthropic-light-gray); text-align: center; }
        .seed-input:focus { outline: none; border-color: var(--anthropic-orange); box-shadow: 0 0 0 2px rgba(217, 119, 87, 0.1); background: white; }
        .seed-controls { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }
        .regen-button { margin-bottom: 0; }
        .control-group { margin-bottom: 20px; }
        .control-group label { display: block; font-size: 14px; font-weight: 500; color: var(--anthropic-dark); margin-bottom: 8px; }
        .slider-container { display: flex; align-items: center; gap: 12px; }
        .slider-container input[type="range"] { flex: 1; height: 4px; background: var(--anthropic-light-gray); border-radius: 2px; outline: none; -webkit-appearance: none; }
        .slider-container input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 16px; height: 16px; background: var(--anthropic-orange); border-radius: 50%; cursor: pointer; transition: all 0.2s ease; }
        .slider-container input[type="range"]::-webkit-slider-thumb:hover { transform: scale(1.1); background: #c86641; }
        .slider-container input[type="range"]::-moz-range-thumb { width: 16px; height: 16px; background: var(--anthropic-orange); border-radius: 50%; border: none; cursor: pointer; }
        .value-display { font-family: 'Courier New', monospace; font-size: 12px; color: var(--anthropic-mid-gray); min-width: 60px; text-align: right; }
        .color-group { margin-bottom: 16px; }
        .color-group label { display: block; font-size: 12px; color: var(--anthropic-mid-gray); margin-bottom: 4px; }
        .color-picker-container { display: flex; align-items: center; gap: 8px; }
        .color-picker-container input[type="color"] { width: 32px; height: 32px; border: none; border-radius: 6px; cursor: pointer; background: none; padding: 0; }
        .color-value { font-family: 'Courier New', monospace; font-size: 12px; color: var(--anthropic-mid-gray); }
        .button { background: var(--anthropic-orange); color: white; border: none; padding: 10px 16px; border-radius: 6px; font-size: 14px; font-weight: 500; cursor: pointer; transition: all 0.2s ease; width: 100%; }
        .button:hover { background: #c86641; transform: translateY(-1px); }
        .button:active { transform: translateY(0); }
        .button.secondary { background: var(--anthropic-blue); }
        .button.secondary:hover { background: #5a8bb8; }
        .button.tertiary { background: var(--anthropic-green); }
        .button.tertiary:hover { background: #6b7b52; }
        .button-row { display: flex; gap: 8px; }
        .button-row .button { flex: 1; }
        .canvas-area { flex: 1; display: flex; align-items: center; justify-content: center; min-width: 0; }
        #canvas-container { width: 100%; max-width: 1000px; border-radius: 12px; overflow: hidden; box-shadow: 0 20px 40px rgba(20, 20, 19, 0.1); background: #0A0E1A; }
        #canvas-container canvas { display: block; width: 100% !important; height: auto !important; }
        .loading { display: flex; align-items: center; justify-content: center; font-size: 18px; color: var(--anthropic-mid-gray); }
        @media (max-width: 600px) { .container { flex-direction: column; } .sidebar { width: 100%; } .canvas-area { padding: 20px; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <h1>Abyssal Genesis</h1>
            <div class="subtitle">深渊创世 — 从虚无中诞生的维度，混沌中涌现的秩序</div>

            <div class="control-section">
                <h3>Seed</h3>
                <input type="number" id="seed-input" class="seed-input" value="42" onchange="updateSeed()">
                <div class="seed-controls">
                    <button class="button secondary" onclick="previousSeed()">← Prev</button>
                    <button class="button secondary" onclick="nextSeed()">Next →</button>
                </div>
                <button class="button tertiary regen-button" onclick="randomSeedAndUpdate()">↻ Random</button>
            </div>

            <div class="control-section">
                <h3>Parameters</h3>
                <div class="control-group">
                    <label>Particle Count</label>
                    <div class="slider-container">
                        <input type="range" id="particleCount" min="200" max="2000" step="100" value="800" oninput="updateParam('particleCount', this.value)">
                        <span class="value-display" id="particleCount-value">800</span>
                    </div>
                </div>
                <div class="control-group">
                    <label>Gravity Strength</label>
                    <div class="slider-container">
                        <input type="range" id="gravityStrength" min="0.1" max="3.0" step="0.1" value="1.0" oninput="updateParam('gravityStrength', this.value)">
                        <span class="value-display" id="gravityStrength-value">1.0</span>
                    </div>
                </div>
                <div class="control-group">
                    <label>Breath Speed</label>
                    <div class="slider-container">
                        <input type="range" id="breathSpeed" min="0.02" max="0.2" step="0.01" value="0.08" oninput="updateParam('breathSpeed', this.value)">
                        <span class="value-display" id="breathSpeed-value">0.08</span>
                    </div>
                </div>
                <div class="control-group">
                    <label>Crystal Threshold</label>
                    <div class="slider-container">
                        <input type="range" id="crystalThreshold" min="2" max="12" step="1" value="5" oninput="updateParam('crystalThreshold', this.value)">
                        <span class="value-display" id="crystalThreshold-value">5</span>
                    </div>
                </div>
                <div class="control-group">
                    <label>Erosion Intensity</label>
                    <div class="slider-container">
                        <input type="range" id="erosionIntensity" min="0" max="1.0" step="0.05" value="0.3" oninput="updateParam('erosionIntensity', this.value)">
                        <span class="value-display" id="erosionIntensity-value">0.3</span>
                    </div>
                </div>
                <div class="control-group">
                    <label>Genesis Pulse</label>
                    <div class="slider-container">
                        <input type="range" id="genesisPulse" min="0.5" max="5.0" step="0.5" value="2.0" oninput="updateParam('genesisPulse', this.value)">
                        <span class="value-display" id="genesisPulse-value">2.0</span>
                    </div>
                </div>
            </div>

            <div class="control-section">
                <h3>Colors</h3>
                <div class="color-group">
                    <label>Abyss Base</label>
                    <div class="color-picker-container">
                        <input type="color" id="colorBase" value="#0A0E1A" onchange="updateColor('colorBase', this.value)">
                        <span class="color-value" id="colorBase-value">#0A0E1A</span>
                    </div>
                </div>
                <div class="color-group">
                    <label>Fluorescent Cyan</label>
                    <div class="color-picker-container">
                        <input type="color" id="colorCyan" value="#00FFD4" onchange="updateColor('colorCyan', this.value)">
                        <span class="color-value" id="colorCyan-value">#00FFD4</span>
                    </div>
                </div>
                <div class="color-group">
                    <label>Void Orange</label>
                    <div class="color-picker-container">
                        <input type="color" id="colorOrange" value="#FF6B35" onchange="updateColor('colorOrange', this.value)">
                        <span class="color-value" id="colorOrange-value">#FF6B35</span>
                    </div>
                </div>
            </div>

            <div class="control-section">
                <h3>Actions</h3>
                <div class="button-row">
                    <button class="button" onclick="resetParameters()">Reset</button>
                </div>
            </div>
        </div>

        <div class="canvas-area">
            <div id="canvas-container">
                <div class="loading">Initializing Abyssal Genesis...</div>
            </div>
        </div>
    </div>

    <script>
        let params = {
            seed: 42,
            particleCount: 800,
            gravityStrength: 1.0,
            breathSpeed: 0.08,
            crystalThreshold: 5,
            erosionIntensity: 0.3,
            genesisPulse: 2.0,
            colorBase: '#0A0E1A',
            colorCyan: '#00FFD4',
            colorOrange: '#FF6B35'
        };

        let defaultParams = JSON.parse(JSON.stringify(params));

        let particles = [];
        let crystals = [];
        let genesisWaves = [];
        let erosionCracks = [];
        let time = 0;
        let breathPhase = 0;
        let lastPulseTime = 0;

        function hexToRgb(hex) {
            let r = parseInt(hex.slice(1, 3), 16);
            let g = parseInt(hex.slice(3, 5), 16);
            let b = parseInt(hex.slice(5, 7), 16);
            return { r, g, b };
        }

        function setup() {
            let canvas = createCanvas(1200, 800);
            canvas.parent('canvas-container');
            initializeSystem();
            document.querySelector('.loading').style.display = 'none';
        }

        function initializeSystem() {
            randomSeed(params.seed);
            noiseSeed(params.seed);
            particles = [];
            crystals = [];
            genesisWaves = [];
            erosionCracks = [];
            time = 0;
            breathPhase = 0;
            lastPulseTime = 0;

            for (let i = 0; i < params.particleCount; i++) {
                let angle = random(TWO_PI);
                let dist = random(10, 400);
                particles.push({
                    x: width / 2 + cos(angle) * dist,
                    y: height / 2 + sin(angle) * dist,
                    vx: random(-0.5, 0.5),
                    vy: random(-0.5, 0.5),
                    age: random(0, 200),
                    maxAge: random(300, 800),
                    size: random(1.5, 4),
                    phase: random(TWO_PI),
                    crystallized: false,
                    crystalId: -1,
                    trail: []
                });
            }

            for (let i = 0; i < 8; i++) {
                spawnErosionCrack();
            }

            background(params.colorBase);
        }

        function spawnErosionCrack() {
            let edge = floor(random(4));
            let x, y, angle;
            if (edge === 0) { x = random(width); y = 0; angle = random(0.3, 2.8); }
            else if (edge === 1) { x = width; y = random(height); angle = random(1.8, 4.3); }
            else if (edge === 2) { x = random(width); y = height; angle = random(3.5, 5.9); }
            else { x = 0; y = random(height); angle = random(5.0, 7.5); }

            erosionCracks.push({
                x, y, angle,
                length: 0,
                maxLength: random(80, 300),
                speed: random(0.3, 1.2),
                branches: [],
                noiseOffset: random(1000)
            });
        }

        function draw() {
            let baseRgb = hexToRgb(params.colorBase);
            fill(baseRgb.r, baseRgb.g, baseRgb.b, 15);
            noStroke();
            rect(0, 0, width, height);

            time++;
            breathPhase += params.breathSpeed;

            let breathValue = sin(breathPhase) * 0.5 + 0.5;
            let secondaryBreath = sin(breathPhase * 3.1 + 1.7) * 0.3;
            let combinedBreath = breathValue + secondaryBreath;

            let cx = width / 2;
            let cy = height / 2;

            if (combinedBreath > 0.85 && time - lastPulseTime > 60 / params.genesisPulse) {
                lastPulseTime = time;
                genesisWaves.push({
                    x: cx, y: cy,
                    radius: 5,
                    maxRadius: max(width, height) * 0.8,
                    speed: 3 + params.genesisPulse,
                    alpha: 1.0
                });

                let burstCount = floor(random(8, 20));
                for (let i = 0; i < burstCount && particles.length < params.particleCount * 1.5; i++) {
                    let angle = random(TWO_PI);
                    let speed = random(1, 4) * params.gravityStrength;
                    particles.push({
                        x: cx + random(-5, 5),
                        y: cy + random(-5, 5),
                        vx: cos(angle) * speed,
                        vy: sin(angle) * speed,
                        age: 0,
                        maxAge: random(300, 800),
                        size: random(1.5, 4),
                        phase: random(TWO_PI),
                        crystallized: false,
                        crystalId: -1,
                        trail: []
                    });
                }
            }

            let singularityRadius = 20 + combinedBreath * 40;
            let cyanRgb = hexToRgb(params.colorCyan);
            let orangeRgb = hexToRgb(params.colorOrange);

            for (let layer = 3; layer >= 0; layer--) {
                let r = singularityRadius * (1 + layer * 0.8);
                let alpha = (0.15 - layer * 0.03) * (0.5 + combinedBreath * 0.5);
                fill(cyanRgb.r, cyanRgb.g, cyanRgb.b, alpha * 255);
                noStroke();
                ellipse(cx, cy, r * 2, r * 2);
            }

            fill(255, 255, 255, 200 + combinedBreath * 55);
            ellipse(cx, cy, 6 + combinedBreath * 4, 6 + combinedBreath * 4);

            for (let i = 0; i < 6; i++) {
                let rayAngle = breathPhase * 0.3 + i * PI / 3;
                let rayLen = singularityRadius * 2 + combinedBreath * 60;
                stroke(cyanRgb.r, cyanRgb.g, cyanRgb.b, 40 + combinedBreath * 40);
                strokeWeight(1);
                line(cx, cy, cx + cos(rayAngle) * rayLen, cy + sin(rayAngle) * rayLen);
            }

            for (let w = genesisWaves.length - 1; w >= 0; w--) {
                let wave = genesisWaves[w];
                wave.radius += wave.speed;
                wave.alpha *= 0.985;

                if (wave.alpha < 0.01 || wave.radius > wave.maxRadius) {
                    genesisWaves.splice(w, 1);
                    continue;
                }

                noFill();
                let waveCyan = lerpColor(color(cyanRgb.r, cyanRgb.g, cyanRgb.b), color(orangeRgb.r, orangeRgb.g, orangeRgb.b), wave.radius / wave.maxRadius);
                stroke(red(waveCyan), green(waveCyan), blue(waveCyan), wave.alpha * 120);
                strokeWeight(2);
                ellipse(wave.x, wave.y, wave.radius * 2, wave.radius * 2);
            }

            let gravity = params.gravityStrength * 0.02;
            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                if (p.crystallized) continue;

                p.age++;
                if (p.age > p.maxAge) {
                    particles.splice(i, 1);
                    continue;
                }

                let dx = cx - p.x;
                let dy = cy - p.y;
                let dist = sqrt(dx * dx + dy * dy) + 1;
                let force = gravity / (dist * 0.01 + 1);

                let noiseVal = noise(p.x * 0.003, p.y * 0.003, time * 0.005);
                let noiseAngle = noiseVal * TWO_PI * 4;

                p.vx += (dx / dist) * force + cos(noiseAngle) * 0.15;
                p.vy += (dy / dist) * force + sin(noiseAngle) * 0.15;

                p.vx *= 0.98;
                p.vy *= 0.98;

                p.x += p.vx;
                p.y += p.vy;

                p.trail.push({ x: p.x, y: p.y });
                if (p.trail.length > 8) p.trail.shift();

                let ageRatio = p.age / p.maxAge;
                let pr, pg, pb, pa;
                if (ageRatio < 0.2) {
                    let t = ageRatio / 0.2;
                    pr = lerp(255, cyanRgb.r, t);
                    pg = lerp(255, cyanRgb.g, t);
                    pb = lerp(255, cyanRgb.b, t);
                    pa = 200 + (1 - t) * 55;
                } else if (ageRatio < 0.7) {
                    let t = (ageRatio - 0.2) / 0.5;
                    pr = lerp(cyanRgb.r, baseRgb.r + 30, t);
                    pg = lerp(cyanRgb.g, baseRgb.g + 20, t);
                    pb = lerp(cyanRgb.b, baseRgb.b + 40, t);
                    pa = lerp(180, 100, t);
                } else {
                    let t = (ageRatio - 0.7) / 0.3;
                    pr = lerp(baseRgb.r + 30, orangeRgb.r, t);
                    pg = lerp(baseRgb.g + 20, orangeRgb.g, t);
                    pb = lerp(baseRgb.b + 40, orangeRgb.b, t);
                    pa = lerp(100, 40, t);
                }

                if (p.trail.length > 1) {
                    noFill();
                    stroke(pr, pg, pb, pa * 0.3);
                    strokeWeight(p.size * 0.5);
                    beginShape();
                    for (let pt of p.trail) {
                        vertex(pt.x, pt.y);
                    }
                    endShape();
                }

                noStroke();
                fill(pr, pg, pb, pa);
                let pSize = p.size * (1 + 0.3 * sin(time * 0.05 + p.phase));
                ellipse(p.x, p.y, pSize, pSize);
            }

            if (time % 30 === 0) {
                checkCrystallization();
            }

            for (let c = crystals.length - 1; c >= 0; c--) {
                let crystal = crystals[c];
                crystal.life++;

                if (crystal.life > crystal.maxLife) {
                    for (let pid of crystal.particleIds) {
                        let idx = particles.findIndex(p => p.crystalId === c);
                        if (idx >= 0) {
                            particles[idx].crystallized = false;
                            particles[idx].crystalId = -1;
                        }
                    }
                    crystals.splice(c, 1);
                    continue;
                }

                let lifeRatio = crystal.life / crystal.maxLife;
                let alpha = lifeRatio < 0.1 ? lifeRatio / 0.1 : (lifeRatio > 0.8 ? (1 - lifeRatio) / 0.2 : 1.0);

                push();
                translate(crystal.x, crystal.y);
                rotate(crystal.rotation + time * 0.002);

                stroke(cyanRgb.r, cyanRgb.g, cyanRgb.b, alpha * 150);
                strokeWeight(1.5);
                noFill();

                if (crystal.shape === 0) {
                    beginShape();
                    for (let a = 0; a < 6; a++) {
                        let angle = a * PI / 3;
                        vertex(cos(angle) * crystal.size, sin(angle) * crystal.size);
                    }
                    endShape(CLOSE);
                } else if (crystal.shape === 1) {
                    beginShape();
                    for (let a = 0; a < 3; a++) {
                        let angle = a * TWO_PI / 3 - PI / 2;
                        vertex(cos(angle) * crystal.size, sin(angle) * crystal.size);
                    }
                    endShape(CLOSE);
                } else {
                    beginShape();
                    vertex(0, -crystal.size);
                    vertex(crystal.size * 0.6, 0);
                    vertex(0, crystal.size);
                    vertex(-crystal.size * 0.6, 0);
                    endShape(CLOSE);
                }

                if (crystal.life < 10) {
                    noFill();
                    stroke(cyanRgb.r, cyanRgb.g, cyanRgb.b, alpha * 80);
                    strokeWeight(1);
                    let pulseR = crystal.size * 2 * (crystal.life / 10);
                    ellipse(0, 0, pulseR * 2, pulseR * 2);
                }

                pop();
            }

            if (params.erosionIntensity > 0) {
                renderErosion();
            }
        }

        function checkCrystallization() {
            let grid = {};
            let cellSize = 30;

            for (let i = 0; i < particles.length; i++) {
                let p = particles[i];
                if (p.crystallized || p.age < 50) continue;
                let gx = floor(p.x / cellSize);
                let gy = floor(p.y / cellSize);
                let key = gx + ',' + gy;
                if (!grid[key]) grid[key] = [];
                grid[key].push(i);
            }

            for (let key in grid) {
                if (grid[key].length >= params.crystalThreshold) {
                    let indices = grid[key];
                    let avgX = 0, avgY = 0;
                    for (let idx of indices) {
                        avgX += particles[idx].x;
                        avgY += particles[idx].y;
                    }
                    avgX /= indices.length;
                    avgY /= indices.length;

                    let crystalId = crystals.length;
                    let newCrystal = {
                        x: avgX,
                        y: avgY,
                        size: random(15, 35),
                        shape: floor(random(3)),
                        rotation: random(TWO_PI),
                        life: 0,
                        maxLife: random(200, 500),
                        particleIds: []
                    };

                    for (let idx of indices) {
                        particles[idx].crystallized = true;
                        particles[idx].crystalId = crystalId;
                        newCrystal.particleIds.push(idx);
                    }

                    crystals.push(newCrystal);
                }
            }
        }

        function renderErosion() {
            let orangeRgb = hexToRgb(params.colorOrange);

            for (let i = erosionCracks.length - 1; i >= 0; i--) {
                let crack = erosionCracks[i];
                if (crack.length < crack.maxLength) {
                    crack.length += crack.speed;
                    let nx = crack.x + cos(crack.angle) * crack.length;
                    let ny = crack.y + sin(crack.angle) * crack.length;

                    let noiseAngle = noise(nx * 0.005, ny * 0.005, crack.noiseOffset) * PI - PI / 2;
                    crack.angle += noiseAngle * 0.1;

                    if (random() < 0.05 && crack.branches.length < 3) {
                        crack.branches.push({
                            x: nx, y: ny,
                            angle: crack.angle + random(-0.8, 0.8),
                            length: 0,
                            maxLength: crack.maxLength * 0.4
                        });
                    }
                }

                let alpha = params.erosionIntensity * 120;
                stroke(orangeRgb.r, orangeRgb.g, orangeRgb.b, alpha);
                strokeWeight(1.5);

                let startX = crack.x;
                let startY = crack.y;
                for (let step = 0; step < crack.length; step += 3) {
                    let t = step / crack.maxLength;
                    let sx = startX + cos(crack.angle) * step;
                    let sy = startY + sin(crack.angle) * step;
                    let ex = startX + cos(crack.angle) * min(step + 3, crack.length);
                    let ey = startY + sin(crack.angle) * min(step + 3, crack.length);
                    line(sx, sy, ex, ey);
                }

                for (let b of crack.branches) {
                    if (b.length < b.maxLength) b.length += crack.speed * 0.7;
                    let bx = b.x + cos(b.angle) * b.length;
                    let by = b.y + sin(b.angle) * b.length;
                    stroke(orangeRgb.r, orangeRgb.g, orangeRgb.b, alpha * 0.6);
                    strokeWeight(1);
                    line(b.x, b.y, bx, by);
                }
            }

            if (time % 300 === 0 && erosionCracks.length < 15) {
                spawnErosionCrack();
            }
        }

        function updateParam(paramName, value) {
            let numVal = parseFloat(value);
            params[paramName] = numVal;
            document.getElementById(paramName + '-value').textContent = numVal;
        }

        function updateColor(colorId, value) {
            params[colorId] = value;
            document.getElementById(colorId + '-value').textContent = value;
        }

        function updateSeedDisplay() {
            document.getElementById('seed-input').value = params.seed;
        }

        function updateSeed() {
            let input = document.getElementById('seed-input');
            let newSeed = parseInt(input.value);
            if (newSeed && newSeed > 0) {
                params.seed = newSeed;
                initializeSystem();
            } else {
                updateSeedDisplay();
            }
        }

        function previousSeed() {
            params.seed = Math.max(1, params.seed - 1);
            updateSeedDisplay();
            initializeSystem();
        }

        function nextSeed() {
            params.seed = params.seed + 1;
            updateSeedDisplay();
            initializeSystem();
        }

        function randomSeedAndUpdate() {
            params.seed = Math.floor(Math.random() * 999999) + 1;
            updateSeedDisplay();
            initializeSystem();
        }

        function resetParameters() {
            params = JSON.parse(JSON.stringify(defaultParams));
            document.getElementById('particleCount').value = params.particleCount;
            document.getElementById('particleCount-value').textContent = params.particleCount;
            document.getElementById('gravityStrength').value = params.gravityStrength;
            document.getElementById('gravityStrength-value').textContent = params.gravityStrength;
            document.getElementById('breathSpeed').value = params.breathSpeed;
            document.getElementById('breathSpeed-value').textContent = params.breathSpeed;
            document.getElementById('crystalThreshold').value = params.crystalThreshold;
            document.getElementById('crystalThreshold-value').textContent = params.crystalThreshold;
            document.getElementById('erosionIntensity').value = params.erosionIntensity;
            document.getElementById('erosionIntensity-value').textContent = params.erosionIntensity;
            document.getElementById('genesisPulse').value = params.genesisPulse;
            document.getElementById('genesisPulse-value').textContent = params.genesisPulse;
            document.getElementById('colorBase').value = params.colorBase;
            document.getElementById('colorBase-value').textContent = params.colorBase;
            document.getElementById('colorCyan').value = params.colorCyan;
            document.getElementById('colorCyan-value').textContent = params.colorCyan;
            document.getElementById('colorOrange').value = params.colorOrange;
            document.getElementById('colorOrange-value').textContent = params.colorOrange;
            updateSeedDisplay();
            initializeSystem();
        }

        window.addEventListener('load', function() {
            updateSeedDisplay();
        });
    </script>
</body>
</html>
