<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abyssal Vortex — 深渊漩涡</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.7.0/p5.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&family=Lora:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --anthropic-dark: #141413;
            --anthropic-light: #faf9f5;
            --anthropic-mid-gray: #b0aea5;
            --anthropic-light-gray: #e8e6dc;
            --anthropic-orange: #d97757;
            --anthropic-blue: #6a9bcc;
            --anthropic-green: #788c5d;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, var(--anthropic-light) 0%, #f5f3ee 100%);
            min-height: 100vh; color: var(--anthropic-dark);
        }
        .container { display: flex; min-height: 98vh; padding: 10px; gap: 20px; }
        .sidebar {
            width: 300px; flex-shrink: 0; background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px); padding: 18px; border-radius: 12px;
            box-shadow: 0 10px 30px rgba(20,20,19,0.1); overflow-y: auto;
        }
        .sidebar h1 { font-family: 'Lora', serif; font-size: 22px; font-weight: 500; margin-bottom: 4px; }
        .sidebar .subtitle { color: var(--anthropic-mid-gray); font-size: 12px; margin-bottom: 20px; line-height: 1.3; }
        .control-section { margin-bottom: 24px; }
        .control-section h3 { font-size: 14px; font-weight: 600; color: var(--anthropic-dark); margin-bottom: 12px; }
        .control-section h3::before { content: '•'; color: var(--anthropic-orange); font-weight: bold; margin-right: 6px; }
        .seed-input { width: 100%; background: var(--anthropic-light); padding: 10px; border-radius: 6px; font-family: 'Courier New', monospace; font-size: 13px; margin-bottom: 8px; border: 1px solid var(--anthropic-light-gray); text-align: center; }
        .seed-controls { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-bottom: 6px; }
        .control-group { margin-bottom: 16px; }
        .control-group label { display: block; font-size: 13px; font-weight: 500; color: var(--anthropic-dark); margin-bottom: 6px; }
        .slider-container { display: flex; align-items: center; gap: 10px; }
        .slider-container input[type="range"] { flex: 1; height: 3px; background: var(--anthropic-light-gray); border-radius: 2px; outline: none; -webkit-appearance: none; }
        .slider-container input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 14px; height: 14px; background: var(--anthropic-orange); border-radius: 50%; cursor: pointer; }
        .value-display { font-family: 'Courier New', monospace; font-size: 11px; color: var(--anthropic-mid-gray); min-width: 50px; text-align: right; }
        .color-group { margin-bottom: 14px; }
        .color-group label { display: block; font-size: 11px; color: var(--anthropic-mid-gray); margin-bottom: 3px; }
        .color-picker-container { display: flex; align-items: center; gap: 6px; }
        .color-picker-container input[type="color"] { width: 28px; height: 28px; border: none; border-radius: 5px; cursor: pointer; background: none; padding: 0; }
        .color-value { font-family: 'Courier New', monospace; font-size: 11px; color: var(--anthropic-mid-gray); }
        .button { background: var(--anthropic-orange); color: white; border: none; padding: 8px 12px; border-radius: 6px; font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.2s ease; width: 100%; }
        .button:hover { background: #c86641; transform: translateY(-1px); }
        .button.secondary { background: var(--anthropic-blue); }
        .button.secondary:hover { background: #5a8bb8; }
        .button.tertiary { background: var(--anthropic-green); }
        .button-row { display: flex; gap: 6px; }
        .button-row .button { flex: 1; }
        .canvas-area { flex: 1; display: flex; align-items: center; justify-content: center; min-width: 0; }
        #canvas-container { width: 100%; max-width: 1100px; border-radius: 12px; overflow: hidden; box-shadow: 0 20px 40px rgba(20,20,19,0.15); background: #0A0E1A; }
        #canvas-container canvas { display: block; width: 100% !important; height: auto !important; }
        @media (max-width: 600px) { .container { flex-direction: column; } .sidebar { width: 100%; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <h1>Abyssal Vortex</h1>
            <div class="subtitle">深渊漩涡 · 引力场+时空扭曲+记忆螺旋+维度折叠</div>

            <div class="control-section">
                <h3>Seed</h3>
                <input type="number" id="seed-input" class="seed-input" value="42" onchange="updateSeed()">
                <div class="seed-controls">
                    <button class="button secondary" onclick="previousSeed()">← Prev</button>
                    <button class="button secondary" onclick="nextSeed()">Next →</button>
                </div>
                <button class="button tertiary regen-button" onclick="randomSeedAndUpdate()">↻ Random</button>
            </div>

            <div class="control-section">
                <h3>Vortex Parameters</h3>

                <div class="control-group"><label>Particle Count</label><div class="slider-container"><input type="range" id="particleCount" min="200" max="1200" step="50" value="600" oninput="updateParam('particleCount', this.value)"><span class="value-display" id="particleCount-value">600</span></div></div>
                <div class="control-group"><label>Gravity Strength</label><div class="slider-container"><input type="range" id="gravityStrength" min="0.01" max="0.2" step="0.005" value="0.06" oninput="updateParam('gravityStrength', this.value)"><span class="value-display" id="gravityStrength-value">0.06</span></div></div>
                <div class="control-group"><label>Spiral Arms</label><div class="slider-container"><input type="range" id="spiralArms" min="2" max="8" step="1" value="4" oninput="updateParam('spiralArms', this.value)"><span class="value-display" id="spiralArms-value">4</span></div></div>
                <div class="control-group"><label>Angular Momentum</label><div class="slider-container"><input type="range" id="angularMomentum" min="0.002" max="0.03" step="0.001" value="0.012" oninput="updateParam('angularMomentum', this.value)"><span class="value-display" id="angularMomentum-value">0.012</span></div></div>
                <div class="control-group"><label>Memory Fragments</label><div class="slider-container"><input type="range" id="memoryFragments" min="0" max="30" step="1" value="16" oninput="updateParam('memoryFragments', this.value)"><span class="value-display" id="memoryFragments-value">16</span></div></div>
                <div class="control-group"><label>Erosion Intensity</label><div class="slider-container"><input type="range" id="erosionIntensity" min="0" max="1" step="0.05" value="0.35" oninput="updateParam('erosionIntensity', this.value)"><span class="value-display" id="erosionIntensity-value">0.35</span></div></div>
                <div class="control-group"><label>Time Warp</label><div class="slider-container"><input type="range" id="timeWarp" min="0" max="2" step="0.1" value="0.8" oninput="updateParam('timeWarp', this.value)"><span class="value-display" id="timeWarp-value">0.8</span></div></div>
            </div>

            <div class="control-section">
                <h3>Colors</h3>
                <div class="color-group"><label>Abyss Base</label><div class="color-picker-container"><input type="color" id="colorBase" value="#0A0E1A" onchange="updateColor('colorBase', this.value)"><span class="color-value" id="colorBase-value">#0A0E1A</span></div></div>
                <div class="color-group"><label>Cyan (Memory)</label><div class="color-picker-container"><input type="color" id="colorCyan" value="#00FFD4" onchange="updateColor('colorCyan', this.value)"><span class="color-value" id="colorCyan-value">#00FFD4</span></div></div>
                <div class="color-group"><label>Orange (Void)</label><div class="color-picker-container"><input type="color" id="colorOrange" value="#FF6B35" onchange="updateColor('colorOrange', this.value)"><span class="color-value" id="colorOrange-value">#FF6B35</span></div></div>
            </div>

            <div class="control-section">
                <h3>Actions</h3>
                <div class="button-row"><button class="button" onclick="resetParameters()">Reset</button><button class="button secondary" onclick="downloadPNG()">Download PNG</button></div>
            </div>
        </div>

        <div class="canvas-area"><div id="canvas-container"></div></div>
    </div>

    <script>
        let params = {
            seed: 42,
            particleCount: 600,
            gravityStrength: 0.06,
            spiralArms: 4,
            angularMomentum: 0.012,
            memoryFragments: 16,
            erosionIntensity: 0.35,
            timeWarp: 0.8,
            colorBase: '#0A0E1A',
            colorCyan: '#00FFD4',
            colorOrange: '#FF6B35'
        };
        let defaultParams = {...params};

        let particles = [];
        let fragments = [];
        let time = 0;

        function hexToRgb(hex) {
            const r = parseInt(hex.slice(1,3), 16), g = parseInt(hex.slice(3,5), 16), b = parseInt(hex.slice(5,7), 16);
            return {r, g, b};
        }

        function setup() {
            let canvas = createCanvas(1200, 800);
            canvas.parent('canvas-container');
            initializeSystem();
            document.querySelector('.loading')?.remove();
        }

        function initializeSystem() {
            randomSeed(params.seed);
            noiseSeed(params.seed);

            particles = [];
            for (let i = 0; i < params.particleCount; i++) {
                particles.push(new VortexParticle(i));
            }

            fragments = [];
            for (let i = 0; i < params.memoryFragments; i++) {
                fragments.push(new MemoryFragment(i));
            }

            time = 0;
        }

        class VortexParticle {
            constructor(idx) {
                this.reset(true);
                this.idx = idx;
            }

            reset(initial = false) {
                const angle = random(TWO_PI);
                const dist = random(50, 400);
                this.x = width/2 + cos(angle) * dist;
                this.y = height/2 + sin(angle) * dist * 0.65;
                this.vx = 0;
                this.vy = 0;
                this.size = random(0.8, 2.5);
                this.life = random(300, 900);
                this.maxLife = this.life;
                this.alpha = random(0.3, 0.9);
                this.isCyan = random() > 0.25;
                this.trail = [];
                this.trailMax = floor(random(6, 14));
                this.orbitPhase = random(TWO_PI);
                this.orbitSpeed = random(0.0008, 0.003) * (random() > 0.5 ? 1 : -1);
            }

            update(dt) {
                const cx = width / 2;
                const cy = height / 2;
                const dx = cx - this.x;
                const dy = cy - this.y;
                const distSq = dx * dx + dy * dy;
                const dist = sqrt(distSq + 1);

                const gravForce = params.gravityStrength * 800 / (dist + 80);
                const ax = (dx / dist) * gravForce;
                const ay = (dy / dist) * gravForce;

                const tangentX = -dy / dist;
                const tangentY = dx / dist;
                const swirl = params.angularMomentum * (150 / (dist + 30));

                this.vx += (ax + tangentX * swirl) * dt / 16;
                this.vy += (ay + tangentY * swirl) * dt / 16;
                this.vx *= 0.995;
                this.vy *= 0.995;

                if (frameCount % 2 === 0 && this.trail.length < this.trailMax) {
                    this.trail.push({x: this.x, y: this.y});
                }
                if (this.trail.length > this.trailMax) this.trail.shift();

                this.x += this.vx * dt / 16;
                this.y += this.vy * dt / 16;
                this.orbitPhase += this.orbitSpeed * dt;
                this.life -= dt;

                if (this.life <= 0 || dist < 8 || this.x < -50 || this.x > width+50 || this.y < -50 || this.y > height+50) {
                    this.reset();
                }
            }

            render(ctx) {
                const cx = width / 2;
                const cy = height / 2;
                const dx = this.x - cx;
                const dy = this.y - cy;
                const dist = sqrt(dx*dx + dy*dy);
                const lifeRatio = this.life / this.maxLife;
                const depthFactor = constrain(dist / 250, 0, 1);

                if (this.trail.length > 1) {
                    ctx.beginPath();
                    ctx.moveTo(this.trail[0].x, this.trail[0].y);
                    for (let t of this.trail) ctx.lineTo(t.x, t.y);
                    ctx.lineTo(this.x, this.y);
                    const baseAlpha = this.alpha * lifeRatio * 0.3 * (params.erosionIntensity < 0.5 ? 1 : 0.6);
                    if (this.isCyan) {
                        ctx.strokeStyle = `rgba(0,255,212,${baseAlpha})`;
                    } else {
                        const orangeMix = constrain((250-dist)/250, 0, 1);
                        ctx.strokeStyle = `rgba(${floor(255*orangeMix)},${floor(107+(148*(1-orangeMix)))},${floor(53+(159*(1-orangeMix)))},${baseAlpha})`;
                    }
                    ctx.lineWidth = this.size * 0.5;
                    ctx.stroke();
                }

                const pulse = sin(time * 0.003 + this.idx * 0.5) * 0.3 + 0.7;
                const finalAlpha = this.alpha * lifeRatio * pulse;

                ctx.globalAlpha = finalAlpha;
                if (this.isCyan) {
                    ctx.fillStyle = '#00FFD4';
                } else {
                    const orangeMix = constrain((280-dist)/280, 0, 1);
                    ctx.fillStyle = `rgb(${floor(255*orangeMix)},${floor(107+(148*(1-orangeMix)))},${floor(53+(159*(1-orangeMix)))})`;
                }
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, TWO_PI);
                ctx.fill();
                ctx.globalAlpha = 1;
            }
        }

        class MemoryFragment {
            constructor(idx) {
                this.armIndex = idx % params.spiralArms;
                this.angleOffset = (this.armIndex / params.spiralArms) * TWO_PI + random(-0.3, 0.3);
                this.orbitRadius = random(60, 320);
                this.orbitSpeed = random(0.0004, 0.0015) * (random() > 0.5 ? 1 : -1);
                this.phase = random(TWO_PI);
                this.size = random(4, 10);
                this.shape = ['hexagon', 'triangle', 'diamond'][floor(random(3))];
                this.rotation = random(TWO_PI);
                this.rotSpeed = (random() - 0.5) * 0.02;
                this.visible = true;
                this.visibleTimer = random(3000, 8000);
                this.pulsePhase = random(TWO_PI);
            }

            update(dt) {
                this.phase += this.orbitSpeed * dt;
                this.rotation += this.rotSpeed * dt;
                this.pulsePhase += 0.002 * dt;
                this.visibleTimer -= dt;
                if (this.visibleTimer <= 0) {
                    this.visible = !this.visible;
                    this.visibleTimer = this.visible ? random(2000, 5000) : random(1500, 4000);
                }
            }

            render(ctx) {
                if (!this.visible) return;

                const cx = width / 2;
                const cy = height / 2;
                const angle = this.phase + this.angleOffset + time * 0.0003;
                const x = cx + cos(angle) * this.orbitRadius;
                const y = cy + sin(angle) * this.orbitRadius * 0.62;
                const distFromCenter = sqrt(pow(x-cx,2)+pow(y-cy,2));
                const pulse = sin(this.pulsePhase) * 0.3 + 0.7;
                const depthFade = constrain(distFromCenter / 350, 0.2, 1);

                ctx.save();
                ctx.translate(x, y);
                ctx.rotate(this.rotation);
                ctx.globalAlpha = 0.5 * pulse * depthFade;

                const isCyan = this.orbitRadius < 180;
                ctx.fillStyle = isCyan ? '#00FFD4' : '#FF6B35';
                ctx.shadowColor = isCyan ? '#00FFD4' : '#FF6B35';
                ctx.shadowBlur = 6 * pulse;

                ctx.beginPath();
                if (this.shape === 'hexagon') {
                    for (let i = 0; i < 6; i++) {
                        const a = (TWO_PI/6)*i - PI/2;
                        const m = i===0?'moveTo':'lineTo';
                        ctx[m](cos(a)*this.size, sin(a)*this.size);
                    }
                } else if (this.shape === 'triangle') {
                    for (let i = 0; i < 3; i++) {
                        const a = (TWO_PI/3)*i - PI/2;
                        const m = i===0?'moveTo':'lineTo';
                        ctx[m](cos(a)*this.size, sin(a)*this.size);
                    }
                } else {
                    ctx.moveTo(0, -this.size);
                    ctx.lineTo(this.size*0.6, 0);
                    ctx.lineTo(0, this.size);
                    ctx.lineTo(-this.size*0.6, 0);
                }
                ctx.closePath();
                ctx.fill();
                ctx.shadowBlur = 0;
                ctx.restore();
                ctx.globalAlpha = 1;
            }
        }

        function draw() {
            const bgCol = hexToRgb(params.colorBase);
            background(bgCol.r, bgCol.g, bgCol.b);

            time += deltaTime * params.timeWarp;

            _renderSingularityCore();
            _renderSpiralArms();
            _renderDimensionFold();
            _renderErosionOverlay();

            for (const frag of fragments) frag.update(deltaTime);
            for (const p of particles) p.update(deltaTime);

            for (const frag of fragments) frag.render(window.drawingContext);
            for (const p of particles) p.render(window.drawingContext);

            _renderEventHorizon();
        }

        function _renderSingularityCore() {
            const cx = width / 2;
            const cy = height / 2;
            const breath = sin(time * 0.001) * 0.5 + 0.5;
            const coreR = 8 + breath * 12;

            for (let layer = 3; layer >= 0; layer--) {
                const r = coreR * (1 + layer * 1.8);
                const alpha = (0.04 + breath * 0.05) * (1 - layer * 0.2);
                const c = hexToRgb(params.colorCyan);
                fill(c.r, c.g, c.b, alpha);
                noStroke();
                ellipse(cx, cy, r*2, r*2);
            }

            fill(255, 255, 255, 0.6 + breath * 0.3);
            ellipse(cx, cy, coreR * 0.6, coreR * 0.6);
        }

        function _renderSpiralArms() {
            const cx = width / 2;
            const cy = height / 2;
            const armCount = params.spiralArms;

            strokeWeight(1);
            noFill();

            for (let arm = 0; arm < armCount; arm++) {
                const baseAngle = (arm / armCount) * TWO_PI + time * 0.0002;
                beginShape();
                for (let d = 20; d < 380; d += 3) {
                    const spiralAngle = baseAngle + d * 0.015 + sin(d * 0.02 + time * 0.001) * 0.3;
                    const x = cx + cos(spiralAngle) * d;
                    const y = cy + sin(spiralAngle) * d * 0.62;
                    vertex(x, y);
                }
                endShape();

                const cyanCol = hexToRgb(params.colorCyan);
                const alpha = 0.04 + sin(time * 0.001 + arm * 0.8) * 0.02;
                stroke(cyanCol.r, cyanCol.g, cyanCol.b, alpha);
            }
        }

        function _renderDimensionFold() {
            const cx = width / 2;
            const cy = height / 2;
            const foldCount = 6;

            for (let i = 0; i < foldCount; i++) {
                const phase = time * 0.0005 + i * 1.2;
                const radius = 100 + i * 55 + sin(phase) * 20;
                const wobble = sin(phase * 2.3) * 15;

                noFill();
                strokeWeight(0.5);
                const orangeCol = hexToRgb(params.colorOrange);
                stroke(orangeCol.r, orangeCol.g, orangeCol.b, 0.03 + sin(phase) * 0.015);

                ellipse(cx + wobble, cy, radius * 2, radius * 1.26);
            }
        }

        function _renderErosionOverlay() {
            if (params.erosionIntensity < 0.05) return;

            const intensity = params.erosionIntensity;
            const scanAlpha = intensity * 0.04;
            noStroke();
            fill(10, 14, 26, scanAlpha);

            for (let y = 0; y < height; y += 3) {
                rect(0, y, width, 1);
            }

            if (intensity > 0.3 && random() < 0.03) {
                const glitchY = random(height);
                const glitchH = random(8, 30);
                const orangeCol = hexToRgb(params.colorOrange);
                fill(orangeCol.r, orangeCol.g, orangeCol.b, intensity * 0.08);
                rect(random(-10, 10), glitchY, width, glitchH);
            }

            if (intensity > 0.5) {
                const warmGrad = drawingContext.createLinearGradient(0, height, 0, 0);
                const orangeCol = hexToRgb(params.colorOrange);
                warmGrad.addColorStop(0, `rgba(${orangeCol.r},${orangeCol.g},${orangeCol.b},${(intensity-0.5)*0.08})`);
                warmGrad.addColorStop(1, 'rgba(10,14,26,0)');
                drawingContext.fillStyle = warmGrad;
                drawingContext.fillRect(0, 0, width, height);
            }
        }

        function _renderEventHorizon() {
            const cx = width / 2;
            const cy = height / 2;
            const ehRadius = 25 + sin(time * 0.0015) * 5;

            noFill();
            strokeWeight(1.5);
            const cyanCol = hexToRgb(params.colorCyan);
            stroke(cyanCol.r, cyanCol.g, cyanCol.b, 0.15 + sin(time * 0.003) * 0.08);
            ellipse(cx, cy, ehRadius * 2, ehRadius * 2 * 0.62);
        }

        function updateSeedDisplay() { document.getElementById('seed-input').value = params.seed; }
        function updateSeed() {
            let v = parseInt(document.getElementById('seed-input').value);
            if (v && v > 0) { params.seed = v; initializeSystem(); } else updateSeedDisplay();
        }
        function previousSeed() { params.seed = Math.max(1, params.seed - 1); updateSeedDisplay(); initializeSystem(); }
        function nextSeed() { params.seed++; updateSeedDisplay(); initializeSystem(); }
        function randomSeedAndUpdate() { params.seed = floor(random(999999)) + 1; updateSeedDisplay(); initializeSystem(); }

        function updateParam(name, val) {
            params[name] = parseFloat(val);
            document.getElementById(name+'-value').textContent = val;
            if (name === 'spiralArms' || name === 'memoryFragments') initializeSystem();
        }

        function updateColor(id, val) {
            params[id] = val;
            document.getElementById(id+'-value').textContent = val;
        }

        function resetParameters() {
            params = {...defaultParams};
            const ids = ['particleCount','gravityStrength','spiralArms','angularMomentum','memoryFragments','erosionIntensity','timeWarp'];
            ids.forEach(id => {
                document.getElementById(id).value = params[id];
                document.getElementById(id+'-value').textContent = params[id];
            });
            ['colorBase','colorCyan','colorOrange'].forEach(id => {
                document.getElementById(id).value = params[id];
                document.getElementById(id+'-value').textContent = params[id];
            });
            updateSeedDisplay();
            initializeSystem();
        }

        function downloadPNG() {
            saveCanvas('abyssal-vortex-' + params.seed, 'png');
        }

        window.addEventListener('load', () => updateSeedDisplay());
    </script>
</body>
</html>
