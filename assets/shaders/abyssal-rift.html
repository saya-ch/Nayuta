<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abyssal Rift — 深渊裂隙</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.7.0/p5.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&family=Lora:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --anthropic-dark: #141413;
            --anthropic-light: #faf9f5;
            --anthropic-mid-gray: #b0aea5;
            --anthropic-light-gray: #e8e6dc;
            --anthropic-orange: #d97757;
            --anthropic-blue: #6a9bcc;
            --anthropic-green: #788c5d;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, var(--anthropic-light) 0%, #f5f3ee 100%);
            min-height: 100vh;
            color: var(--anthropic-dark);
        }
        .container { display: flex; min-height: 100vh; padding: 20px; gap: 20px; }
        .sidebar {
            width: 320px; flex-shrink: 0;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 24px; border-radius: 12px;
            box-shadow: 0 10px 30px rgba(20, 20, 19, 0.1);
            overflow-y: auto; overflow-x: hidden;
        }
        .sidebar h1 { font-family: 'Lora', serif; font-size: 24px; font-weight: 500; color: var(--anthropic-dark); margin-bottom: 8px; }
        .sidebar .subtitle { color: var(--anthropic-mid-gray); font-size: 14px; margin-bottom: 32px; line-height: 1.4; }
        .control-section { margin-bottom: 32px; }
        .control-section h3 { font-size: 16px; font-weight: 600; color: var(--anthropic-dark); margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
        .control-section h3::before { content: '•'; color: var(--anthropic-orange); font-weight: bold; }
        .seed-input {
            width: 100%; background: var(--anthropic-light); padding: 12px;
            border-radius: 8px; font-family: 'Courier New', monospace; font-size: 14px;
            margin-bottom: 12px; border: 1px solid var(--anthropic-light-gray); text-align: center;
        }
        .seed-input:focus { outline: none; border-color: var(--anthropic-orange); box-shadow: 0 0 0 2px rgba(217, 119, 87, 0.1); background: white; }
        .seed-controls { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }
        .regen-button { margin-bottom: 0; }
        .control-group { margin-bottom: 20px; }
        .control-group label { display: block; font-size: 14px; font-weight: 500; color: var(--anthropic-dark); margin-bottom: 8px; }
        .slider-container { display: flex; align-items: center; gap: 12px; }
        .slider-container input[type="range"] { flex: 1; height: 4px; background: var(--anthropic-light-gray); border-radius: 2px; outline: none; -webkit-appearance: none; }
        .slider-container input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 16px; height: 16px; background: var(--anthropic-orange); border-radius: 50%; cursor: pointer; transition: all 0.2s ease; }
        .slider-container input[type="range"]::-webkit-slider-thumb:hover { transform: scale(1.1); background: #c86641; }
        .slider-container input[type="range"]::-moz-range-thumb { width: 16px; height: 16px; background: var(--anthropic-orange); border-radius: 50%; border: none; cursor: pointer; }
        .value-display { font-family: 'Courier New', monospace; font-size: 12px; color: var(--anthropic-mid-gray); min-width: 60px; text-align: right; }
        .color-group { margin-bottom: 16px; }
        .color-group label { display: block; font-size: 12px; color: var(--anthropic-mid-gray); margin-bottom: 4px; }
        .color-picker-container { display: flex; align-items: center; gap: 8px; }
        .color-picker-container input[type="color"] { width: 32px; height: 32px; border: none; border-radius: 6px; cursor: pointer; background: none; padding: 0; }
        .color-value { font-family: 'Courier New', monospace; font-size: 12px; color: var(--anthropic-mid-gray); }
        .button { background: var(--anthropic-orange); color: white; border: none; padding: 10px 16px; border-radius: 6px; font-size: 14px; font-weight: 500; cursor: pointer; transition: all 0.2s ease; width: 100%; }
        .button:hover { background: #c86641; transform: translateY(-1px); }
        .button:active { transform: translateY(0); }
        .button.secondary { background: var(--anthropic-blue); }
        .button.secondary:hover { background: #5a8bb8; }
        .button.tertiary { background: var(--anthropic-green); }
        .button.tertiary:hover { background: #6b7b52; }
        .button-row { display: flex; gap: 8px; }
        .button-row .button { flex: 1; }
        .canvas-area { flex: 1; display: flex; align-items: center; justify-content: center; min-width: 0; }
        #canvas-container { width: 100%; max-width: 1000px; border-radius: 12px; overflow: hidden; box-shadow: 0 20px 40px rgba(20, 20, 19, 0.1); background: #0A0E1A; }
        #canvas-container canvas { display: block; width: 100% !important; height: auto !important; }
        .loading { display: flex; align-items: center; justify-content: center; font-size: 18px; color: var(--anthropic-mid-gray); }
        @media (max-width: 600px) { .container { flex-direction: column; } .sidebar { width: 100%; } .canvas-area { padding: 20px; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <h1>Abyssal Rift</h1>
            <div class="subtitle">深渊裂隙 — 空间撕裂与维度渗透</div>

            <div class="control-section">
                <h3>Seed</h3>
                <input type="number" id="seed-input" class="seed-input" value="42" onchange="updateSeed()">
                <div class="seed-controls">
                    <button class="button secondary" onclick="previousSeed()">← Prev</button>
                    <button class="button secondary" onclick="nextSeed()">Next →</button>
                </div>
                <button class="button tertiary regen-button" onclick="randomSeedAndUpdate()">↻ Random</button>
            </div>

            <div class="control-section">
                <h3>Parameters</h3>
                <div class="control-group">
                    <label>裂隙数量</label>
                    <div class="slider-container">
                        <input type="range" id="riftCount" min="2" max="12" step="1" value="5" oninput="updateParam('riftCount', this.value)">
                        <span class="value-display" id="riftCount-value">5</span>
                    </div>
                </div>
                <div class="control-group">
                    <label>分支深度</label>
                    <div class="slider-container">
                        <input type="range" id="branchDepth" min="1" max="5" step="1" value="3" oninput="updateParam('branchDepth', this.value)">
                        <span class="value-display" id="branchDepth-value">3</span>
                    </div>
                </div>
                <div class="control-group">
                    <label>之眼脉动</label>
                    <div class="slider-container">
                        <input type="range" id="eyePulse" min="0.2" max="2.0" step="0.1" value="0.8" oninput="updateParam('eyePulse', this.value)">
                        <span class="value-display" id="eyePulse-value">0.8</span>
                    </div>
                </div>
                <div class="control-group">
                    <label>侵蚀强度</label>
                    <div class="slider-container">
                        <input type="range" id="erosionIntensity" min="0.1" max="1.0" step="0.05" value="0.5" oninput="updateParam('erosionIntensity', this.value)">
                        <span class="value-display" id="erosionIntensity-value">0.5</span>
                    </div>
                </div>
                <div class="control-group">
                    <label>维度碎片</label>
                    <div class="slider-container">
                        <input type="range" id="fragmentCount" min="5" max="40" step="1" value="15" oninput="updateParam('fragmentCount', this.value)">
                        <span class="value-display" id="fragmentCount-value">15</span>
                    </div>
                </div>
                <div class="control-group">
                    <label>呼吸速度</label>
                    <div class="slider-container">
                        <input type="range" id="breathSpeed" min="0.3" max="2.0" step="0.1" value="0.8" oninput="updateParam('breathSpeed', this.value)">
                        <span class="value-display" id="breathSpeed-value">0.8</span>
                    </div>
                </div>
            </div>

            <div class="control-section">
                <h3>Colors</h3>
                <div class="color-group">
                    <label>深渊底色</label>
                    <div class="color-picker-container">
                        <input type="color" id="color1" value="#0A0E1A" onchange="updateColor('color1', this.value)">
                        <span class="color-value" id="color1-value">#0A0E1A</span>
                    </div>
                </div>
                <div class="color-group">
                    <label>荧光青</label>
                    <div class="color-picker-container">
                        <input type="color" id="color2" value="#00FFD4" onchange="updateColor('color2', this.value)">
                        <span class="color-value" id="color2-value">#00FFD4</span>
                    </div>
                </div>
                <div class="color-group">
                    <label>虚空橙</label>
                    <div class="color-picker-container">
                        <input type="color" id="color3" value="#FF6B35" onchange="updateColor('color3', this.value)">
                        <span class="color-value" id="color3-value">#FF6B35</span>
                    </div>
                </div>
            </div>

            <div class="control-section">
                <h3>Actions</h3>
                <div class="button-row">
                    <button class="button" onclick="resetParameters()">Reset</button>
                </div>
            </div>
        </div>

        <div class="canvas-area">
            <div id="canvas-container">
                <div class="loading">Initializing generative art...</div>
            </div>
        </div>
    </div>

    <script>
        let params = {
            seed: 42,
            riftCount: 5,
            branchDepth: 3,
            eyePulse: 0.8,
            erosionIntensity: 0.5,
            fragmentCount: 15,
            breathSpeed: 0.8,
            colorPalette: ['#0A0E1A', '#00FFD4', '#FF6B35']
        };
        let defaultParams = { ...params };

        let rifts = [];
        let fragments = [];
        let eyePositions = [];
        let time = 0;

        function hexToRgb(hex) {
            const r = parseInt(hex.slice(1, 3), 16);
            const g = parseInt(hex.slice(3, 5), 16);
            const b = parseInt(hex.slice(5, 7), 16);
            return { r, g, b };
        }

        function setup() {
            let canvas = createCanvas(1200, 800);
            canvas.parent('canvas-container');
            initializeSystem();
            document.querySelector('.loading').style.display = 'none';
        }

        function initializeSystem() {
            randomSeed(params.seed);
            noiseSeed(params.seed);
            time = 0;

            rifts = [];
            for (let i = 0; i < params.riftCount; i++) {
                rifts.push(generateRift());
            }

            findEyePositions();

            fragments = [];
            for (let i = 0; i < params.fragmentCount; i++) {
                fragments.push(createFragment());
            }
        }

        function generateRift() {
            const startX = random(100, width - 100);
            const startY = random(50, height - 50);
            const angle = random(TWO_PI);
            const length = random(150, 500);
            const points = [];
            const steps = floor(length / 5);

            let cx = startX;
            let cy = startY;
            let ca = angle;

            for (let s = 0; s < steps; s++) {
                points.push({ x: cx, y: cy });
                const noiseVal = noise(cx * 0.003, cy * 0.003, params.seed * 0.1);
                ca += (noiseVal - 0.5) * 0.6;
                cx += cos(ca) * 5;
                cy += sin(ca) * 5;
            }

            const branches = [];
            if (params.branchDepth > 0) {
                const branchCount = floor(random(1, 4));
                for (let b = 0; b < branchCount; b++) {
                    const branchIdx = floor(random(steps * 0.2, steps * 0.8));
                    if (branchIdx < points.length) {
                        branches.push(generateBranch(points[branchIdx].x, points[branchIdx].y, ca, params.branchDepth - 1));
                    }
                }
            }

            return { points, branches, width: random(1.5, 4), pulsePhase: random(TWO_PI) };
        }

        function generateBranch(x, y, parentAngle, depth) {
            const angle = parentAngle + random(-1.2, 1.2);
            const length = random(40, 150);
            const points = [];
            const steps = floor(length / 5);

            let cx = x;
            let cy = y;
            let ca = angle;

            for (let s = 0; s < steps; s++) {
                points.push({ x: cx, y: cy });
                const noiseVal = noise(cx * 0.005, cy * 0.005, params.seed * 0.2 + depth);
                ca += (noiseVal - 0.5) * 0.8;
                cx += cos(ca) * 5;
                cy += sin(ca) * 5;
            }

            const branches = [];
            if (depth > 0 && random() > 0.4) {
                const branchCount = floor(random(1, 3));
                for (let b = 0; b < branchCount; b++) {
                    const branchIdx = floor(random(steps * 0.3, steps * 0.7));
                    if (branchIdx < points.length) {
                        branches.push(generateBranch(points[branchIdx].x, points[branchIdx].y, ca, depth - 1));
                    }
                }
            }

            return { points, branches, width: random(0.8, 2.5), pulsePhase: random(TWO_PI) };
        }

        function findEyePositions() {
            eyePositions = [];
            const allPoints = [];
            collectRiftPoints(rifts, allPoints);

            const gridSize = 80;
            const grid = {};

            for (const p of allPoints) {
                const gx = floor(p.x / gridSize);
                const gy = floor(p.y / gridSize);
                const key = `${gx},${gy}`;
                if (!grid[key]) grid[key] = [];
                grid[key].push(p);
            }

            for (const key in grid) {
                if (grid[key].length >= 3) {
                    const pts = grid[key];
                    const cx = pts.reduce((s, p) => s + p.x, 0) / pts.length;
                    const cy = pts.reduce((s, p) => s + p.y, 0) / pts.length;
                    if (cx > 80 && cx < width - 80 && cy > 80 && cy < height - 80) {
                        eyePositions.push({
                            x: cx, y: cy,
                            size: 15 + grid[key].length * 3,
                            phase: random(TWO_PI),
                            irisAngle: random(TWO_PI)
                        });
                    }
                }
            }

            if (eyePositions.length === 0 && rifts.length > 0) {
                const mainRift = rifts[0];
                const midIdx = floor(mainRift.points.length / 2);
                if (mainRift.points[midIdx]) {
                    eyePositions.push({
                        x: mainRift.points[midIdx].x,
                        y: mainRift.points[midIdx].y,
                        size: 25,
                        phase: random(TWO_PI),
                        irisAngle: random(TWO_PI)
                    });
                }
            }
        }

        function collectRiftPoints(riftList, allPoints) {
            for (const rift of riftList) {
                for (const p of rift.points) {
                    allPoints.push(p);
                }
                if (rift.branches) {
                    collectRiftPoints(rift.branches, allPoints);
                }
            }
        }

        function createFragment() {
            const shapes = ['hexagon', 'triangle', 'diamond'];
            const shape = shapes[floor(random(shapes.length))];
            let x, y;
            if (rifts.length > 0) {
                const rift = rifts[floor(random(rifts.length))];
                if (rift.points.length > 0) {
                    const pt = rift.points[floor(random(rift.points.length))];
                    x = pt.x + random(-30, 30);
                    y = pt.y + random(-30, 30);
                } else {
                    x = random(width);
                    y = random(height);
                }
            } else {
                x = random(width);
                y = random(height);
            }

            return {
                x, y,
                vx: (random() - 0.5) * 0.3,
                vy: (random() - 0.5) * 0.3,
                size: random(3, 10),
                shape,
                rotation: random(TWO_PI),
                rotSpeed: (random() - 0.5) * 0.02,
                alpha: random(0.2, 0.6),
                phase: random(TWO_PI),
                life: random(0.5, 1),
                isCyan: random() > 0.4
            };
        }

        function draw() {
            time += deltaTime * 0.001;

            const bg = hexToRgb(params.colorPalette[0]);
            background(bg.r, bg.g, bg.b);

            renderBackgroundGradient();
            renderErosionField();
            renderRifts(rifts);
            renderEyes();
            renderFragments();
            renderScanLines();
        }

        function renderBackgroundGradient() {
            const bg = hexToRgb(params.colorPalette[0]);
            const breathCycle = sin(time * params.breathSpeed * 0.5) * 0.5 + 0.5;

            noStroke();
            for (let i = 0; i < 3; i++) {
                const cx = width * (0.3 + i * 0.2);
                const cy = height * (0.4 + i * 0.1);
                const r = width * (0.3 + breathCycle * 0.05);
                const alpha = 15 + breathCycle * 8;
                fill(bg.r + 15, bg.g + 10, bg.b + 30, alpha);
                ellipse(cx, cy, r, r * 0.7);
            }
        }

        function renderErosionField() {
            const orange = hexToRgb(params.colorPalette[2]);
            const intensity = params.erosionIntensity;
            const breathCycle = sin(time * params.breathSpeed * 0.3) * 0.5 + 0.5;

            noStroke();
            for (const rift of rifts) {
                for (const pt of rift.points) {
                    const dist = 40 + breathCycle * 20;
                    const alpha = intensity * 8 * (1 + breathCycle * 0.5);
                    fill(orange.r, orange.g, orange.b, alpha);
                    ellipse(pt.x, pt.y, dist, dist);
                }
            }
        }

        function renderRifts(riftList) {
            const cyan = hexToRgb(params.colorPalette[1]);
            const orange = hexToRgb(params.colorPalette[2]);
            const breathCycle = sin(time * params.breathSpeed) * 0.5 + 0.5;

            for (const rift of riftList) {
                if (rift.points.length < 2) continue;

                const pulse = sin(time * params.breathSpeed * 2 + rift.pulsePhase) * 0.3 + 0.7;

                noFill();
                strokeWeight(rift.width + 4 * pulse);
                stroke(orange.r, orange.g, orange.b, 20 * pulse);
                beginShape();
                for (const pt of rift.points) {
                    const wobble = sin(time * params.breathSpeed * 3 + pt.x * 0.01 + pt.y * 0.01) * 2;
                    vertex(pt.x + wobble, pt.y + wobble);
                }
                endShape();

                strokeWeight(rift.width + 2 * pulse);
                stroke(cyan.r, cyan.g, cyan.b, 40 * pulse);
                beginShape();
                for (const pt of rift.points) {
                    const wobble = sin(time * params.breathSpeed * 3 + pt.x * 0.01 + pt.y * 0.01) * 1.5;
                    vertex(pt.x + wobble, pt.y + wobble);
                }
                endShape();

                strokeWeight(rift.width * pulse);
                stroke(255, 255, 255, 60 * pulse);
                beginShape();
                for (const pt of rift.points) {
                    const wobble = sin(time * params.breathSpeed * 3 + pt.x * 0.01 + pt.y * 0.01) * 1;
                    vertex(pt.x + wobble, pt.y + wobble);
                }
                endShape();

                if (rift.branches) {
                    renderRifts(rift.branches);
                }
            }
        }

        function renderEyes() {
            const cyan = hexToRgb(params.colorPalette[1]);
            const orange = hexToRgb(params.colorPalette[2]);
            const pulse = sin(time * params.eyePulse) * 0.5 + 0.5;

            for (const eye of eyePositions) {
                const s = eye.size * (0.8 + pulse * 0.4);
                const localPulse = sin(time * params.eyePulse * 1.3 + eye.phase) * 0.5 + 0.5;

                noStroke();
                fill(orange.r, orange.g, orange.b, 8 + localPulse * 6);
                ellipse(eye.x, eye.y, s * 6, s * 4);

                fill(orange.r, orange.g, orange.b, 15 + localPulse * 10);
                ellipse(eye.x, eye.y, s * 3.5, s * 2.2);

                fill(orange.r, orange.g, orange.b, 30 + localPulse * 20);
                ellipse(eye.x, eye.y, s * 2, s * 1.3);

                fill(20, 5, 10, 200);
                ellipse(eye.x, eye.y, s * 1.2, s * 0.8);

                const irisX = eye.x + cos(eye.irisAngle + time * 0.2) * s * 0.15;
                const irisY = eye.y + sin(eye.irisAngle + time * 0.2) * s * 0.1;
                fill(orange.r, orange.g, orange.b, 180 + localPulse * 75);
                ellipse(irisX, irisY, s * 0.5, s * 0.35);

                fill(255, 255, 255, 100 + localPulse * 50);
                ellipse(irisX - s * 0.1, irisY - s * 0.05, s * 0.15, s * 0.1);

                noFill();
                stroke(cyan.r, cyan.g, cyan.b, 15 + localPulse * 10);
                strokeWeight(1);
                for (let r = 0; r < 3; r++) {
                    const ringR = s * (1.5 + r * 0.8) + localPulse * 5;
                    ellipse(eye.x, eye.y, ringR * 2, ringR * 1.3);
                }
            }
        }

        function renderFragments() {
            const cyan = hexToRgb(params.colorPalette[1]);
            const orange = hexToRgb(params.colorPalette[2]);

            for (const frag of fragments) {
                frag.x += frag.vx + noise(frag.x * 0.005, frag.y * 0.005, time * 0.3) * 0.5 - 0.25;
                frag.y += frag.vy + noise(frag.x * 0.005 + 100, frag.y * 0.005, time * 0.3) * 0.5 - 0.25;
                frag.rotation += frag.rotSpeed;

                if (frag.x < -20) frag.x = width + 20;
                if (frag.x > width + 20) frag.x = -20;
                if (frag.y < -20) frag.y = height + 20;
                if (frag.y > height + 20) frag.y = -20;

                const pulse = sin(time * 2 + frag.phase) * 0.3 + 0.7;
                const alpha = frag.alpha * pulse * frag.life;

                push();
                translate(frag.x, frag.y);
                rotate(frag.rotation);

                if (frag.isCyan) {
                    fill(cyan.r, cyan.g, cyan.b, alpha * 255);
                } else {
                    fill(orange.r, orange.g, orange.b, alpha * 255);
                }
                noStroke();

                if (frag.shape === 'hexagon') {
                    drawPolygon(0, 0, frag.size, 6);
                } else if (frag.shape === 'triangle') {
                    drawPolygon(0, 0, frag.size, 3);
                } else {
                    beginShape();
                    vertex(0, -frag.size);
                    vertex(frag.size * 0.6, 0);
                    vertex(0, frag.size);
                    vertex(-frag.size * 0.6, 0);
                    endShape(CLOSE);
                }

                pop();
            }
        }

        function drawPolygon(x, y, r, sides) {
            beginShape();
            for (let i = 0; i < sides; i++) {
                const a = (TWO_PI / sides) * i - HALF_PI;
                vertex(x + cos(a) * r, y + sin(a) * r);
            }
            endShape(CLOSE);
        }

        function renderScanLines() {
            const intensity = params.erosionIntensity;
            stroke(0, 0, 0, 8 * intensity);
            strokeWeight(1);
            for (let y = 0; y < height; y += 3) {
                line(0, y, width, y);
            }
        }

        function updateParam(paramName, value) {
            const numVal = parseFloat(value);
            params[paramName] = numVal;
            document.getElementById(paramName + '-value').textContent = numVal;
            if (paramName === 'riftCount' || paramName === 'branchDepth') {
                initializeSystem();
            }
            if (paramName === 'fragmentCount') {
                while (fragments.length < params.fragmentCount) {
                    fragments.push(createFragment());
                }
                while (fragments.length > params.fragmentCount) {
                    fragments.pop();
                }
            }
        }

        function updateColor(colorId, value) {
            const idx = parseInt(colorId.replace('color', '')) - 1;
            params.colorPalette[idx] = value;
            document.getElementById(colorId + '-value').textContent = value;
        }

        function updateSeedDisplay() {
            document.getElementById('seed-input').value = params.seed;
        }

        function updateSeed() {
            let input = document.getElementById('seed-input');
            let newSeed = parseInt(input.value);
            if (newSeed && newSeed > 0) {
                params.seed = newSeed;
                initializeSystem();
            } else {
                updateSeedDisplay();
            }
        }

        function previousSeed() {
            params.seed = Math.max(1, params.seed - 1);
            updateSeedDisplay();
            initializeSystem();
        }

        function nextSeed() {
            params.seed = params.seed + 1;
            updateSeedDisplay();
            initializeSystem();
        }

        function randomSeedAndUpdate() {
            params.seed = Math.floor(Math.random() * 999999) + 1;
            updateSeedDisplay();
            initializeSystem();
        }

        function resetParameters() {
            params = { ...defaultParams };
            document.getElementById('riftCount').value = params.riftCount;
            document.getElementById('riftCount-value').textContent = params.riftCount;
            document.getElementById('branchDepth').value = params.branchDepth;
            document.getElementById('branchDepth-value').textContent = params.branchDepth;
            document.getElementById('eyePulse').value = params.eyePulse;
            document.getElementById('eyePulse-value').textContent = params.eyePulse;
            document.getElementById('erosionIntensity').value = params.erosionIntensity;
            document.getElementById('erosionIntensity-value').textContent = params.erosionIntensity;
            document.getElementById('fragmentCount').value = params.fragmentCount;
            document.getElementById('fragmentCount-value').textContent = params.fragmentCount;
            document.getElementById('breathSpeed').value = params.breathSpeed;
            document.getElementById('breathSpeed-value').textContent = params.breathSpeed;
            document.getElementById('color1').value = params.colorPalette[0];
            document.getElementById('color1-value').textContent = params.colorPalette[0];
            document.getElementById('color2').value = params.colorPalette[1];
            document.getElementById('color2-value').textContent = params.colorPalette[1];
            document.getElementById('color3').value = params.colorPalette[2];
            document.getElementById('color3-value').textContent = params.colorPalette[2];
            updateSeedDisplay();
            initializeSystem();
        }

        window.addEventListener('load', function () {
            updateSeedDisplay();
        });
    </script>
</body>
</html>
