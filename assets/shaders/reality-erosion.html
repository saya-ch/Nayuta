<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reality Erosion — 那由他之梦</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.7.0/p5.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&family=Lora:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --anthropic-dark: #141413;
            --anthropic-light: #faf9f5;
            --anthropic-mid-gray: #b0aea5;
            --anthropic-light-gray: #e8e6dc;
            --anthropic-orange: #d97757;
            --anthropic-blue: #6a9bcc;
            --anthropic-green: #788c5d;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, var(--anthropic-light) 0%, #f5f3ee 100%);
            min-height: 100vh;
            color: var(--anthropic-dark);
        }

        .container {
            display: flex;
            min-height: 100vh;
            padding: 20px;
            gap: 20px;
        }

        .sidebar {
            width: 320px;
            flex-shrink: 0;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(20, 20, 19, 0.1);
            overflow-y: auto;
            overflow-x: hidden;
        }

        .sidebar h1 {
            font-family: 'Lora', serif;
            font-size: 24px;
            font-weight: 500;
            color: var(--anthropic-dark);
            margin-bottom: 8px;
        }

        .sidebar .subtitle {
            color: var(--anthropic-mid-gray);
            font-size: 14px;
            margin-bottom: 32px;
            line-height: 1.4;
        }

        .control-section {
            margin-bottom: 32px;
        }

        .control-section h3 {
            font-size: 16px;
            font-weight: 600;
            color: var(--anthropic-dark);
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .control-section h3::before {
            content: '•';
            color: var(--anthropic-orange);
            font-weight: bold;
        }

        .seed-input {
            width: 100%;
            background: var(--anthropic-light);
            padding: 12px;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            margin-bottom: 12px;
            border: 1px solid var(--anthropic-light-gray);
            text-align: center;
        }

        .seed-input:focus {
            outline: none;
            border-color: var(--anthropic-orange);
            box-shadow: 0 0 0 2px rgba(217, 119, 87, 0.1);
            background: white;
        }

        .seed-controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 8px;
        }

        .regen-button {
            margin-bottom: 0;
        }

        .control-group {
            margin-bottom: 20px;
        }

        .control-group label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: var(--anthropic-dark);
            margin-bottom: 8px;
        }

        .slider-container {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .slider-container input[type="range"] {
            flex: 1;
            height: 4px;
            background: var(--anthropic-light-gray);
            border-radius: 2px;
            outline: none;
            -webkit-appearance: none;
        }

        .slider-container input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            background: var(--anthropic-orange);
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .slider-container input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.1);
            background: #c86641;
        }

        .slider-container input[type="range"]::-moz-range-thumb {
            width: 16px;
            height: 16px;
            background: var(--anthropic-orange);
            border-radius: 50%;
            border: none;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .value-display {
            font-family: 'Courier New', monospace;
            font-size: 12px;
            color: var(--anthropic-mid-gray);
            min-width: 60px;
            text-align: right;
        }

        .color-group {
            margin-bottom: 16px;
        }

        .color-group label {
            display: block;
            font-size: 12px;
            color: var(--anthropic-mid-gray);
            margin-bottom: 4px;
        }

        .color-picker-container {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .color-picker-container input[type="color"] {
            width: 32px;
            height: 32px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            background: none;
            padding: 0;
        }

        .color-value {
            font-family: 'Courier New', monospace;
            font-size: 12px;
            color: var(--anthropic-mid-gray);
        }

        .button {
            background: var(--anthropic-orange);
            color: white;
            border: none;
            padding: 10px 16px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            width: 100%;
        }

        .button:hover {
            background: #c86641;
            transform: translateY(-1px);
        }

        .button:active {
            transform: translateY(0);
        }

        .button.secondary {
            background: var(--anthropic-blue);
        }

        .button.secondary:hover {
            background: #5a8bb8;
        }

        .button.tertiary {
            background: var(--anthropic-green);
        }

        .button.tertiary:hover {
            background: #6b7b52;
        }

        .button-row {
            display: flex;
            gap: 8px;
        }

        .button-row .button {
            flex: 1;
        }

        .canvas-area {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            min-width: 0;
        }

        #canvas-container {
            width: 100%;
            max-width: 1280px;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(20, 20, 19, 0.1);
            background: #0A0E1A;
        }

        #canvas-container canvas {
            display: block;
            width: 100% !important;
            height: auto !important;
        }

        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            color: var(--anthropic-mid-gray);
        }

        @media (max-width: 600px) {
            .container {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
            }

            .canvas-area {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <h1>Reality Erosion</h1>
            <div class="subtitle">那由他之梦 — Where reality dissolves at the edges and void bleeds through</div>

            <div class="control-section">
                <h3>Seed</h3>
                <input type="number" id="seed-input" class="seed-input" value="42" onchange="updateSeed()">
                <div class="seed-controls">
                    <button class="button secondary" onclick="previousSeed()">← Prev</button>
                    <button class="button secondary" onclick="nextSeed()">Next →</button>
                </div>
                <button class="button tertiary regen-button" onclick="randomSeedAndUpdate()">↻ Random</button>
            </div>

            <div class="control-section">
                <h3>Parameters</h3>

                <div class="control-group">
                    <label>Erosion Intensity</label>
                    <div class="slider-container">
                        <input type="range" id="erosionIntensity" min="0.0" max="1.0" step="0.01" value="0.3" oninput="updateParam('erosionIntensity', this.value)">
                        <span class="value-display" id="erosionIntensity-value">0.30</span>
                    </div>
                </div>

                <div class="control-group">
                    <label>Scan Line Density</label>
                    <div class="slider-container">
                        <input type="range" id="scanLineDensity" min="0" max="50" step="1" value="15" oninput="updateParam('scanLineDensity', this.value)">
                        <span class="value-display" id="scanLineDensity-value">15</span>
                    </div>
                </div>

                <div class="control-group">
                    <label>Fragment Count</label>
                    <div class="slider-container">
                        <input type="range" id="fragmentCount" min="10" max="200" step="1" value="60" oninput="updateParam('fragmentCount', this.value)">
                        <span class="value-display" id="fragmentCount-value">60</span>
                    </div>
                </div>

                <div class="control-group">
                    <label>Noise Scale</label>
                    <div class="slider-container">
                        <input type="range" id="noiseScale" min="0.001" max="0.02" step="0.001" value="0.006" oninput="updateParam('noiseScale', this.value)">
                        <span class="value-display" id="noiseScale-value">0.006</span>
                    </div>
                </div>

                <div class="control-group">
                    <label>Crack Spread</label>
                    <div class="slider-container">
                        <input type="range" id="crackSpread" min="0.0" max="1.0" step="0.01" value="0.4" oninput="updateParam('crackSpread', this.value)">
                        <span class="value-display" id="crackSpread-value">0.40</span>
                    </div>
                </div>
            </div>

            <div class="control-section">
                <h3>Colors</h3>

                <div class="color-group">
                    <label>Reality Color</label>
                    <div class="color-picker-container">
                        <input type="color" id="realityColor" value="#00FFD4" onchange="updateColor('realityColor', this.value)">
                        <span class="color-value" id="realityColor-value">#00FFD4</span>
                    </div>
                </div>

                <div class="color-group">
                    <label>Void Color</label>
                    <div class="color-picker-container">
                        <input type="color" id="voidColor" value="#FF6B35" onchange="updateColor('voidColor', this.value)">
                        <span class="color-value" id="voidColor-value">#FF6B35</span>
                    </div>
                </div>

                <div class="color-group">
                    <label>Background</label>
                    <div class="color-picker-container">
                        <input type="color" id="bgColor" value="#0A0E1A" onchange="updateColor('bgColor', this.value)">
                        <span class="color-value" id="bgColor-value">#0A0E1A</span>
                    </div>
                </div>
            </div>

            <div class="control-section">
                <h3>Actions</h3>
                <div class="button-row">
                    <button class="button" onclick="resetParameters()">Reset</button>
                </div>
            </div>
        </div>

        <div class="canvas-area">
            <div id="canvas-container">
                <div class="loading">Reality is initializing...</div>
            </div>
        </div>
    </div>

    <script>
        let params = {
            seed: 42,
            erosionIntensity: 0.3,
            scanLineDensity: 15,
            fragmentCount: 60,
            noiseScale: 0.006,
            crackSpread: 0.4,
            realityColor: '#00FFD4',
            voidColor: '#FF6B35',
            bgColor: '#0A0E1A'
        };

        let defaultParams = JSON.parse(JSON.stringify(params));

        let fragments = [];
        let cracks = [];
        let animTime = 0;
        let erosionProgress = 0;
        let pg;

        function hexToRgb(hex) {
            let r = parseInt(hex.slice(1, 3), 16);
            let g = parseInt(hex.slice(3, 5), 16);
            let b = parseInt(hex.slice(5, 7), 16);
            return { r, g, b };
        }

        function setup() {
            let canvas = createCanvas(1280, 720);
            canvas.parent('canvas-container');
            pg = createGraphics(1280, 720);
            initializeSystem();
            document.querySelector('.loading').style.display = 'none';
        }

        function initializeSystem() {
            randomSeed(params.seed);
            noiseSeed(params.seed);
            animTime = 0;
            erosionProgress = 0;
            fragments = [];
            cracks = [];

            for (let i = 0; i < params.fragmentCount; i++) {
                fragments.push(new MemoryFragment());
            }

            generateCracks();
        }

        function generateCracks() {
            cracks = [];
            let numCracks = floor(8 + params.crackSpread * 20);
            for (let i = 0; i < numCracks; i++) {
                let side = floor(random(4));
                let sx, sy, angle;
                if (side === 0) { sx = 0; sy = random(height); angle = random(-PI / 4, PI / 4); }
                else if (side === 1) { sx = width; sy = random(height); angle = random(PI * 3 / 4, PI * 5 / 4); }
                else if (side === 2) { sx = random(width); sy = 0; angle = random(PI / 4, PI * 3 / 4); }
                else { sx = random(width); sy = height; angle = random(-PI * 3 / 4, -PI / 4); }
                let crack = new Crack(sx, sy, angle);
                crack.grow(params.crackSpread * max(width, height) * 0.6);
                cracks.push(crack);
            }
        }

        function draw() {
            animTime += 0.008;
            erosionProgress = min(1.0, erosionProgress + 0.0003);

            let bg = hexToRgb(params.bgColor);
            background(bg.r, bg.g, bg.b);

            drawDissolutionLayer();

            drawCrackLayer();

            drawScanLines();

            drawFragments();

            drawEdgeGlow();
        }

        function drawDissolutionLayer() {
            let rc = hexToRgb(params.realityColor);
            let vc = hexToRgb(params.voidColor);
            let intensity = params.erosionIntensity * (0.7 + 0.3 * erosionProgress);

            loadPixels();
            let ns = params.noiseScale;
            let t = animTime;

            for (let y = 0; y < height; y++) {
                for (let x = 0; x < width; x++) {
                    let idx = (y * width + x) * 4;

                    let n = noise(x * ns, y * ns, t * 0.5);

                    let edgeDist = min(x, y, width - x, height - y);
                    let edgeFactor = 1.0 - constrain(edgeDist / (min(width, height) * 0.3), 0, 1);

                    let dissolve = n * intensity + edgeFactor * intensity * 0.5;
                    dissolve = constrain(dissolve, 0, 1);

                    let r, g, b;
                    if (dissolve > 0.35) {
                        let bleed = map(dissolve, 0.35, 1.0, 0, 1);
                        bleed = constrain(bleed, 0, 1);
                        r = lerp(rc.r * 0.15, vc.r, bleed);
                        g = lerp(rc.g * 0.15, vc.g, bleed);
                        b = lerp(rc.b * 0.15, vc.b, bleed);

                        let pulse = sin(t * 3 + x * 0.02 + y * 0.02) * 0.15;
                        r = constrain(r + pulse * vc.r * 0.1, 0, 255);
                        g = constrain(g + pulse * vc.g * 0.1, 0, 255);
                        b = constrain(b + pulse * vc.b * 0.1, 0, 255);
                    } else {
                        let base = dissolve / 0.35;
                        r = lerp(0, rc.r * 0.08, base);
                        g = lerp(0, rc.g * 0.08, base);
                        b = lerp(0, rc.b * 0.08, base);
                    }

                    pixels[idx] = r;
                    pixels[idx + 1] = g;
                    pixels[idx + 2] = b;
                    pixels[idx + 3] = 255;
                }
            }
            updatePixels();
        }

        function drawCrackLayer() {
            let rc = hexToRgb(params.realityColor);
            let vc = hexToRgb(params.voidColor);

            for (let crack of cracks) {
                let progress = params.crackSpread * (0.5 + 0.5 * erosionProgress);
                let drawCount = floor(crack.points.length * progress);
                if (drawCount < 2) continue;

                for (let i = 1; i < drawCount; i++) {
                    let p1 = crack.points[i - 1];
                    let p2 = crack.points[i];
                    let t = i / crack.points.length;

                    let cr = lerp(rc.r, vc.r, t);
                    let cg = lerp(rc.g, vc.g, t);
                    let cb = lerp(rc.b, vc.b, t);

                    stroke(cr, cg, cb, 180 * (1 - t * 0.5));
                    strokeWeight(lerp(2.5, 0.5, t));
                    line(p1.x, p1.y, p2.x, p2.y);

                    if (t > 0.3 && t < 0.8) {
                        let glowAlpha = 40 * sin(animTime * 4 + i * 0.5);
                        stroke(rc.r, rc.g, rc.b, abs(glowAlpha));
                        strokeWeight(6 * (1 - t));
                        line(p1.x, p1.y, p2.x, p2.y);
                    }
                }
            }
            noStroke();
        }

        function drawScanLines() {
            if (params.scanLineDensity <= 0) return;

            let rc = hexToRgb(params.realityColor);
            let spacing = max(1, floor(height / params.scanLineDensity));

            for (let y = 0; y < height; y += spacing) {
                let flicker = noise(y * 0.1, animTime * 2);
                if (flicker < 0.4) continue;

                let offset = sin(animTime * 5 + y * 0.05) * 3 * params.erosionIntensity;

                let alpha = 30 + 60 * flicker * params.erosionIntensity;
                stroke(rc.r, rc.g, rc.b, alpha);
                strokeWeight(1);

                let distort = noise(y * 0.02, animTime) * 20 * params.erosionIntensity;
                for (let x = 0; x < width; x += 4) {
                    let dy = sin(x * 0.01 + animTime * 3) * distort + offset;
                    point(x, y + dy);
                }
            }
            noStroke();
        }

        function drawFragments() {
            for (let frag of fragments) {
                frag.update();
                frag.display();
            }
        }

        function drawEdgeGlow() {
            let rc = hexToRgb(params.realityColor);
            let glowIntensity = params.erosionIntensity * (0.5 + 0.5 * sin(animTime));

            noFill();
            for (let i = 0; i < 30; i++) {
                let alpha = glowIntensity * 8 * (1 - i / 30);
                stroke(rc.r, rc.g, rc.b, alpha);
                strokeWeight(1);
                rect(i, i, width - i * 2, height - i * 2, 2);
            }
            noStroke();
        }

        class MemoryFragment {
            constructor() {
                this.x = random(width);
                this.y = random(height);
                this.vx = random(-0.3, 0.3);
                this.vy = random(-0.2, 0.2);
                this.size = random(3, 12);
                this.type = floor(random(3));
                this.rotation = random(TWO_PI);
                this.rotSpeed = random(-0.01, 0.01);
                this.life = random(0.5, 1.0);
                this.maxLife = this.life;
                this.phase = random(TWO_PI);
                this.drift = random(0.5, 1.5);
            }

            update() {
                this.x += this.vx + sin(animTime + this.phase) * 0.2 * this.drift;
                this.y += this.vy + cos(animTime * 0.7 + this.phase) * 0.15 * this.drift;
                this.rotation += this.rotSpeed;

                let edgeFade = params.erosionIntensity * 0.003;
                this.life -= edgeFade;

                if (this.life <= 0 || this.x < -20 || this.x > width + 20 || this.y < -20 || this.y > height + 20) {
                    this.x = random(width);
                    this.y = random(height);
                    this.vx = random(-0.3, 0.3);
                    this.vy = random(-0.2, 0.2);
                    this.life = random(0.5, 1.0);
                    this.maxLife = this.life;
                    this.size = random(3, 12);
                    this.type = floor(random(3));
                }
            }

            display() {
                let rc = hexToRgb(params.realityColor);
                let vc = hexToRgb(params.voidColor);
                let lifeRatio = this.life / this.maxLife;
                let alpha = lifeRatio * 200;

                let cr = lerp(vc.r, rc.r, lifeRatio);
                let cg = lerp(vc.g, rc.g, lifeRatio);
                let cb = lerp(vc.b, rc.b, lifeRatio);

                push();
                translate(this.x, this.y);
                rotate(this.rotation);

                let flicker = sin(animTime * 8 + this.phase) > 0.3 ? 1 : 0.3;
                alpha *= flicker;

                fill(cr, cg, cb, alpha);
                noStroke();

                let s = this.size * (0.5 + 0.5 * lifeRatio);

                if (this.type === 0) {
                    triangle(-s, s * 0.6, s, s * 0.6, 0, -s * 0.8);
                } else if (this.type === 1) {
                    rectMode(CENTER);
                    rect(0, 0, s * 0.4, s * 1.5);
                } else {
                    beginShape();
                    for (let a = 0; a < 6; a++) {
                        let angle = a * PI / 3 - PI / 6;
                        vertex(cos(angle) * s * 0.5, sin(angle) * s * 0.5);
                    }
                    endShape(CLOSE);
                }

                if (lifeRatio < 0.4) {
                    fill(rc.r, rc.g, rc.b, alpha * 0.3 * (1 - lifeRatio));
                    ellipse(0, 0, s * 3, s * 3);
                }

                pop();
            }
        }

        class Crack {
            constructor(sx, sy, angle) {
                this.points = [{ x: sx, y: sy }];
                this.angle = angle;
            }

            grow(maxLen) {
                let cx = this.points[0].x;
                let cy = this.points[0].y;
                let ca = this.angle;
                let totalLen = 0;
                let step = 8;

                while (totalLen < maxLen) {
                    let n = noise(cx * 0.005, cy * 0.005, params.seed * 0.1);
                    ca += (n - 0.5) * 1.2;

                    cx += cos(ca) * step;
                    cy += sin(ca) * step;
                    totalLen += step;

                    this.points.push({ x: cx, y: cy });

                    if (cx < -50 || cx > width + 50 || cy < -50 || cy > height + 50) break;
                }
            }
        }

        function updateParam(paramName, value) {
            let numVal = parseFloat(value);
            params[paramName] = numVal;

            if (paramName === 'fragmentCount') {
                let diff = numVal - fragments.length;
                if (diff > 0) {
                    for (let i = 0; i < diff; i++) fragments.push(new MemoryFragment());
                } else if (diff < 0) {
                    fragments.splice(0, -diff);
                }
            }

            if (paramName === 'crackSpread') {
                generateCracks();
            }

            let displayVal = Number.isInteger(numVal) ? numVal : numVal.toFixed(paramName === 'noiseScale' ? 3 : 2);
            document.getElementById(paramName + '-value').textContent = displayVal;
        }

        function updateColor(colorId, value) {
            params[colorId] = value;
            document.getElementById(colorId + '-value').textContent = value.toUpperCase();
        }

        function updateSeedDisplay() {
            document.getElementById('seed-input').value = params.seed;
        }

        function updateSeed() {
            let input = document.getElementById('seed-input');
            let newSeed = parseInt(input.value);
            if (newSeed && newSeed > 0) {
                params.seed = newSeed;
                initializeSystem();
            } else {
                updateSeedDisplay();
            }
        }

        function previousSeed() {
            params.seed = Math.max(1, params.seed - 1);
            updateSeedDisplay();
            initializeSystem();
        }

        function nextSeed() {
            params.seed = params.seed + 1;
            updateSeedDisplay();
            initializeSystem();
        }

        function randomSeedAndUpdate() {
            params.seed = Math.floor(Math.random() * 999999) + 1;
            updateSeedDisplay();
            initializeSystem();
        }

        function resetParameters() {
            params = JSON.parse(JSON.stringify(defaultParams));

            document.getElementById('erosionIntensity').value = params.erosionIntensity;
            document.getElementById('erosionIntensity-value').textContent = params.erosionIntensity.toFixed(2);
            document.getElementById('scanLineDensity').value = params.scanLineDensity;
            document.getElementById('scanLineDensity-value').textContent = params.scanLineDensity;
            document.getElementById('fragmentCount').value = params.fragmentCount;
            document.getElementById('fragmentCount-value').textContent = params.fragmentCount;
            document.getElementById('noiseScale').value = params.noiseScale;
            document.getElementById('noiseScale-value').textContent = params.noiseScale.toFixed(3);
            document.getElementById('crackSpread').value = params.crackSpread;
            document.getElementById('crackSpread-value').textContent = params.crackSpread.toFixed(2);

            document.getElementById('realityColor').value = params.realityColor;
            document.getElementById('realityColor-value').textContent = params.realityColor;
            document.getElementById('voidColor').value = params.voidColor;
            document.getElementById('voidColor-value').textContent = params.voidColor;
            document.getElementById('bgColor').value = params.bgColor;
            document.getElementById('bgColor-value').textContent = params.bgColor;

            updateSeedDisplay();
            initializeSystem();
        }

        window.addEventListener('load', function() {
            updateSeedDisplay();
        });
    </script>
</body>
</html>
