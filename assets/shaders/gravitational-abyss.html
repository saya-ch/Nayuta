<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gravitational Abyss — Nayuta Shader Generator</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.7.0/p5.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&family=Lora:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --anthropic-dark: #141413;
            --anthropic-light: #faf9f5;
            --anthropic-mid-gray: #b0aea5;
            --anthropic-light-gray: #e8e6dc;
            --anthropic-orange: #d97757;
            --anthropic-blue: #6a9bcc;
            --anthropic-green: #788c5d;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, var(--anthropic-light) 0%, #f5f3ee 100%);
            min-height: 100vh;
            color: var(--anthropic-dark);
        }
        .container { display: flex; min-height: 100vh; padding: 20px; gap: 20px; }
        .sidebar {
            width: 320px; flex-shrink: 0;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 24px; border-radius: 12px;
            box-shadow: 0 10px 30px rgba(20, 20, 19, 0.1);
            overflow-y: auto; overflow-x: hidden;
        }
        .sidebar h1 { font-family: 'Lora', serif; font-size: 24px; font-weight: 500; color: var(--anthropic-dark); margin-bottom: 8px; }
        .sidebar .subtitle { color: var(--anthropic-mid-gray); font-size: 14px; margin-bottom: 32px; line-height: 1.4; }
        .control-section { margin-bottom: 32px; }
        .control-section h3 { font-size: 16px; font-weight: 600; color: var(--anthropic-dark); margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
        .control-section h3::before { content: '•'; color: var(--anthropic-orange); font-weight: bold; }
        .seed-input {
            width: 100%; background: var(--anthropic-light); padding: 12px;
            border-radius: 8px; font-family: 'Courier New', monospace; font-size: 14px;
            margin-bottom: 12px; border: 1px solid var(--anthropic-light-gray); text-align: center;
        }
        .seed-input:focus { outline: none; border-color: var(--anthropic-orange); box-shadow: 0 0 0 2px rgba(217, 119, 87, 0.1); background: white; }
        .seed-controls { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }
        .regen-button { margin-bottom: 0; }
        .control-group { margin-bottom: 20px; }
        .control-group label { display: block; font-size: 14px; font-weight: 500; color: var(--anthropic-dark); margin-bottom: 8px; }
        .slider-container { display: flex; align-items: center; gap: 12px; }
        .slider-container input[type="range"] {
            flex: 1; height: 4px; background: var(--anthropic-light-gray);
            border-radius: 2px; outline: none; -webkit-appearance: none;
        }
        .slider-container input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none; width: 16px; height: 16px;
            background: var(--anthropic-orange); border-radius: 50%; cursor: pointer;
            transition: all 0.2s ease;
        }
        .slider-container input[type="range"]::-webkit-slider-thumb:hover { transform: scale(1.1); background: #c86641; }
        .slider-container input[type="range"]::-moz-range-thumb {
            width: 16px; height: 16px; background: var(--anthropic-orange);
            border-radius: 50%; border: none; cursor: pointer;
        }
        .value-display { font-family: 'Courier New', monospace; font-size: 12px; color: var(--anthropic-mid-gray); min-width: 60px; text-align: right; }
        .color-group { margin-bottom: 16px; }
        .color-group label { display: block; font-size: 12px; color: var(--anthropic-mid-gray); margin-bottom: 4px; }
        .color-picker-container { display: flex; align-items: center; gap: 8px; }
        .color-picker-container input[type="color"] { width: 32px; height: 32px; border: none; border-radius: 6px; cursor: pointer; background: none; padding: 0; }
        .color-value { font-family: 'Courier New', monospace; font-size: 12px; color: var(--anthropic-mid-gray); }
        .button {
            background: var(--anthropic-orange); color: white; border: none;
            padding: 10px 16px; border-radius: 6px; font-size: 14px; font-weight: 500;
            cursor: pointer; transition: all 0.2s ease; width: 100%;
        }
        .button:hover { background: #c86641; transform: translateY(-1px); }
        .button:active { transform: translateY(0); }
        .button.secondary { background: var(--anthropic-blue); }
        .button.secondary:hover { background: #5a8bb8; }
        .button.tertiary { background: var(--anthropic-green); }
        .button.tertiary:hover { background: #6b7b52; }
        .button-row { display: flex; gap: 8px; }
        .button-row .button { flex: 1; }
        .canvas-area { flex: 1; display: flex; align-items: center; justify-content: center; min-width: 0; }
        #canvas-container {
            width: 100%; max-width: 1000px; border-radius: 12px;
            overflow: hidden; box-shadow: 0 20px 40px rgba(20, 20, 19, 0.1); background: #0A0E1A;
        }
        #canvas-container canvas { display: block; width: 100% !important; height: auto !important; }
        .loading { display: flex; align-items: center; justify-content: center; font-size: 18px; color: var(--anthropic-mid-gray); }
        @media (max-width: 600px) {
            .container { flex-direction: column; }
            .sidebar { width: 100%; }
            .canvas-area { padding: 20px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <h1>Gravitational Abyss</h1>
            <div class="subtitle">深渊引力波纹生成器 — 时空弯曲、维度涟漪与侵蚀叠加</div>

            <div class="control-section">
                <h3>Seed</h3>
                <input type="number" id="seed-input" class="seed-input" value="42" onchange="updateSeed()">
                <div class="seed-controls">
                    <button class="button secondary" onclick="previousSeed()">← Prev</button>
                    <button class="button secondary" onclick="nextSeed()">Next →</button>
                </div>
                <button class="button tertiary regen-button" onclick="randomSeedAndUpdate()">↻ Random</button>
            </div>

            <div class="control-section">
                <h3>Gravitational Parameters</h3>
                <div class="control-group">
                    <label>Well Count</label>
                    <div class="slider-container">
                        <input type="range" id="wellCount" min="2" max="8" step="1" value="4" oninput="updateParam('wellCount', this.value)">
                        <span class="value-display" id="wellCount-value">4</span>
                    </div>
                </div>
                <div class="control-group">
                    <label>Warp Intensity</label>
                    <div class="slider-container">
                        <input type="range" id="warpIntensity" min="0.2" max="3.0" step="0.1" value="1.5" oninput="updateParam('warpIntensity', this.value)">
                        <span class="value-display" id="warpIntensity-value">1.5</span>
                    </div>
                </div>
                <div class="control-group">
                    <label>Ripple Frequency</label>
                    <div class="slider-container">
                        <input type="range" id="rippleFreq" min="0.5" max="5.0" step="0.1" value="2.0" oninput="updateParam('rippleFreq', this.value)">
                        <span class="value-display" id="rippleFreq-value">2.0</span>
                    </div>
                </div>
                <div class="control-group">
                    <label>Erosion Depth</label>
                    <div class="slider-container">
                        <input type="range" id="erosionDepth" min="0.0" max="1.0" step="0.05" value="0.4" oninput="updateParam('erosionDepth', this.value)">
                        <span class="value-display" id="erosionDepth-value">0.4</span>
                    </div>
                </div>
                <div class="control-group">
                    <label>Drift Speed</label>
                    <div class="slider-container">
                        <input type="range" id="driftSpeed" min="0.1" max="2.0" step="0.1" value="0.5" oninput="updateParam('driftSpeed', this.value)">
                        <span class="value-display" id="driftSpeed-value">0.5</span>
                    </div>
                </div>
            </div>

            <div class="control-section">
                <h3>Colors</h3>
                <div class="color-group">
                    <label>Event Horizon</label>
                    <div class="color-picker-container">
                        <input type="color" id="color1" value="#0A0E1A" onchange="updateColor('color1', this.value)">
                        <span class="color-value" id="color1-value">#0A0E1A</span>
                    </div>
                </div>
                <div class="color-group">
                    <label>Photon Sphere</label>
                    <div class="color-picker-container">
                        <input type="color" id="color2" value="#00FFD4" onchange="updateColor('color2', this.value)">
                        <span class="color-value" id="color2-value">#00FFD4</span>
                    </div>
                </div>
                <div class="color-group">
                    <label>Accretion Boundary</label>
                    <div class="color-picker-container">
                        <input type="color" id="color3" value="#FF6B35" onchange="updateColor('color3', this.value)">
                        <span class="color-value" id="color3-value">#FF6B35</span>
                    </div>
                </div>
                <div class="color-group">
                    <label>Dimensional Ripple</label>
                    <div class="color-picker-container">
                        <input type="color" id="color4" value="#8B5CF6" onchange="updateColor('color4', this.value)">
                        <span class="color-value" id="color4-value">#8B5CF6</span>
                    </div>
                </div>
            </div>

            <div class="control-section">
                <h3>Actions</h3>
                <div class="button-row">
                    <button class="button" onclick="resetParameters()">Reset</button>
                </div>
            </div>
        </div>

        <div class="canvas-area">
            <div id="canvas-container">
                <div class="loading">Initializing gravitational field...</div>
            </div>
        </div>
    </div>

    <script>
        let params = {
            seed: 42,
            wellCount: 4,
            warpIntensity: 1.5,
            rippleFreq: 2.0,
            erosionDepth: 0.4,
            driftSpeed: 0.5,
            colorPalette: ['#0A0E1A', '#00FFD4', '#FF6B35', '#8B5CF6']
        };

        let defaultParams = JSON.parse(JSON.stringify(params));

        let wells = [];
        let t = 0;
        let pg;

        function setup() {
            let canvas = createCanvas(1200, 1200);
            canvas.parent('canvas-container');
            pg = createGraphics(1200, 1200);
            pixelDensity(1);
            pg.pixelDensity(1);
            initializeSystem();
            document.querySelector('.loading').style.display = 'none';
        }

        function initializeSystem() {
            randomSeed(params.seed);
            noiseSeed(params.seed);
            wells = [];
            for (let i = 0; i < params.wellCount; i++) {
                wells.push({
                    x: random(200, 1000),
                    y: random(200, 1000),
                    mass: random(0.5, 2.0),
                    phase: random(TWO_PI),
                    driftAngle: random(TWO_PI),
                    driftRadius: random(30, 80),
                    freq: random(0.3, 1.2)
                });
            }
            t = 0;
            pg.background(10, 14, 26);
        }

        function draw() {
            t += 0.01 * params.driftSpeed;

            pg.loadPixels();
            for (let py = 0; py < pg.height; py += 2) {
                for (let px = 0; px < pg.width; px += 2) {
                    let sx = px;
                    let sy = py;

                    let totalWarp = 0;
                    let closestDist = Infinity;
                    let closestWell = wells[0];

                    for (let w of wells) {
                        let wx = w.x + cos(t * w.freq + w.phase) * w.driftRadius;
                        let wy = w.y + sin(t * w.freq * 0.7 + w.phase) * w.driftRadius;
                        let dx = sx - wx;
                        let dy = sy - wy;
                        let dist = sqrt(dx * dx + dy * dy) + 1;
                        if (dist < closestDist) {
                            closestDist = dist;
                            closestWell = w;
                        }
                        let warpStrength = (w.mass * params.warpIntensity * 50) / dist;
                        let angle = atan2(dy, dx);
                        sx -= cos(angle) * warpStrength;
                        sy -= sin(angle) * warpStrength;
                        totalWarp += warpStrength;
                    }

                    let n1 = noise(sx * 0.003, sy * 0.003, t * 0.5) * 255;
                    let n2 = noise(sx * 0.008 + 100, sy * 0.008 + 100, t * 0.3) * 255;
                    let n3 = noise(sx * 0.015 + 200, sy * 0.015 + 200, t * 0.7) * 255;

                    let rippleVal = 0;
                    for (let w of wells) {
                        let wx = w.x + cos(t * w.freq + w.phase) * w.driftRadius;
                        let wy = w.y + sin(t * w.freq * 0.7 + w.phase) * w.driftRadius;
                        let dx = px - wx;
                        let dy = py - wy;
                        let dist = sqrt(dx * dx + dy * dy);
                        let ripple = sin(dist * 0.03 * params.rippleFreq - t * 3 * w.freq) * 0.5 + 0.5;
                        ripple *= exp(-dist * 0.003);
                        rippleVal += ripple;
                    }
                    rippleVal = constrain(rippleVal, 0, 1);

                    let erosionNoise = noise(px * 0.02, py * 0.02, t * 0.2);
                    let erosionMask = erosionNoise > (1.0 - params.erosionDepth) ? 1 : 0;
                    let erosionGrain = erosionMask * (noise(px * 0.1, py * 0.1, t) * 60 - 30);

                    let c1 = hexToRgb(params.colorPalette[0]);
                    let c2 = hexToRgb(params.colorPalette[1]);
                    let c3 = hexToRgb(params.colorPalette[2]);
                    let c4 = hexToRgb(params.colorPalette[3]);

                    let depthFactor = constrain(totalWarp / 30, 0, 1);
                    let r, g, b;

                    if (depthFactor < 0.3) {
                        let f = depthFactor / 0.3;
                        r = lerp(c1.r, c4.r, f);
                        g = lerp(c1.g, c4.g, f);
                        b = lerp(c1.b, c4.b, f);
                    } else if (depthFactor < 0.6) {
                        let f = (depthFactor - 0.3) / 0.3;
                        r = lerp(c4.r, c2.r, f);
                        g = lerp(c4.g, c2.g, f);
                        b = lerp(c4.b, c2.b, f);
                    } else {
                        let f = (depthFactor - 0.6) / 0.4;
                        r = lerp(c2.r, c3.r, f);
                        g = lerp(c2.g, c3.g, f);
                        b = lerp(c2.b, c3.b, f);
                    }

                    r = r * 0.4 + n1 * 0.3 + n2 * 0.15 + rippleVal * c2.r * 0.15;
                    g = g * 0.4 + n1 * 0.2 + n2 * 0.15 + rippleVal * c2.g * 0.25;
                    b = b * 0.4 + n1 * 0.15 + n2 * 0.2 + rippleVal * c2.b * 0.25;

                    r += erosionGrain;
                    g += erosionGrain;
                    b += erosionGrain;

                    r = constrain(r, 0, 255);
                    g = constrain(g, 0, 255);
                    b = constrain(b, 0, 255);

                    let idx = (py * pg.width + px) * 4;
                    pg.pixels[idx] = r;
                    pg.pixels[idx + 1] = g;
                    pg.pixels[idx + 2] = b;
                    pg.pixels[idx + 3] = 255;

                    if (px + 1 < pg.width) {
                        let idx2 = (py * pg.width + px + 1) * 4;
                        pg.pixels[idx2] = r;
                        pg.pixels[idx2 + 1] = g;
                        pg.pixels[idx2 + 2] = b;
                        pg.pixels[idx2 + 3] = 255;
                    }
                    if (py + 1 < pg.height) {
                        let idx3 = ((py + 1) * pg.width + px) * 4;
                        pg.pixels[idx3] = r;
                        pg.pixels[idx3 + 1] = g;
                        pg.pixels[idx3 + 2] = b;
                        pg.pixels[idx3 + 3] = 255;
                    }
                }
            }
            pg.updatePixels();

            image(pg, 0, 0);

            for (let w of wells) {
                let wx = w.x + cos(t * w.freq + w.phase) * w.driftRadius;
                let wy = w.y + sin(t * w.freq * 0.7 + w.phase) * w.driftRadius;
                noFill();
                let c2 = hexToRgb(params.colorPalette[1]);
                stroke(c2.r, c2.g, c2.b, 40 + sin(t * 2) * 20);
                strokeWeight(1);
                for (let ring = 0; ring < 5; ring++) {
                    let radius = 20 + ring * 25 + sin(t * 3 - ring * 0.5) * 5;
                    ellipse(wx, wy, radius * 2, radius * 2);
                }
                noStroke();
                fill(c2.r, c2.g, c2.b, 80 + sin(t * 4) * 40);
                ellipse(wx, wy, 6, 6);
            }
        }

        function hexToRgb(hex) {
            let result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
            return result ? {
                r: parseInt(result[1], 16),
                g: parseInt(result[2], 16),
                b: parseInt(result[3], 16)
            } : { r: 0, g: 0, b: 0 };
        }

        function updateParam(paramName, value) {
            let numVal = parseFloat(value);
            params[paramName] = numVal;
            document.getElementById(paramName + '-value').textContent = numVal;
            if (paramName === 'wellCount') {
                initializeSystem();
            }
        }

        function updateColor(colorId, value) {
            let idx = parseInt(colorId.replace('color', '')) - 1;
            params.colorPalette[idx] = value;
            document.getElementById(colorId + '-value').textContent = value;
        }

        function updateSeedDisplay() {
            document.getElementById('seed-input').value = params.seed;
        }

        function updateSeed() {
            let input = document.getElementById('seed-input');
            let newSeed = parseInt(input.value);
            if (newSeed && newSeed > 0) {
                params.seed = newSeed;
                initializeSystem();
            } else {
                updateSeedDisplay();
            }
        }

        function previousSeed() {
            params.seed = Math.max(1, params.seed - 1);
            updateSeedDisplay();
            initializeSystem();
        }

        function nextSeed() {
            params.seed = params.seed + 1;
            updateSeedDisplay();
            initializeSystem();
        }

        function randomSeedAndUpdate() {
            params.seed = Math.floor(Math.random() * 999999) + 1;
            updateSeedDisplay();
            initializeSystem();
        }

        function resetParameters() {
            params = JSON.parse(JSON.stringify(defaultParams));
            document.getElementById('wellCount').value = params.wellCount;
            document.getElementById('wellCount-value').textContent = params.wellCount;
            document.getElementById('warpIntensity').value = params.warpIntensity;
            document.getElementById('warpIntensity-value').textContent = params.warpIntensity;
            document.getElementById('rippleFreq').value = params.rippleFreq;
            document.getElementById('rippleFreq-value').textContent = params.rippleFreq;
            document.getElementById('erosionDepth').value = params.erosionDepth;
            document.getElementById('erosionDepth-value').textContent = params.erosionDepth;
            document.getElementById('driftSpeed').value = params.driftSpeed;
            document.getElementById('driftSpeed-value').textContent = params.driftSpeed;
            document.getElementById('color1').value = params.colorPalette[0];
            document.getElementById('color1-value').textContent = params.colorPalette[0];
            document.getElementById('color2').value = params.colorPalette[1];
            document.getElementById('color2-value').textContent = params.colorPalette[1];
            document.getElementById('color3').value = params.colorPalette[2];
            document.getElementById('color3-value').textContent = params.colorPalette[2];
            document.getElementById('color4').value = params.colorPalette[3];
            document.getElementById('color4-value').textContent = params.colorPalette[3];
            updateSeedDisplay();
            initializeSystem();
        }

        window.addEventListener('load', function() {
            updateSeedDisplay();
        });
    </script>
</body>
</html>
