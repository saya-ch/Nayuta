<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abyssal Hourglass — 深渊时间沙漏</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.7.0/p5.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&family=Lora:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --anthropic-dark: #141413;
            --anthropic-light: #faf9f5;
            --anthropic-mid-gray: #b0aea5;
            --anthropic-light-gray: #e8e6dc;
            --anthropic-orange: #d97757;
            --anthropic-blue: #6a9bcc;
            --anthropic-green: #788c5d;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, var(--anthropic-light) 0%, #f5f3ee 100%);
            min-height: 100vh;
            color: var(--anthropic-dark);
        }
        .container { display: flex; min-height: 100vh; padding: 20px; gap: 20px; }
        .sidebar {
            width: 320px; flex-shrink: 0;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 24px; border-radius: 12px;
            box-shadow: 0 10px 30px rgba(20, 20, 19, 0.1);
            overflow-y: auto; overflow-x: hidden;
        }
        .sidebar h1 { font-family: 'Lora', serif; font-size: 24px; font-weight: 500; color: var(--anthropic-dark); margin-bottom: 8px; }
        .sidebar .subtitle { color: var(--anthropic-mid-gray); font-size: 14px; margin-bottom: 32px; line-height: 1.4; }
        .control-section { margin-bottom: 32px; }
        .control-section h3 { font-size: 16px; font-weight: 600; color: var(--anthropic-dark); margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
        .control-section h3::before { content: '•'; color: var(--anthropic-orange); font-weight: bold; }
        .seed-input {
            width: 100%; background: var(--anthropic-light); padding: 12px;
            border-radius: 8px; font-family: 'Courier New', monospace; font-size: 14px;
            margin-bottom: 12px; border: 1px solid var(--anthropic-light-gray); text-align: center;
        }
        .seed-input:focus { outline: none; border-color: var(--anthropic-orange); box-shadow: 0 0 0 2px rgba(217, 119, 87, 0.1); background: white; }
        .seed-controls { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }
        .regen-button { margin-bottom: 0; }
        .control-group { margin-bottom: 20px; }
        .control-group label { display: block; font-size: 14px; font-weight: 500; color: var(--anthropic-dark); margin-bottom: 8px; }
        .slider-container { display: flex; align-items: center; gap: 12px; }
        .slider-container input[type="range"] { flex: 1; height: 4px; background: var(--anthropic-light-gray); border-radius: 2px; outline: none; -webkit-appearance: none; }
        .slider-container input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 16px; height: 16px; background: var(--anthropic-orange); border-radius: 50%; cursor: pointer; transition: all 0.2s ease; }
        .slider-container input[type="range"]::-webkit-slider-thumb:hover { transform: scale(1.1); background: #c86641; }
        .slider-container input[type="range"]::-moz-range-thumb { width: 16px; height: 16px; background: var(--anthropic-orange); border-radius: 50%; border: none; cursor: pointer; }
        .value-display { font-family: 'Courier New', monospace; font-size: 12px; color: var(--anthropic-mid-gray); min-width: 60px; text-align: right; }
        .color-group { margin-bottom: 16px; }
        .color-group label { display: block; font-size: 12px; color: var(--anthropic-mid-gray); margin-bottom: 4px; }
        .color-picker-container { display: flex; align-items: center; gap: 8px; }
        .color-picker-container input[type="color"] { width: 32px; height: 32px; border: none; border-radius: 6px; cursor: pointer; background: none; padding: 0; }
        .color-value { font-family: 'Courier New', monospace; font-size: 12px; color: var(--anthropic-mid-gray); }
        .button { background: var(--anthropic-orange); color: white; border: none; padding: 10px 16px; border-radius: 6px; font-size: 14px; font-weight: 500; cursor: pointer; transition: all 0.2s ease; width: 100%; }
        .button:hover { background: #c86641; transform: translateY(-1px); }
        .button:active { transform: translateY(0); }
        .button.secondary { background: var(--anthropic-blue); }
        .button.secondary:hover { background: #5a8bb8; }
        .button.tertiary { background: var(--anthropic-green); }
        .button.tertiary:hover { background: #6b7b52; }
        .button-row { display: flex; gap: 8px; }
        .button-row .button { flex: 1; }
        .canvas-area { flex: 1; display: flex; align-items: center; justify-content: center; min-width: 0; }
        #canvas-container { width: 100%; max-width: 1000px; border-radius: 12px; overflow: hidden; box-shadow: 0 20px 40px rgba(20, 20, 19, 0.1); background: #0A0E1A; }
        #canvas-container canvas { display: block; width: 100% !important; height: auto !important; }
        .loading { display: flex; align-items: center; justify-content: center; font-size: 18px; color: var(--anthropic-mid-gray); }
        @media (max-width: 600px) { .container { flex-direction: column; } .sidebar { width: 100%; } .canvas-area { padding: 20px; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <h1>Abyssal Hourglass</h1>
            <div class="subtitle">深渊时间沙漏 — 时间在深渊中坍缩与膨胀的悖论</div>

            <div class="control-section">
                <h3>Seed</h3>
                <input type="number" id="seed-input" class="seed-input" value="12345" onchange="updateSeed()">
                <div class="seed-controls">
                    <button class="button secondary" onclick="previousSeed()">← Prev</button>
                    <button class="button secondary" onclick="nextSeed()">Next →</button>
                </div>
                <button class="button tertiary regen-button" onclick="randomSeedAndUpdate()">↻ Random</button>
            </div>

            <div class="control-section">
                <h3>Parameters</h3>
                <div class="control-group">
                    <label>沙粒数量</label>
                    <div class="slider-container">
                        <input type="range" id="grainCount" min="200" max="2000" step="100" value="800" oninput="updateParam('grainCount', this.value)">
                        <span class="value-display" id="grainCount-value">800</span>
                    </div>
                </div>
                <div class="control-group">
                    <label>引力强度</label>
                    <div class="slider-container">
                        <input type="range" id="gravityStrength" min="0.1" max="2.0" step="0.1" value="0.6" oninput="updateParam('gravityStrength', this.value)">
                        <span class="value-display" id="gravityStrength-value">0.6</span>
                    </div>
                </div>
                <div class="control-group">
                    <label>翻转周期 (秒)</label>
                    <div class="slider-container">
                        <input type="range" id="flipPeriod" min="3" max="20" step="1" value="10" oninput="updateParam('flipPeriod', this.value)">
                        <span class="value-display" id="flipPeriod-value">10</span>
                    </div>
                </div>
                <div class="control-group">
                    <label>咽喉宽度</label>
                    <div class="slider-container">
                        <input type="range" id="neckWidth" min="10" max="80" step="5" value="30" oninput="updateParam('neckWidth', this.value)">
                        <span class="value-display" id="neckWidth-value">30</span>
                    </div>
                </div>
                <div class="control-group">
                    <label>侵蚀强度</label>
                    <div class="slider-container">
                        <input type="range" id="erosionStrength" min="0.0" max="1.0" step="0.05" value="0.4" oninput="updateParam('erosionStrength', this.value)">
                        <span class="value-display" id="erosionStrength-value">0.4</span>
                    </div>
                </div>
                <div class="control-group">
                    <label>回声脉冲</label>
                    <div class="slider-container">
                        <input type="range" id="echoPulse" min="0" max="5" step="1" value="3" oninput="updateParam('echoPulse', this.value)">
                        <span class="value-display" id="echoPulse-value">3</span>
                    </div>
                </div>
            </div>

            <div class="control-section">
                <h3>Colors</h3>
                <div class="color-group">
                    <label>深渊底色</label>
                    <div class="color-picker-container">
                        <input type="color" id="color1" value="#0A0E1A" onchange="updateColor('color1', this.value)">
                        <span class="color-value" id="color1-value">#0A0E1A</span>
                    </div>
                </div>
                <div class="color-group">
                    <label>荧光青</label>
                    <div class="color-picker-container">
                        <input type="color" id="color2" value="#00FFD4" onchange="updateColor('color2', this.value)">
                        <span class="color-value" id="color2-value">#00FFD4</span>
                    </div>
                </div>
                <div class="color-group">
                    <label>虚空橙</label>
                    <div class="color-picker-container">
                        <input type="color" id="color3" value="#FF6B35" onchange="updateColor('color3', this.value)">
                        <span class="color-value" id="color3-value">#FF6B35</span>
                    </div>
                </div>
            </div>

            <div class="control-section">
                <h3>Actions</h3>
                <div class="button-row">
                    <button class="button" onclick="resetParameters()">Reset</button>
                </div>
            </div>
        </div>

        <div class="canvas-area">
            <div id="canvas-container">
                <div class="loading">Initializing Abyssal Hourglass...</div>
            </div>
        </div>
    </div>

    <script>
        let params = {
            seed: 12345,
            grainCount: 800,
            gravityStrength: 0.6,
            flipPeriod: 10,
            neckWidth: 30,
            erosionStrength: 0.4,
            echoPulse: 3,
            colorPalette: ['#0A0E1A', '#00FFD4', '#FF6B35']
        };
        let defaultParams = { ...params };

        let grains = [];
        let cracks = [];
        let echoRings = [];
        let time = 0;
        let flipTimer = 0;
        let gravityDir = 1;
        let flipTransition = 0;
        let neckGlow = 0;

        function hexToRgb(hex) {
            let r = parseInt(hex.slice(1, 3), 16);
            let g = parseInt(hex.slice(3, 5), 16);
            let b = parseInt(hex.slice(5, 7), 16);
            return { r, g, b };
        }

        function setup() {
            let canvas = createCanvas(1200, 800);
            canvas.parent('canvas-container');
            initializeSystem();
            document.querySelector('.loading').style.display = 'none';
        }

        function initializeSystem() {
            randomSeed(params.seed);
            noiseSeed(params.seed);
            grains = [];
            cracks = [];
            echoRings = [];
            time = 0;
            flipTimer = 0;
            gravityDir = 1;
            flipTransition = 0;
            neckGlow = 0;

            let cx = 600;
            let neckY = 400;

            for (let i = 0; i < params.grainCount; i++) {
                let inUpper = random() > 0.3;
                let gx, gy;
                if (inUpper) {
                    let angle = random() * TWO_PI;
                    let dist = random() * 180;
                    gx = cx + cos(angle) * dist * 0.6;
                    gy = neckY - 40 - random() * 280;
                } else {
                    let angle = random() * TWO_PI;
                    let dist = random() * 180;
                    gx = cx + cos(angle) * dist * 0.6;
                    gy = neckY + 40 + random() * 280;
                }
                grains.push({
                    x: gx, y: gy,
                    vx: (random() - 0.5) * 0.3,
                    vy: (random() - 0.5) * 0.3,
                    size: random() * 2.5 + 0.8,
                    age: 0,
                    passCount: 0,
                    dissolve: 0,
                    alpha: random() * 0.4 + 0.3,
                    phase: random() * TWO_PI,
                    isCyan: random() > 0.25,
                });
            }
        }

        function getHourglassWidth(y, cx, neckY) {
            let nw = params.neckWidth;
            let maxW = 220;
            let dy = abs(y - neckY);
            let t = constrain(dy / 350, 0, 1);
            let w = nw + (maxW - nw) * pow(t, 0.7);
            return w;
        }

        function draw() {
            let dt = deltaTime;
            time += dt;
            flipTimer += dt / 1000;

            let flipSec = params.flipPeriod;
            if (flipTimer >= flipSec) {
                flipTimer = 0;
                gravityDir *= -1;
                flipTransition = 1.0;
                neckGlow = 1.0;
                spawnCracks();
                spawnEchoRings();
            }

            flipTransition = max(0, flipTransition - dt * 0.002);
            neckGlow = max(0, neckGlow - dt * 0.001);

            let cx = 600;
            let neckY = 400;
            let grav = params.gravityStrength * 0.08 * gravityDir;

            for (let g of grains) {
                g.vy += grav;
                g.vy *= 0.995;
                g.vx *= 0.99;

                let hw = getHourglassWidth(g.y, cx, neckY);
                let dx = g.x - cx;
                let pushForce = 0;
                if (abs(dx) > hw * 0.8) {
                    pushForce = -(dx - Math.sign(dx) * hw * 0.8) * 0.02;
                }
                let funnelForce = -dx * 0.0003 * (1 - abs(g.y - neckY) / 400);
                g.vx += pushForce + funnelForce;

                let noiseVal = noise(g.x * 0.005, g.y * 0.005, time * 0.0003);
                g.vx += (noiseVal - 0.5) * 0.1;
                g.vy += (noiseVal - 0.5) * 0.03;

                g.x += g.vx;
                g.y += g.vy;

                if (g.y < neckY + 5 && g.y > neckY - 5) {
                    g.passCount++;
                    g.dissolve = min(1, g.dissolve + params.erosionStrength * 0.05);
                }

                g.age += dt * 0.001;

                if (g.y < 20) { g.y = 20; g.vy = abs(g.vy) * 0.3; }
                if (g.y > 780) { g.y = 780; g.vy = -abs(g.vy) * 0.3; }
                if (g.x < cx - 250) { g.x = cx - 250; g.vx = abs(g.vx) * 0.3; }
                if (g.x > cx + 250) { g.x = cx + 250; g.vx = -abs(g.vx) * 0.3; }

                if (g.dissolve > 0.8 && random() < 0.01) {
                    g.x = cx + (random() - 0.5) * getHourglassWidth(random() < 0.5 ? 150 : 650, cx, neckY) * 0.8;
                    g.y = gravityDir > 0 ? neckY - 300 - random() * 50 : neckY + 300 + random() * 50;
                    g.vx = (random() - 0.5) * 0.3;
                    g.vy = 0;
                    g.dissolve = 0;
                    g.passCount = 0;
                    g.age = 0;
                    g.alpha = random() * 0.4 + 0.3;
                    g.isCyan = random() > 0.25;
                }
            }

            for (let i = cracks.length - 1; i >= 0; i--) {
                cracks[i].life -= dt;
                cracks[i].alpha *= 0.997;
                if (cracks[i].life <= 0 || cracks[i].alpha < 0.01) cracks.splice(i, 1);
            }

            for (let i = echoRings.length - 1; i >= 0; i--) {
                let er = echoRings[i];
                er.radius += dt * 0.15;
                er.alpha *= 0.993;
                if (er.alpha < 0.01 || er.radius > 500) echoRings.splice(i, 1);
            }

            render();
        }

        function spawnCracks() {
            let cx = 600;
            let neckY = 400;
            for (let i = 0; i < 4 + params.echoPulse; i++) {
                let angle = random() * TWO_PI;
                let segments = [];
                let sx = cx + (random() - 0.5) * params.neckWidth;
                let sy = neckY + (random() - 0.5) * 10;
                let ca = angle;
                let totalSeg = 3 + floor(random() * 5);
                for (let j = 0; j < totalSeg; j++) {
                    let len = 8 + random() * 25;
                    let nx = sx + cos(ca) * len;
                    let ny = sy + sin(ca) * len;
                    segments.push({ x1: sx, y1: sy, x2: nx, y2: ny });
                    sx = nx; sy = ny;
                    ca += (random() - 0.5) * 1.0;
                }
                cracks.push({ segments, growth: 0, maxGrowth: totalSeg, alpha: 0.3 + random() * 0.3, life: 2000 + random() * 3000 });
            }
        }

        function spawnEchoRings() {
            let cx = 600;
            let neckY = 400;
            for (let i = 0; i < params.echoPulse; i++) {
                echoRings.push({
                    x: cx, y: neckY,
                    radius: 5 + i * 15,
                    alpha: 0.25 - i * 0.04,
                    speed: 0.15 + i * 0.02,
                });
            }
        }

        function render() {
            let cx = 600;
            let neckY = 400;
            let bg = hexToRgb(params.colorPalette[0]);
            let cyan = hexToRgb(params.colorPalette[1]);
            let orange = hexToRgb(params.colorPalette[2]);

            background(bg.r, bg.g, bg.b);

            let grad = drawingContext.createLinearGradient(0, 0, 0, 800);
            grad.addColorStop(0, `rgba(${bg.r + 15}, ${bg.g + 20}, ${bg.b + 40}, 1)`);
            grad.addColorStop(0.45, `rgba(${bg.r}, ${bg.g}, ${bg.b}, 1)`);
            grad.addColorStop(0.55, `rgba(${bg.r}, ${bg.g}, ${bg.b}, 1)`);
            grad.addColorStop(1, `rgba(${max(0, bg.r - 5)}, ${max(0, bg.g - 5)}, ${max(0, bg.b - 5)}, 1)`);
            drawingContext.fillStyle = grad;
            drawingContext.fillRect(0, 0, 1200, 800);

            renderHourglassGlass(cx, neckY, bg, cyan);
            renderEchoRings(cyan, orange);
            renderGrains(cyan, orange);
            renderNeckGlow(cx, neckY, cyan, orange);
            renderCracks(orange);
            renderScanLines();
        }

        function renderHourglassGlass(cx, neckY, bg, cyan) {
            drawingContext.save();
            drawingContext.globalAlpha = 0.06;
            drawingContext.beginPath();
            drawingContext.moveTo(cx - 220, 30);
            drawingContext.quadraticCurveTo(cx - params.neckWidth, neckY, cx - 220, 770);
            drawingContext.lineTo(cx + 220, 770);
            drawingContext.quadraticCurveTo(cx + params.neckWidth, neckY, cx + 220, 30);
            drawingContext.closePath();
            drawingContext.strokeStyle = `rgb(${cyan.r}, ${cyan.g}, ${cyan.b})`;
            drawingContext.lineWidth = 1;
            drawingContext.stroke();
            drawingContext.restore();

            drawingContext.save();
            drawingContext.globalAlpha = 0.02;
            let breathCycle = sin(time * 0.001) * 0.5 + 0.5;
            drawingContext.beginPath();
            drawingContext.moveTo(cx - 220, 30);
            drawingContext.quadraticCurveTo(cx - params.neckWidth, neckY, cx - 220, 770);
            drawingContext.lineTo(cx + 220, 770);
            drawingContext.quadraticCurveTo(cx + params.neckWidth, neckY, cx + 220, 30);
            drawingContext.closePath();
            drawingContext.fillStyle = `rgba(${cyan.r}, ${cyan.g}, ${cyan.b}, ${0.02 + breathCycle * 0.01})`;
            drawingContext.fill();
            drawingContext.restore();
        }

        function renderGrains(cyan, orange) {
            noStroke();
            for (let g of grains) {
                if (g.alpha < 0.01) continue;
                let twinkle = 0.5 + 0.5 * sin(time * 0.003 + g.phase);
                let a = g.alpha * twinkle;
                let dissolveT = g.dissolve;
                let cr = lerp(cyan.r, orange.r, dissolveT);
                let cg = lerp(cyan.g, orange.g, dissolveT);
                let cb = lerp(cyan.b, orange.b, dissolveT);

                fill(cr, cg, cb, a * 255);
                ellipse(g.x, g.y, g.size, g.size);

                if (g.size > 1.5 && a > 0.2) {
                    fill(cr, cg, cb, a * 0.1 * 255);
                    ellipse(g.x, g.y, g.size * 4, g.size * 4);
                }
            }
        }

        function renderNeckGlow(cx, neckY, cyan, orange) {
            let breathCycle = sin(time * 0.001) * 0.5 + 0.5;
            let glowIntensity = 0.03 + breathCycle * 0.02 + neckGlow * 0.15;

            drawingContext.save();
            let grad = drawingContext.createRadialGradient(cx, neckY, 0, cx, neckY, params.neckWidth * 3);
            let glowR = lerp(cyan.r, orange.r, flipTransition);
            let glowG = lerp(cyan.g, orange.g, flipTransition);
            let glowB = lerp(cyan.b, orange.b, flipTransition);
            grad.addColorStop(0, `rgba(${glowR}, ${glowG}, ${glowB}, ${glowIntensity})`);
            grad.addColorStop(0.4, `rgba(${glowR}, ${glowG}, ${glowB}, ${glowIntensity * 0.3})`);
            grad.addColorStop(1, `rgba(${glowR}, ${glowG}, ${glowB}, 0)`);
            drawingContext.fillStyle = grad;
            drawingContext.fillRect(cx - 200, neckY - 100, 400, 200);
            drawingContext.restore();
        }

        function renderCracks(orange) {
            drawingContext.save();
            for (let crack of cracks) {
                crack.growth = min(crack.growth + 0.05, crack.maxGrowth);
                let visibleSegs = floor(crack.growth);
                for (let i = 0; i < min(visibleSegs, crack.segments.length); i++) {
                    let seg = crack.segments[i];
                    let flicker = sin(time * 0.005 + i * 0.5) * 0.3 + 0.7;
                    drawingContext.globalAlpha = crack.alpha * flicker;
                    drawingContext.strokeStyle = `rgb(${orange.r}, ${orange.g}, ${orange.b})`;
                    drawingContext.lineWidth = 1;
                    drawingContext.shadowColor = `rgb(${orange.r}, ${orange.g}, ${orange.b})`;
                    drawingContext.shadowBlur = 4;
                    drawingContext.beginPath();
                    drawingContext.moveTo(seg.x1, seg.y1);
                    drawingContext.lineTo(seg.x2, seg.y2);
                    drawingContext.stroke();
                }
            }
            drawingContext.shadowBlur = 0;
            drawingContext.restore();
        }

        function renderEchoRings(cyan, orange) {
            for (let er of echoRings) {
                let progress = er.radius / 500;
                let cr = lerp(cyan.r, orange.r, progress);
                let cg = lerp(cyan.g, orange.g, progress);
                let cb = lerp(cyan.b, orange.b, progress);
                drawingContext.save();
                drawingContext.globalAlpha = er.alpha;
                drawingContext.strokeStyle = `rgb(${cr}, ${cg}, ${cb})`;
                drawingContext.lineWidth = 1.5 * (1 - progress * 0.5);
                drawingContext.beginPath();
                drawingContext.ellipse(er.x, er.y, er.radius, er.radius * 0.3, 0, 0, TWO_PI);
                drawingContext.stroke();
                drawingContext.restore();
            }
        }

        function renderScanLines() {
            drawingContext.save();
            drawingContext.globalAlpha = 0.015;
            drawingContext.fillStyle = `rgba(10, 14, 26, 1)`;
            for (let y = 0; y < 800; y += 3) {
                drawingContext.fillRect(0, y, 1200, 1);
            }
            drawingContext.restore();
        }

        function updateParam(name, value) {
            let numVal = parseFloat(value);
            params[name] = numVal;
            document.getElementById(name + '-value').textContent = numVal;
            if (name === 'grainCount' || name === 'neckWidth') {
                initializeSystem();
            }
        }

        function updateColor(colorId, value) {
            let idx = parseInt(colorId.replace('color', '')) - 1;
            params.colorPalette[idx] = value;
            document.getElementById(colorId + '-value').textContent = value;
        }

        function updateSeedDisplay() { document.getElementById('seed-input').value = params.seed; }
        function updateSeed() {
            let newSeed = parseInt(document.getElementById('seed-input').value);
            if (newSeed && newSeed > 0) { params.seed = newSeed; initializeSystem(); }
            else { updateSeedDisplay(); }
        }
        function previousSeed() { params.seed = Math.max(1, params.seed - 1); updateSeedDisplay(); initializeSystem(); }
        function nextSeed() { params.seed = params.seed + 1; updateSeedDisplay(); initializeSystem(); }
        function randomSeedAndUpdate() { params.seed = Math.floor(Math.random() * 999999) + 1; updateSeedDisplay(); initializeSystem(); }

        function resetParameters() {
            params = { ...defaultParams };
            document.getElementById('grainCount').value = params.grainCount;
            document.getElementById('grainCount-value').textContent = params.grainCount;
            document.getElementById('gravityStrength').value = params.gravityStrength;
            document.getElementById('gravityStrength-value').textContent = params.gravityStrength;
            document.getElementById('flipPeriod').value = params.flipPeriod;
            document.getElementById('flipPeriod-value').textContent = params.flipPeriod;
            document.getElementById('neckWidth').value = params.neckWidth;
            document.getElementById('neckWidth-value').textContent = params.neckWidth;
            document.getElementById('erosionStrength').value = params.erosionStrength;
            document.getElementById('erosionStrength-value').textContent = params.erosionStrength;
            document.getElementById('echoPulse').value = params.echoPulse;
            document.getElementById('echoPulse-value').textContent = params.echoPulse;
            document.getElementById('color1').value = params.colorPalette[0];
            document.getElementById('color1-value').textContent = params.colorPalette[0];
            document.getElementById('color2').value = params.colorPalette[1];
            document.getElementById('color2-value').textContent = params.colorPalette[1];
            document.getElementById('color3').value = params.colorPalette[2];
            document.getElementById('color3-value').textContent = params.colorPalette[2];
            updateSeedDisplay();
            initializeSystem();
        }

        window.addEventListener('load', function () { updateSeedDisplay(); });
    </script>
</body>
</html>
