<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nayuta — Abyssal Erosion</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.7.0/p5.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&family=Lora:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --anthropic-dark: #141413;
            --anthropic-light: #faf9f5;
            --anthropic-mid-gray: #b0aea5;
            --anthropic-light-gray: #e8e6dc;
            --anthropic-orange: #d97757;
            --anthropic-blue: #6a9bcc;
            --anthropic-green: #788c5d;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, var(--anthropic-light) 0%, #f5f3ee 100%);
            min-height: 100vh;
            color: var(--anthropic-dark);
        }
        .container { display: flex; min-height: 100vh; padding: 20px; gap: 20px; }
        .sidebar {
            width: 320px; flex-shrink: 0;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 24px; border-radius: 12px;
            box-shadow: 0 10px 30px rgba(20, 20, 19, 0.1);
            overflow-y: auto; overflow-x: hidden;
        }
        .sidebar h1 { font-family: 'Lora', serif; font-size: 24px; font-weight: 500; color: var(--anthropic-dark); margin-bottom: 8px; }
        .sidebar .subtitle { color: var(--anthropic-mid-gray); font-size: 14px; margin-bottom: 32px; line-height: 1.4; }
        .control-section { margin-bottom: 32px; }
        .control-section h3 { font-size: 16px; font-weight: 600; color: var(--anthropic-dark); margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
        .control-section h3::before { content: '•'; color: var(--anthropic-orange); font-weight: bold; }
        .seed-input { width: 100%; background: var(--anthropic-light); padding: 12px; border-radius: 8px; font-family: 'Courier New', monospace; font-size: 14px; margin-bottom: 12px; border: 1px solid var(--anthropic-light-gray); text-align: center; }
        .seed-input:focus { outline: none; border-color: var(--anthropic-orange); box-shadow: 0 0 0 2px rgba(217, 119, 87, 0.1); background: white; }
        .seed-controls { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }
        .control-group { margin-bottom: 20px; }
        .control-group label { display: block; font-size: 14px; font-weight: 500; color: var(--anthropic-dark); margin-bottom: 8px; }
        .slider-container { display: flex; align-items: center; gap: 12px; }
        .slider-container input[type="range"] { flex: 1; height: 4px; background: var(--anthropic-light-gray); border-radius: 2px; outline: none; -webkit-appearance: none; }
        .slider-container input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 16px; height: 16px; background: var(--anthropic-orange); border-radius: 50%; cursor: pointer; }
        .slider-container input[type="range"]::-moz-range-thumb { width: 16px; height: 16px; background: var(--anthropic-orange); border-radius: 50%; border: none; cursor: pointer; }
        .value-display { font-family: 'Courier New', monospace; font-size: 12px; color: var(--anthropic-mid-gray); min-width: 60px; text-align: right; }
        .color-group { margin-bottom: 16px; }
        .color-group label { display: block; font-size: 12px; color: var(--anthropic-mid-gray); margin-bottom: 4px; }
        .color-picker-container { display: flex; align-items: center; gap: 8px; }
        .color-picker-container input[type="color"] { width: 32px; height: 32px; border: none; border-radius: 6px; cursor: pointer; background: none; padding: 0; }
        .color-value { font-family: 'Courier New', monospace; font-size: 12px; color: var(--anthropic-mid-gray); }
        .button { background: var(--anthropic-orange); color: white; border: none; padding: 10px 16px; border-radius: 6px; font-size: 14px; font-weight: 500; cursor: pointer; transition: all 0.2s ease; width: 100%; }
        .button:hover { background: #c86641; transform: translateY(-1px); }
        .button.secondary { background: var(--anthropic-blue); }
        .button.secondary:hover { background: #5a8bb8; }
        .button.tertiary { background: var(--anthropic-green); }
        .button.tertiary:hover { background: #6b7b52; }
        .button-row { display: flex; gap: 8px; }
        .button-row .button { flex: 1; }
        .canvas-area { flex: 1; display: flex; align-items: center; justify-content: center; min-width: 0; }
        #canvas-container { width: 100%; max-width: 1000px; border-radius: 12px; overflow: hidden; box-shadow: 0 20px 40px rgba(20, 20, 19, 0.1); background: #0A0E1A; }
        #canvas-container canvas { display: block; width: 100% !important; height: auto !important; }
        @media (max-width: 600px) { .container { flex-direction: column; } .sidebar { width: 100%; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <h1>Abyssal Erosion</h1>
            <div class="subtitle">深渊侵蚀 — 现实在呼吸中碎裂</div>

            <div class="control-section">
                <h3>Seed</h3>
                <input type="number" id="seed-input" class="seed-input" value="42" onchange="updateSeed()">
                <div class="seed-controls">
                    <button class="button secondary" onclick="previousSeed()">← Prev</button>
                    <button class="button secondary" onclick="nextSeed()">Next →</button>
                </div>
                <button class="button tertiary" onclick="randomSeedAndUpdate()">↻ Random</button>
            </div>

            <div class="control-section">
                <h3>Fog Parameters</h3>
                <div class="control-group">
                    <label>Fog Density</label>
                    <div class="slider-container">
                        <input type="range" id="fogDensity" min="0.1" max="1.0" step="0.05" value="0.5" oninput="updateParam('fogDensity', this.value)">
                        <span class="value-display" id="fogDensity-value">0.5</span>
                    </div>
                </div>
                <div class="control-group">
                    <label>Fog Drift Speed</label>
                    <div class="slider-container">
                        <input type="range" id="fogDrift" min="0.1" max="2.0" step="0.1" value="0.6" oninput="updateParam('fogDrift', this.value)">
                        <span class="value-display" id="fogDrift-value">0.6</span>
                    </div>
                </div>
                <div class="control-group">
                    <label>Noise Octaves</label>
                    <div class="slider-container">
                        <input type="range" id="noiseOctaves" min="1" max="6" step="1" value="4" oninput="updateParam('noiseOctaves', this.value)">
                        <span class="value-display" id="noiseOctaves-value">4</span>
                    </div>
                </div>
            </div>

            <div class="control-section">
                <h3>Erosion Parameters</h3>
                <div class="control-group">
                    <label>Erosion Rate</label>
                    <div class="slider-container">
                        <input type="range" id="erosionRate" min="0.1" max="2.0" step="0.1" value="0.8" oninput="updateParam('erosionRate', this.value)">
                        <span class="value-display" id="erosionRate-value">0.8</span>
                    </div>
                </div>
                <div class="control-group">
                    <label>Fracture Count</label>
                    <div class="slider-container">
                        <input type="range" id="fractureCount" min="3" max="20" step="1" value="8" oninput="updateParam('fractureCount', this.value)">
                        <span class="value-display" id="fractureCount-value">8</span>
                    </div>
                </div>
                <div class="control-group">
                    <label>Edge Glow Intensity</label>
                    <div class="slider-container">
                        <input type="range" id="edgeGlow" min="0.1" max="1.0" step="0.05" value="0.6" oninput="updateParam('edgeGlow', this.value)">
                        <span class="value-display" id="edgeGlow-value">0.6</span>
                    </div>
                </div>
            </div>

            <div class="control-section">
                <h3>Drift Particles</h3>
                <div class="control-group">
                    <label>Drift Count</label>
                    <div class="slider-container">
                        <input type="range" id="driftCount" min="200" max="5000" step="200" value="1500" oninput="updateParam('driftCount', this.value)">
                        <span class="value-display" id="driftCount-value">1500</span>
                    </div>
                </div>
                <div class="control-group">
                    <label>Drift Speed</label>
                    <div class="slider-container">
                        <input type="range" id="driftSpeed" min="0.2" max="3.0" step="0.1" value="1.0" oninput="updateParam('driftSpeed', this.value)">
                        <span class="value-display" id="driftSpeed-value">1.0</span>
                    </div>
                </div>
            </div>

            <div class="control-section">
                <h3>Colors</h3>
                <div class="color-group">
                    <label>Memory Anchor Glow</label>
                    <div class="color-picker-container">
                        <input type="color" id="color1" value="#00FFD4" onchange="updateColor('color1', this.value)">
                        <span class="color-value" id="color1-value">#00FFD4</span>
                    </div>
                </div>
                <div class="color-group">
                    <label>Void Erosion</label>
                    <div class="color-picker-container">
                        <input type="color" id="color2" value="#FF6B35" onchange="updateColor('color2', this.value)">
                        <span class="color-value" id="color2-value">#FF6B35</span>
                    </div>
                </div>
                <div class="color-group">
                    <label>Abyss Base</label>
                    <div class="color-picker-container">
                        <input type="color" id="color3" value="#0A0E1A" onchange="updateColor('color3', this.value)">
                        <span class="color-value" id="color3-value">#0A0E1A</span>
                    </div>
                </div>
            </div>

            <div class="control-section">
                <h3>Actions</h3>
                <div class="button-row">
                    <button class="button" onclick="resetParameters()">Reset</button>
                </div>
            </div>
        </div>

        <div class="canvas-area">
            <div id="canvas-container">
                <div class="loading">The abyss breathes...</div>
            </div>
        </div>
    </div>

    <script>
        let params = {
            seed: 42,
            fogDensity: 0.5,
            fogDrift: 0.6,
            noiseOctaves: 4,
            erosionRate: 0.8,
            fractureCount: 8,
            edgeGlow: 0.6,
            driftCount: 1500,
            driftSpeed: 1.0,
            colorPalette: ['#00FFD4', '#FF6B35', '#0A0E1A']
        };
        let defaultParams = {...params};

        let driftParticles = [];
        let fracturePoints = [];
        let erosionMap = [];
        let breathPhase = 0;
        let time = 0;
        let fogBuffer;

        function setup() {
            let canvas = createCanvas(1200, 1200);
            canvas.parent('canvas-container');
            fogBuffer = createGraphics(1200, 1200);
            initializeSystem();
            document.querySelector('.loading').style.display = 'none';
        }

        function initializeSystem() {
            randomSeed(params.seed);
            noiseSeed(params.seed);

            driftParticles = [];
            for (let i = 0; i < params.driftCount; i++) {
                driftParticles.push(new DriftParticle());
            }

            fracturePoints = [];
            for (let i = 0; i < params.fractureCount; i++) {
                fracturePoints.push({
                    x: random(width),
                    y: random(height),
                    radius: random(80, 250),
                    growth: random(0.3, 1.0),
                    phase: random(TWO_PI),
                    intensity: random(0.5, 1.0)
                });
            }

            erosionMap = [];
            let res = 4;
            for (let x = 0; x < width; x += res) {
                for (let y = 0; y < height; y += res) {
                    let n = 0;
                    let amp = 1;
                    let freq = 0.003;
                    for (let o = 0; o < params.noiseOctaves; o++) {
                        n += noise(x * freq, y * freq, params.seed * 0.1) * amp;
                        amp *= 0.5;
                        freq *= 2.2;
                    }
                    erosionMap.push({ x, y, erosion: n / params.noiseOctaves });
                }
            }

            breathPhase = 0;
            time = 0;
            background(10, 14, 26);
        }

        function draw() {
            time += deltaTime * 0.001;
            breathPhase += 0.008 * params.fogDrift;
            let breathCycle = sin(breathPhase) * 0.5 + 0.5;

            fill(10, 14, 26, 12 + params.fogDensity * 8);
            noStroke();
            rect(0, 0, width, height);

            renderFogLayer(breathCycle);
            renderErosionLayer(breathCycle);
            renderFractureGlow(breathCycle);
            renderDriftParticles(breathCycle);
        }

        function renderFogLayer(breathCycle) {
            let fogAlpha = params.fogDensity * (0.3 + breathCycle * 0.2);
            let zoff = time * 0.15 * params.fogDrift;

            for (let i = 0; i < 5; i++) {
                let cx = width * (0.2 + noise(i * 10, zoff * 0.3) * 0.6);
                let cy = height * (0.2 + noise(i * 10 + 100, zoff * 0.3) * 0.6);
                let r = (200 + noise(i * 10 + 200, zoff * 0.2) * 300) * (0.8 + breathCycle * 0.4);

                let gradient = drawingContext.createRadialGradient(cx, cy, 0, cx, cy, r);
                let baseColor = i % 2 === 0 ? '26, 16, 53' : '15, 21, 40';
                gradient.addColorStop(0, `rgba(${baseColor}, ${fogAlpha * 0.6})`);
                gradient.addColorStop(0.4, `rgba(${baseColor}, ${fogAlpha * 0.3})`);
                gradient.addColorStop(1, 'rgba(10, 14, 26, 0)');

                drawingContext.fillStyle = gradient;
                drawingContext.fillRect(0, 0, width, height);
            }

            let deepCx = width * 0.5 + sin(time * 0.2) * 100;
            let deepCy = height * 0.6 + cos(time * 0.15) * 80;
            let deepR = 350 + breathCycle * 100;
            let deepGrad = drawingContext.createRadialGradient(deepCx, deepCy, 0, deepCx, deepCy, deepR);
            deepGrad.addColorStop(0, `rgba(26, 16, 53, ${fogAlpha * 0.4})`);
            deepGrad.addColorStop(0.5, `rgba(42, 10, 26, ${fogAlpha * 0.15})`);
            deepGrad.addColorStop(1, 'rgba(10, 14, 26, 0)');
            drawingContext.fillStyle = deepGrad;
            drawingContext.fillRect(0, 0, width, height);
        }

        function renderErosionLayer(breathCycle) {
            let erosionProgress = (sin(time * 0.1 * params.erosionRate) * 0.5 + 0.5);
            let c1 = color(params.colorPalette[0]);
            let c2 = color(params.colorPalette[1]);

            for (let pt of erosionMap) {
                let erosionVal = pt.erosion;
                let threshold = 0.35 + erosionProgress * 0.3;

                if (erosionVal > threshold) {
                    let intensity = map(erosionVal, threshold, 1, 0, 1);
                    let edgeDist = abs(erosionVal - threshold);
                    let isEdge = edgeDist < 0.08;

                    if (isEdge) {
                        let glowIntensity = params.edgeGlow * (0.5 + breathCycle * 0.5);
                        let r = lerp(red(c1), red(c2), intensity);
                        let g = lerp(green(c1), green(c2), intensity);
                        let b = lerp(blue(c1), blue(c2), intensity);
                        let a = glowIntensity * (0.3 + edgeDist * 5);

                        fill(r, g, b, a * 255);
                        noStroke();
                        rect(pt.x, pt.y, 4, 4);

                        if (edgeDist < 0.03 && random() < 0.3) {
                            let glowR = 12 + breathCycle * 8;
                            let glowGrad = drawingContext.createRadialGradient(pt.x, pt.y, 0, pt.x, pt.y, glowR);
                            glowGrad.addColorStop(0, `rgba(${floor(r)}, ${floor(g)}, ${floor(b)}, ${a * 0.4})`);
                            glowGrad.addColorStop(1, 'rgba(10, 14, 26, 0)');
                            drawingContext.fillStyle = glowGrad;
                            drawingContext.fillRect(pt.x - glowR, pt.y - glowR, glowR * 2, glowR * 2);
                        }
                    } else if (intensity > 0.5) {
                        let r = lerp(red(c2), 10, intensity * 0.5);
                        let g = lerp(green(c2), 14, intensity * 0.5);
                        let b = lerp(blue(c2), 26, intensity * 0.5);
                        fill(r, g, b, 40 * intensity);
                        noStroke();
                        rect(pt.x, pt.y, 4, 4);
                    }
                }
            }
        }

        function renderFractureGlow(breathCycle) {
            let c1 = color(params.colorPalette[0]);
            let c2 = color(params.colorPalette[1]);

            for (let fp of fracturePoints) {
                let pulse = sin(time * 1.5 + fp.phase) * 0.5 + 0.5;
                let currentRadius = fp.radius * (0.8 + pulse * 0.4 * params.erosionRate);

                let cx = fp.x + sin(time * 0.3 + fp.phase) * 20;
                let cy = fp.y + cos(time * 0.25 + fp.phase) * 15;

                let grad = drawingContext.createRadialGradient(cx, cy, 0, cx, cy, currentRadius);
                let isEroding = fp.intensity > 0.6;
                let r = isEroding ? red(c2) : red(c1);
                let g = isEroding ? green(c2) : green(c1);
                let b = isEroding ? blue(c2) : blue(c1);
                let alpha = fp.intensity * params.edgeGlow * (0.1 + pulse * 0.08);

                grad.addColorStop(0, `rgba(${floor(r)}, ${floor(g)}, ${floor(b)}, ${alpha})`);
                grad.addColorStop(0.3, `rgba(${floor(r)}, ${floor(g)}, ${floor(b)}, ${alpha * 0.4})`);
                grad.addColorStop(1, 'rgba(10, 14, 26, 0)');
                drawingContext.fillStyle = grad;
                drawingContext.fillRect(cx - currentRadius, cy - currentRadius, currentRadius * 2, currentRadius * 2);

                if (isEroding && pulse > 0.7) {
                    let crackLen = currentRadius * 0.8;
                    let crackAngle = noise(fp.x * 0.01, fp.y * 0.01, time * 0.1) * TWO_PI * 2;
                    stroke(r, g, b, alpha * 150);
                    strokeWeight(1.5);
                    for (let j = 0; j < 3; j++) {
                        let a = crackAngle + j * TWO_PI / 3;
                        let ex = cx + cos(a) * crackLen;
                        let ey = cy + sin(a) * crackLen;
                        let midX = cx + cos(a) * crackLen * 0.5 + (noise(j, time) - 0.5) * 30;
                        let midY = cy + sin(a) * crackLen * 0.5 + (noise(j + 10, time) - 0.5) * 30;
                        noFill();
                        beginShape();
                        vertex(cx, cy);
                        quadraticVertex(midX, midY, ex, ey);
                        endShape();
                    }
                    noStroke();
                }
            }
        }

        function renderDriftParticles(breathCycle) {
            let c1 = color(params.colorPalette[0]);
            let c2 = color(params.colorPalette[1]);
            let c3 = color(params.colorPalette[2]);
            let zoff = time * 0.05;

            for (let p of driftParticles) {
                let n = noise(p.pos.x * 0.004, p.pos.y * 0.004, zoff);
                let angle = n * TWO_PI * 3;
                let fx = cos(angle) * 0.3;
                let fy = -params.driftSpeed * 0.5 * (0.3 + breathCycle * 0.7) + sin(angle) * 0.15;

                p.vel.x += fx * 0.1;
                p.vel.y += fy * 0.1;
                p.vel.x *= 0.95;
                p.vel.y *= 0.95;
                p.pos.add(p.vel);

                if (p.pos.y < -10) { p.pos.y = height + 10; p.pos.x = random(width); p.vel.set(0, 0); }
                if (p.pos.x < -10) p.pos.x = width + 10;
                if (p.pos.x > width + 10) p.pos.x = -10;
                if (p.pos.y > height + 10) { p.pos.y = -10; p.pos.x = random(width); }

                let depthNorm = p.pos.y / height;
                let mixedColor;
                if (depthNorm < 0.3) {
                    mixedColor = lerpColor(c1, c3, depthNorm / 0.3);
                } else if (depthNorm < 0.7) {
                    mixedColor = lerpColor(c3, c2, (depthNorm - 0.3) / 0.4);
                } else {
                    mixedColor = lerpColor(c2, c1, (depthNorm - 0.7) / 0.3);
                }

                let twinkle = sin(frameCount * 0.04 + p.phase) * 0.3 + 0.7;
                let alpha = p.baseAlpha * twinkle * breathCycle;

                noStroke();
                fill(red(mixedColor), green(mixedColor), blue(mixedColor), alpha * 255);
                ellipse(p.pos.x, p.pos.y, p.size, p.size);

                if (p.size > 2.5) {
                    fill(red(mixedColor), green(mixedColor), blue(mixedColor), alpha * 40);
                    ellipse(p.pos.x, p.pos.y, p.size * 4, p.size * 4);
                }
            }
        }

        class DriftParticle {
            constructor() {
                this.pos = createVector(random(width), random(height));
                this.vel = createVector(0, 0);
                this.size = random(0.5, 3.5);
                this.baseAlpha = random(0.05, 0.35);
                this.phase = random(TWO_PI);
            }
        }

        function updateParam(paramName, value) {
            params[paramName] = parseFloat(value);
            document.getElementById(paramName + '-value').textContent = value;
            if (paramName === 'driftCount' || paramName === 'fractureCount' || paramName === 'noiseOctaves') {
                initializeSystem();
            }
        }

        function updateColor(colorId, value) {
            let idx = colorId === 'color1' ? 0 : colorId === 'color2' ? 1 : 2;
            params.colorPalette[idx] = value;
            document.getElementById(colorId + '-value').textContent = value;
        }

        function updateSeedDisplay() {
            document.getElementById('seed-input').value = params.seed;
        }

        function updateSeed() {
            let input = document.getElementById('seed-input');
            let newSeed = parseInt(input.value);
            if (newSeed && newSeed > 0) {
                params.seed = newSeed;
                initializeSystem();
            } else {
                updateSeedDisplay();
            }
        }

        function previousSeed() {
            params.seed = Math.max(1, params.seed - 1);
            updateSeedDisplay();
            initializeSystem();
        }

        function nextSeed() {
            params.seed = params.seed + 1;
            updateSeedDisplay();
            initializeSystem();
        }

        function randomSeedAndUpdate() {
            params.seed = Math.floor(Math.random() * 999999) + 1;
            updateSeedDisplay();
            initializeSystem();
        }

        function resetParameters() {
            params = {...defaultParams};
            document.getElementById('fogDensity').value = params.fogDensity;
            document.getElementById('fogDensity-value').textContent = params.fogDensity;
            document.getElementById('fogDrift').value = params.fogDrift;
            document.getElementById('fogDrift-value').textContent = params.fogDrift;
            document.getElementById('noiseOctaves').value = params.noiseOctaves;
            document.getElementById('noiseOctaves-value').textContent = params.noiseOctaves;
            document.getElementById('erosionRate').value = params.erosionRate;
            document.getElementById('erosionRate-value').textContent = params.erosionRate;
            document.getElementById('fractureCount').value = params.fractureCount;
            document.getElementById('fractureCount-value').textContent = params.fractureCount;
            document.getElementById('edgeGlow').value = params.edgeGlow;
            document.getElementById('edgeGlow-value').textContent = params.edgeGlow;
            document.getElementById('driftCount').value = params.driftCount;
            document.getElementById('driftCount-value').textContent = params.driftCount;
            document.getElementById('driftSpeed').value = params.driftSpeed;
            document.getElementById('driftSpeed-value').textContent = params.driftSpeed;
            document.getElementById('color1').value = params.colorPalette[0];
            document.getElementById('color1-value').textContent = params.colorPalette[0];
            document.getElementById('color2').value = params.colorPalette[1];
            document.getElementById('color2-value').textContent = params.colorPalette[1];
            document.getElementById('color3').value = params.colorPalette[2];
            document.getElementById('color3-value').textContent = params.colorPalette[2];
            updateSeedDisplay();
            initializeSystem();
        }

        window.addEventListener('load', function() { updateSeedDisplay(); });
    </script>
</body>
