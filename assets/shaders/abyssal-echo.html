<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nayuta — Abyssal Memory Echo</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.7.0/p5.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&family=Lora:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --anthropic-dark: #141413;
            --anthropic-light: #faf9f5;
            --anthropic-mid-gray: #b0aea5;
            --anthropic-light-gray: #e8e6dc;
            --anthropic-orange: #d97757;
            --anthropic-blue: #6a9bcc;
            --anthropic-green: #788c5d;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, var(--anthropic-light) 0%, #f5f3ee 100%);
            min-height: 100vh;
            color: var(--anthropic-dark);
        }
        .container { display: flex; min-height: 100vh; padding: 20px; gap: 20px; }
        .sidebar {
            width: 320px; flex-shrink: 0;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 24px; border-radius: 12px;
            box-shadow: 0 10px 30px rgba(20, 20, 19, 0.1);
            overflow-y: auto; overflow-x: hidden;
        }
        .sidebar h1 { font-family: 'Lora', serif; font-size: 24px; font-weight: 500; color: var(--anthropic-dark); margin-bottom: 8px; }
        .sidebar .subtitle { color: var(--anthropic-mid-gray); font-size: 14px; margin-bottom: 32px; line-height: 1.4; }
        .control-section { margin-bottom: 32px; }
        .control-section h3 { font-size: 16px; font-weight: 600; color: var(--anthropic-dark); margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
        .control-section h3::before { content: '•'; color: var(--anthropic-orange); font-weight: bold; }
        .seed-input {
            width: 100%; background: var(--anthropic-light); padding: 12px;
            border-radius: 8px; font-family: 'Courier New', monospace; font-size: 14px;
            margin-bottom: 12px; border: 1px solid var(--anthropic-light-gray); text-align: center;
        }
        .seed-input:focus { outline: none; border-color: var(--anthropic-orange); box-shadow: 0 0 0 2px rgba(217, 119, 87, 0.1); background: white; }
        .seed-controls { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }
        .regen-button { margin-bottom: 0; }
        .control-group { margin-bottom: 20px; }
        .control-group label { display: block; font-size: 14px; font-weight: 500; color: var(--anthropic-dark); margin-bottom: 8px; }
        .slider-container { display: flex; align-items: center; gap: 12px; }
        .slider-container input[type="range"] { flex: 1; height: 4px; background: var(--anthropic-light-gray); border-radius: 2px; outline: none; -webkit-appearance: none; }
        .slider-container input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 16px; height: 16px; background: var(--anthropic-orange); border-radius: 50%; cursor: pointer; transition: all 0.2s ease; }
        .slider-container input[type="range"]::-webkit-slider-thumb:hover { transform: scale(1.1); background: #c86641; }
        .slider-container input[type="range"]::-moz-range-thumb { width: 16px; height: 16px; background: var(--anthropic-orange); border-radius: 50%; border: none; cursor: pointer; }
        .value-display { font-family: 'Courier New', monospace; font-size: 12px; color: var(--anthropic-mid-gray); min-width: 60px; text-align: right; }
        .color-group { margin-bottom: 16px; }
        .color-group label { display: block; font-size: 12px; color: var(--anthropic-mid-gray); margin-bottom: 4px; }
        .color-picker-container { display: flex; align-items: center; gap: 8px; }
        .color-picker-container input[type="color"] { width: 32px; height: 32px; border: none; border-radius: 6px; cursor: pointer; background: none; padding: 0; }
        .color-value { font-family: 'Courier New', monospace; font-size: 12px; color: var(--anthropic-mid-gray); }
        .button { background: var(--anthropic-orange); color: white; border: none; padding: 10px 16px; border-radius: 6px; font-size: 14px; font-weight: 500; cursor: pointer; transition: all 0.2s ease; width: 100%; }
        .button:hover { background: #c86641; transform: translateY(-1px); }
        .button:active { transform: translateY(0); }
        .button.secondary { background: var(--anthropic-blue); }
        .button.secondary:hover { background: #5a8bb8; }
        .button.tertiary { background: var(--anthropic-green); }
        .button.tertiary:hover { background: #6b7b52; }
        .button-row { display: flex; gap: 8px; }
        .button-row .button { flex: 1; }
        .canvas-area { flex: 1; display: flex; align-items: center; justify-content: center; min-width: 0; }
        #canvas-container { width: 100%; max-width: 1000px; border-radius: 12px; overflow: hidden; box-shadow: 0 20px 40px rgba(20, 20, 19, 0.1); background: #0A0E1A; }
        #canvas-container canvas { display: block; width: 100% !important; height: auto !important; }
        .loading { display: flex; align-items: center; justify-content: center; font-size: 18px; color: var(--anthropic-mid-gray); }
        @media (max-width: 600px) { .container { flex-direction: column; } .sidebar { width: 100%; } .canvas-area { padding: 20px; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <h1>Abyssal Memory Echo</h1>
            <div class="subtitle">深渊记忆回响 — 记忆在涟漪中浮现与消逝</div>

            <div class="control-section">
                <h3>Seed</h3>
                <input type="number" id="seed-input" class="seed-input" value="42" onchange="updateSeed()">
                <div class="seed-controls">
                    <button class="button secondary" onclick="previousSeed()">← Prev</button>
                    <button class="button secondary" onclick="nextSeed()">Next →</button>
                </div>
                <button class="button tertiary regen-button" onclick="randomSeedAndUpdate()">↻ Random</button>
            </div>

            <div class="control-section">
                <h3>Ripple Parameters</h3>
                <div class="control-group">
                    <label>Memory Sources</label>
                    <div class="slider-container">
                        <input type="range" id="memorySources" min="3" max="8" step="1" value="5" oninput="updateParam('memorySources', this.value)">
                        <span class="value-display" id="memorySources-value">5</span>
                    </div>
                </div>
                <div class="control-group">
                    <label>Ripple Frequency</label>
                    <div class="slider-container">
                        <input type="range" id="rippleFrequency" min="0.5" max="3.0" step="0.1" value="1.2" oninput="updateParam('rippleFrequency', this.value)">
                        <span class="value-display" id="rippleFrequency-value">1.2</span>
                    </div>
                </div>
            </div>

            <div class="control-section">
                <h3>Fragment Parameters</h3>
                <div class="control-group">
                    <label>Fragment Count</label>
                    <div class="slider-container">
                        <input type="range" id="fragmentCount" min="5" max="20" step="1" value="10" oninput="updateParam('fragmentCount', this.value)">
                        <span class="value-display" id="fragmentCount-value">10</span>
                    </div>
                </div>
            </div>

            <div class="control-section">
                <h3>Distortion Parameters</h3>
                <div class="control-group">
                    <label>Echo Speed</label>
                    <div class="slider-container">
                        <input type="range" id="echoSpeed" min="0.3" max="2.0" step="0.1" value="0.8" oninput="updateParam('echoSpeed', this.value)">
                        <span class="value-display" id="echoSpeed-value">0.8</span>
                    </div>
                </div>
                <div class="control-group">
                    <label>Time Warp</label>
                    <div class="slider-container">
                        <input type="range" id="timeWarp" min="0.1" max="1.0" step="0.05" value="0.5" oninput="updateParam('timeWarp', this.value)">
                        <span class="value-display" id="timeWarp-value">0.5</span>
                    </div>
                </div>
                <div class="control-group">
                    <label>Erosion</label>
                    <div class="slider-container">
                        <input type="range" id="erosion" min="0.0" max="1.0" step="0.05" value="0.3" oninput="updateParam('erosion', this.value)">
                        <span class="value-display" id="erosion-value">0.3</span>
                    </div>
                </div>
            </div>

            <div class="control-section">
                <h3>Colors</h3>
                <div class="color-group">
                    <label>Abyss Base</label>
                    <div class="color-picker-container">
                        <input type="color" id="color1" value="#0A0E1A" onchange="updateColor('color1', this.value)">
                        <span class="color-value" id="color1-value">#0A0E1A</span>
                    </div>
                </div>
                <div class="color-group">
                    <label>Fluorescent Cyan</label>
                    <div class="color-picker-container">
                        <input type="color" id="color2" value="#00FFD4" onchange="updateColor('color2', this.value)">
                        <span class="color-value" id="color2-value">#00FFD4</span>
                    </div>
                </div>
                <div class="color-group">
                    <label>Void Orange</label>
                    <div class="color-picker-container">
                        <input type="color" id="color3" value="#FF6B35" onchange="updateColor('color3', this.value)">
                        <span class="color-value" id="color3-value">#FF6B35</span>
                    </div>
                </div>
            </div>

            <div class="control-section">
                <h3>Actions</h3>
                <div class="button-row">
                    <button class="button" onclick="resetParameters()">Reset</button>
                </div>
            </div>
        </div>

        <div class="canvas-area">
            <div id="canvas-container">
                <div class="loading">Memories echo through the abyss...</div>
            </div>
        </div>
    </div>

    <script>
        let params = {
            seed: 42,
            memorySources: 5,
            rippleFrequency: 1.2,
            fragmentCount: 10,
            echoSpeed: 0.8,
            timeWarp: 0.5,
            erosion: 0.3,
            colorPalette: ['#0A0E1A', '#00FFD4', '#FF6B35']
        };
        let defaultParams = JSON.parse(JSON.stringify(params));

        let sources = [];
        let fragments = [];
        let echoPulses = [];
        let time = 0;
        let lastEchoTime = 0;
        let echoCyclePhase = 0;

        function hexToRgb(hex) {
            const r = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
            return r ? { r: parseInt(r[1], 16), g: parseInt(r[2], 16), b: parseInt(r[3], 16) } : { r: 0, g: 0, b: 0 };
        }

        function setup() {
            let canvas = createCanvas(1200, 800);
            canvas.parent('canvas-container');
            initializeSystem();
            document.querySelector('.loading').style.display = 'none';
        }

        function initializeSystem() {
            randomSeed(params.seed);
            noiseSeed(params.seed);
            time = 0;
            lastEchoTime = 0;
            echoCyclePhase = 0;
            sources = [];
            fragments = [];
            echoPulses = [];

            for (let i = 0; i < params.memorySources; i++) {
                sources.push({
                    x: random(150, width - 150),
                    y: random(150, height - 150),
                    baseFreq: random(0.8, 1.4),
                    phase: random(TWO_PI),
                    decay: random(0.003, 0.006),
                    maxRadius: random(300, 550),
                    driftAngle: random(TWO_PI),
                    driftSpeed: random(0.1, 0.4),
                    driftRadius: random(10, 40)
                });
            }

            for (let i = 0; i < params.fragmentCount; i++) {
                let shapes = ['hexagon', 'triangle', 'diamond'];
                fragments.push({
                    x: random(80, width - 80),
                    y: random(80, height - 80),
                    baseSize: random(6, 18),
                    rotation: random(TWO_PI),
                    shape: shapes[floor(random(shapes.length))],
                    phase: random(TWO_PI),
                    rotSpeed: random(0.003, 0.015) * (random() > 0.5 ? 1 : -1),
                    driftX: random(-0.3, 0.3),
                    driftY: random(-0.3, 0.3),
                    visibleAlpha: 0,
                    energyDensity: 0
                });
            }

            background(params.colorPalette[0]);
        }

        function getLocalTime(px, py) {
            let minDist = Infinity;
            let totalWeight = 0;
            let weightedTime = 0;

            for (let s of sources) {
                let d = dist(px, py, s.x, s.y);
                let w = 1.0 / (d * d + 1000);
                totalWeight += w;
                weightedTime += w * time;
                if (d < minDist) minDist = d;
            }

            let nearBoost = 1.0 + params.timeWarp * 2.0 / (1.0 + minDist * 0.005);
            return (weightedTime / totalWeight) * nearBoost;
        }

        function computeRippleField(px, py, localTime) {
            let totalAmplitude = 0;
            let totalGradX = 0;
            let totalGradY = 0;
            let energyDensity = 0;

            for (let s of sources) {
                let sx = s.x + cos(time * s.driftSpeed + s.driftAngle) * s.driftRadius;
                let sy = s.y + sin(time * s.driftSpeed * 0.7 + s.driftAngle) * s.driftRadius;
                let d = dist(px, py, sx, sy);
                if (d > s.maxRadius) continue;

                let freq = s.baseFreq * params.rippleFrequency;
                let phase = s.phase + localTime * freq * 2.0;
                let amp = exp(-s.decay * d) * sin(d * 0.05 * freq - phase);

                totalAmplitude += amp;

                if (d > 1) {
                    let dx = (px - sx) / d;
                    let dy = (py - sy) / d;
                    let gradMag = exp(-s.decay * d) * cos(d * 0.05 * freq - phase) * 0.05 * freq;
                    totalGradX += gradMag * dx;
                    totalGradY += gradMag * dy;
                }

                energyDensity += exp(-s.decay * d * 0.5) * (0.5 + 0.5 * abs(amp));
            }

            return {
                amplitude: totalAmplitude,
                gradX: totalGradX,
                gradY: totalGradY,
                energyDensity: energyDensity
            };
        }

        function computeEchoBoost(px, py) {
            let boost = 0;
            for (let pulse of echoPulses) {
                let d = dist(px, py, pulse.cx, pulse.cy);
                let ringDist = abs(d - pulse.radius);
                let ringWidth = 40 + pulse.radius * 0.08;
                if (ringDist < ringWidth) {
                    let proximity = 1.0 - ringDist / ringWidth;
                    boost += proximity * pulse.alpha;
                }
            }
            return constrain(boost, 0, 1);
        }

        function draw() {
            time += deltaTime / 1000;

            let breathCycle = 1.25 / max(params.echoSpeed, 0.3);
            echoCyclePhase += deltaTime / 1000;
            if (echoCyclePhase >= breathCycle) {
                echoCyclePhase -= breathCycle;
                spawnEchoPulse();
            }

            for (let i = echoPulses.length - 1; i >= 0; i--) {
                let pulse = echoPulses[i];
                pulse.radius += pulse.speed * deltaTime / 1000;
                pulse.alpha *= 0.992;
                if (pulse.radius > pulse.maxRadius || pulse.alpha < 0.01) {
                    echoPulses.splice(i, 1);
                }
            }

            let bgColor = hexToRgb(params.colorPalette[0]);
            fill(bgColor.r, bgColor.g, bgColor.b, 18);
            noStroke();
            rect(0, 0, width, height);

            renderAmbientGlow();
            renderMemoryRipples();
            renderEchoPulseWaves();
            updateAndRenderFragments();
            renderErosionOverlay();
            renderVignette();
        }

        function spawnEchoPulse() {
            echoPulses.push({
                cx: width / 2,
                cy: height / 2,
                radius: 10,
                maxRadius: max(width, height) * 0.9,
                speed: 150 * params.echoSpeed,
                alpha: 0.7
            });
        }

        function renderAmbientGlow() {
            let cyanColor = hexToRgb(params.colorPalette[1]);

            for (let s of sources) {
                let sx = s.x + cos(time * s.driftSpeed + s.driftAngle) * s.driftRadius;
                let sy = s.y + sin(time * s.driftSpeed * 0.7 + s.driftAngle) * s.driftRadius;
                let pulse = sin(time * 0.5 + s.phase) * 0.3 + 0.7;
                let r = 120 * pulse;

                let grad = drawingContext.createRadialGradient(sx, sy, 0, sx, sy, r);
                grad.addColorStop(0, `rgba(${cyanColor.r}, ${cyanColor.g}, ${cyanColor.b}, 0.04)`);
                grad.addColorStop(0.5, `rgba(${cyanColor.r}, ${cyanColor.g}, ${cyanColor.b}, 0.015)`);
                grad.addColorStop(1, 'rgba(10, 14, 26, 0)');
                drawingContext.fillStyle = grad;
                drawingContext.fillRect(sx - r, sy - r, r * 2, r * 2);
            }
        }

        function renderMemoryRipples() {
            let cyanColor = hexToRgb(params.colorPalette[1]);

            for (let s of sources) {
                let sx = s.x + cos(time * s.driftSpeed + s.driftAngle) * s.driftRadius;
                let sy = s.y + sin(time * s.driftSpeed * 0.7 + s.driftAngle) * s.driftRadius;

                let freq = s.baseFreq * params.rippleFrequency;
                let ringSpacing = max(20, 60 / freq);
                let maxRings = floor(s.maxRadius / ringSpacing);

                for (let i = 0; i < maxRings; i++) {
                    let baseRadius = i * ringSpacing;
                    let localT = time * (1.0 + params.timeWarp * 2.0 / (1.0 + baseRadius * 0.005));
                    let waveOffset = sin(localT * freq * 2.0 + s.phase + i * 0.3) * ringSpacing * 0.3;
                    let radius = baseRadius + waveOffset;

                    if (radius < 5 || radius > s.maxRadius) continue;

                    let amp = exp(-s.decay * radius);
                    let alphaBase = amp * (0.3 + 0.7 * abs(sin(localT * freq + s.phase + i * 0.5)));

                    let echoBoost = computeEchoBoost(sx + cos(0) * radius, sy + sin(0) * radius);
                    alphaBase += echoBoost * 0.4;
                    alphaBase = constrain(alphaBase, 0, 0.6);

                    if (alphaBase < 0.01) continue;

                    let thickness = 1.0 + amp * 1.5 + echoBoost * 2.0;

                    noFill();
                    stroke(cyanColor.r, cyanColor.g, cyanColor.b, alphaBase * 255);
                    strokeWeight(thickness);
                    ellipse(sx, sy, radius * 2, radius * 2);
                }
            }
        }

        function renderEchoPulseWaves() {
            let cyanColor = hexToRgb(params.colorPalette[1]);
            let orangeColor = hexToRgb(params.colorPalette[2]);

            for (let pulse of echoPulses) {
                let progress = pulse.radius / pulse.maxRadius;
                let cr = lerp(cyanColor.r, orangeColor.r, progress * 0.5);
                let cg = lerp(cyanColor.g, orangeColor.g, progress * 0.5);
                let cb = lerp(cyanColor.b, orangeColor.b, progress * 0.5);

                noFill();
                stroke(cr, cg, cb, pulse.alpha * 180);
                strokeWeight(2.5 + pulse.alpha * 3);
                ellipse(pulse.cx, pulse.cy, pulse.radius * 2, pulse.radius * 2);

                let innerR = pulse.radius - 15;
                if (innerR > 0) {
                    stroke(cr, cg, cb, pulse.alpha * 60);
                    strokeWeight(1);
                    ellipse(pulse.cx, pulse.cy, innerR * 2, innerR * 2);
                }

                let outerR = pulse.radius + 20;
                stroke(cr, cg, cb, pulse.alpha * 30);
                strokeWeight(0.5);
                ellipse(pulse.cx, pulse.cy, outerR * 2, outerR * 2);
            }
        }

        function updateAndRenderFragments() {
            let cyanColor = hexToRgb(params.colorPalette[1]);
            let orangeColor = hexToRgb(params.colorPalette[2]);

            for (let frag of fragments) {
                frag.x += frag.driftX;
                frag.y += frag.driftY;

                if (frag.x < 30) { frag.x = 30; frag.driftX *= -1; }
                if (frag.x > width - 30) { frag.x = width - 30; frag.driftX *= -1; }
                if (frag.y < 30) { frag.y = 30; frag.driftY *= -1; }
                if (frag.y > height - 30) { frag.y = height - 30; frag.driftY *= -1; }

                let localT = getLocalTime(frag.x, frag.y);
                let field = computeRippleField(frag.x, frag.y, localT);
                let echoBoost = computeEchoBoost(frag.x, frag.y);

                let visibility = constrain(abs(field.amplitude) + echoBoost * 0.6, 0, 1);
                let targetAlpha = visibility * (0.2 + field.energyDensity * 0.3 + echoBoost * 0.5);
                targetAlpha = constrain(targetAlpha, 0, 0.8);

                frag.visibleAlpha = lerp(frag.visibleAlpha, targetAlpha, 0.08);
                frag.energyDensity = field.energyDensity;

                let gradAngle = atan2(field.gradY, field.gradX);
                frag.rotation = lerp(frag.rotation, gradAngle + frag.phase, 0.05);
                frag.rotation += frag.rotSpeed;

                if (frag.visibleAlpha < 0.01) continue;

                let colorShift = echoBoost;
                let cr = lerp(cyanColor.r, orangeColor.r, colorShift);
                let cg = lerp(cyanColor.g, orangeColor.g, colorShift);
                let cb = lerp(cyanColor.b, orangeColor.b, colorShift);

                let sizeMod = 0.6 + field.energyDensity * 0.6 + echoBoost * 0.5;
                let s = frag.baseSize * sizeMod;

                push();
                translate(frag.x, frag.y);
                rotate(frag.rotation);

                noFill();
                stroke(cr, cg, cb, frag.visibleAlpha * 255);
                strokeWeight(1.2 + echoBoost * 1.5);

                if (frag.shape === 'hexagon') {
                    beginShape();
                    for (let i = 0; i < 6; i++) {
                        let a = i * TWO_PI / 6;
                        vertex(cos(a) * s, sin(a) * s);
                    }
                    endShape(CLOSE);
                } else if (frag.shape === 'triangle') {
                    beginShape();
                    for (let i = 0; i < 3; i++) {
                        let a = i * TWO_PI / 3 - HALF_PI;
                        vertex(cos(a) * s, sin(a) * s);
                    }
                    endShape(CLOSE);
                } else {
                    beginShape();
                    vertex(0, -s);
                    vertex(s * 0.6, 0);
                    vertex(0, s);
                    vertex(-s * 0.6, 0);
                    endShape(CLOSE);
                }

                if (frag.visibleAlpha > 0.15) {
                    let glowR = s * 2.5;
                    let glowGrad = drawingContext.createRadialGradient(0, 0, 0, 0, 0, glowR);
                    glowGrad.addColorStop(0, `rgba(${floor(cr)}, ${floor(cg)}, ${floor(cb)}, ${frag.visibleAlpha * 0.15})`);
                    glowGrad.addColorStop(1, 'rgba(10, 14, 26, 0)');
                    drawingContext.fillStyle = glowGrad;
                    drawingContext.fillRect(-glowR, -glowR, glowR * 2, glowR * 2);
                }

                pop();
            }
        }

        function renderErosionOverlay() {
            if (params.erosion < 0.01) return;
            let orangeColor = hexToRgb(params.colorPalette[2]);
            let bgColor = hexToRgb(params.colorPalette[0]);

            if (random() < params.erosion * 0.15) {
                let crackCount = floor(random(1, 3));
                for (let i = 0; i < crackCount; i++) {
                    let sx = random(width);
                    let sy = random(height);
                    stroke(orangeColor.r, orangeColor.g, orangeColor.b, random(15, 45) * params.erosion);
                    strokeWeight(random(0.3, 1.5));
                    let cx2 = sx;
                    let cy2 = sy;
                    let angle = random(TWO_PI);
                    let segs = floor(random(3, 7));
                    for (let j = 0; j < segs; j++) {
                        let len = random(8, 35);
                        let nx = cx2 + cos(angle) * len;
                        let ny = cy2 + sin(angle) * len;
                        line(cx2, cy2, nx, ny);
                        cx2 = nx;
                        cy2 = ny;
                        angle += random(-0.7, 0.7);
                    }
                }
            }

            if (random() < params.erosion * 0.08) {
                let glitchY = random(height);
                let glitchH = random(1, 8);
                fill(bgColor.r, bgColor.g, bgColor.b, 20 * params.erosion);
                noStroke();
                rect(random(-3, 3), glitchY, width, glitchH);
            }

            if (random() < params.erosion * 0.04) {
                let dotCount = floor(random(2, 8));
                for (let i = 0; i < dotCount; i++) {
                    let dx = random(width);
                    let dy = random(height);
                    fill(orangeColor.r, orangeColor.g, orangeColor.b, random(10, 30) * params.erosion);
                    noStroke();
                    ellipse(dx, dy, random(1, 3), random(1, 3));
                }
            }
        }

        function renderVignette() {
            let cx = width / 2;
            let cy = height / 2;
            let maxR = sqrt(cx * cx + cy * cy);
            for (let i = 0; i < 3; i++) {
                let r = maxR * (0.55 + i * 0.18);
                let alpha = (i + 1) * 0.07;
                let grad = drawingContext.createRadialGradient(cx, cy, r * 0.4, cx, cy, r);
                grad.addColorStop(0, 'rgba(0,0,0,0)');
                grad.addColorStop(1, `rgba(0,0,0,${alpha})`);
                drawingContext.fillStyle = grad;
                drawingContext.fillRect(0, 0, width, height);
            }
        }

        function updateParam(name, value) {
            let numVal = parseFloat(value);
            params[name] = numVal;
            document.getElementById(name + '-value').textContent = value;
            if (name === 'memorySources' || name === 'fragmentCount') {
                initializeSystem();
            }
        }

        function updateColor(colorId, value) {
            let idx = parseInt(colorId.replace('color', '')) - 1;
            params.colorPalette[idx] = value;
            document.getElementById(colorId + '-value').textContent = value;
        }

        function updateSeedDisplay() {
            document.getElementById('seed-input').value = params.seed;
        }

        function updateSeed() {
            let newSeed = parseInt(document.getElementById('seed-input').value);
            if (newSeed && newSeed > 0) {
                params.seed = newSeed;
                initializeSystem();
            } else {
                updateSeedDisplay();
            }
        }

        function previousSeed() {
            params.seed = Math.max(1, params.seed - 1);
            updateSeedDisplay();
            initializeSystem();
        }

        function nextSeed() {
            params.seed++;
            updateSeedDisplay();
            initializeSystem();
        }

        function randomSeedAndUpdate() {
            params.seed = Math.floor(Math.random() * 999999) + 1;
            updateSeedDisplay();
            initializeSystem();
        }

        function resetParameters() {
            params = JSON.parse(JSON.stringify(defaultParams));
            document.getElementById('memorySources').value = params.memorySources;
            document.getElementById('memorySources-value').textContent = params.memorySources;
            document.getElementById('rippleFrequency').value = params.rippleFrequency;
            document.getElementById('rippleFrequency-value').textContent = params.rippleFrequency;
            document.getElementById('fragmentCount').value = params.fragmentCount;
            document.getElementById('fragmentCount-value').textContent = params.fragmentCount;
            document.getElementById('echoSpeed').value = params.echoSpeed;
            document.getElementById('echoSpeed-value').textContent = params.echoSpeed;
            document.getElementById('timeWarp').value = params.timeWarp;
            document.getElementById('timeWarp-value').textContent = params.timeWarp;
            document.getElementById('erosion').value = params.erosion;
            document.getElementById('erosion-value').textContent = params.erosion;
            document.getElementById('color1').value = params.colorPalette[0];
            document.getElementById('color1-value').textContent = params.colorPalette[0];
            document.getElementById('color2').value = params.colorPalette[1];
            document.getElementById('color2-value').textContent = params.colorPalette[1];
            document.getElementById('color3').value = params.colorPalette[2];
            document.getElementById('color3-value').textContent = params.colorPalette[2];
            updateSeedDisplay();
            initializeSystem();
        }

        window.addEventListener('load', function() {
            updateSeedDisplay();
        });
    </script>
</body>
</html>
