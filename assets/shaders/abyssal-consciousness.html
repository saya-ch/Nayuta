<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abyssal Consciousness Flow</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.7.0/p5.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&family=Lora:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --anthropic-dark: #141413;
            --anthropic-light: #faf9f5;
            --anthropic-mid-gray: #b0aea5;
            --anthropic-light-gray: #e8e6dc;
            --anthropic-orange: #d97757;
            --anthropic-blue: #6a9bcc;
            --anthropic-green: #788c5d;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, var(--anthropic-light) 0%, #f5f3ee 100%);
            min-height: 100vh;
            color: var(--anthropic-dark);
        }
        .container { display: flex; min-height: 100vh; padding: 20px; gap: 20px; }
        .sidebar {
            width: 320px; flex-shrink: 0;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 24px; border-radius: 12px;
            box-shadow: 0 10px 30px rgba(20, 20, 19, 0.1);
            overflow-y: auto; overflow-x: hidden;
        }
        .sidebar h1 { font-family: 'Lora', serif; font-size: 22px; font-weight: 500; color: var(--anthropic-dark); margin-bottom: 8px; }
        .sidebar .subtitle { color: var(--anthropic-mid-gray); font-size: 13px; margin-bottom: 28px; line-height: 1.4; }
        .control-section { margin-bottom: 28px; }
        .control-section h3 { font-size: 15px; font-weight: 600; color: var(--anthropic-dark); margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
        .control-section h3::before { content: '•'; color: var(--anthropic-orange); font-weight: bold; }
        .seed-input {
            width: 100%; background: var(--anthropic-light); padding: 10px; border-radius: 8px;
            font-family: 'Courier New', monospace; font-size: 14px; margin-bottom: 10px;
            border: 1px solid var(--anthropic-light-gray); text-align: center;
        }
        .seed-input:focus { outline: none; border-color: var(--anthropic-orange); box-shadow: 0 0 0 2px rgba(217, 119, 87, 0.1); background: white; }
        .seed-controls { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }
        .control-group { margin-bottom: 16px; }
        .control-group label { display: block; font-size: 13px; font-weight: 500; color: var(--anthropic-dark); margin-bottom: 6px; }
        .slider-container { display: flex; align-items: center; gap: 10px; }
        .slider-container input[type="range"] {
            flex: 1; height: 4px; background: var(--anthropic-light-gray); border-radius: 2px; outline: none; -webkit-appearance: none;
        }
        .slider-container input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none; width: 14px; height: 14px; background: var(--anthropic-orange); border-radius: 50%; cursor: pointer;
        }
        .value-display { font-family: 'Courier New', monospace; font-size: 11px; color: var(--anthropic-mid-gray); min-width: 50px; text-align: right; }
        .color-group { margin-bottom: 14px; }
        .color-group label { display: block; font-size: 12px; color: var(--anthropic-mid-gray); margin-bottom: 4px; }
        .color-picker-container { display: flex; align-items: center; gap: 8px; }
        .color-picker-container input[type="color"] { width: 28px; height: 28px; border: none; border-radius: 6px; cursor: pointer; background: none; padding: 0; }
        .color-value { font-family: 'Courier New', monospace; font-size: 11px; color: var(--anthropic-mid-gray); }
        .button {
            background: var(--anthropic-orange); color: white; border: none; padding: 9px 14px; border-radius: 6px;
            font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.2s ease; width: 100%;
        }
        .button:hover { background: #c86641; transform: translateY(-1px); }
        .button.secondary { background: var(--anthropic-blue); }
        .button.secondary:hover { background: #5a8bb8; }
        .button.tertiary { background: var(--anthropic-green); }
        .button.tertiary:hover { background: #6b7b52; }
        .button-row { display: flex; gap: 8px; }
        .button-row .button { flex: 1; }
        .canvas-area { flex: 1; display: flex; align-items: center; justify-content: center; min-width: 0; }
        #canvas-container {
            width: 100%; max-width: 1000px; border-radius: 12px; overflow: hidden;
            box-shadow: 0 20px 40px rgba(20, 20, 19, 0.1); background: #0A0E1A;
        }
        #canvas-container canvas { display: block; width: 100% !important; height: auto !important; }
        .loading { display: flex; align-items: center; justify-content: center; font-size: 16px; color: var(--anthropic-mid-gray); }
        @media (max-width: 600px) { .container { flex-direction: column; } .sidebar { width: 100%; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <h1>Abyssal Consciousness Flow</h1>
            <div class="subtitle">意识在忘却之海中的流动拓扑——记忆碎片漂浮、时间扭曲、自我溶解</div>

            <div class="control-section">
                <h3>Seed</h3>
                <input type="number" id="seed-input" class="seed-input" value="42" onchange="updateSeed()">
                <div class="seed-controls">
                    <button class="button secondary" onclick="previousSeed()">← Prev</button>
                    <button class="button secondary" onclick="nextSeed()">Next →</button>
                </div>
                <button class="button tertiary" onclick="randomSeedAndUpdate()">↻ Random</button>
            </div>

            <div class="control-section">
                <h3>Parameters</h3>
                <div class="control-group">
                    <label>Stream Count</label>
                    <div class="slider-container">
                        <input type="range" id="streamCount" min="200" max="2000" step="100" value="800" oninput="updateParam('streamCount', this.value)">
                        <span class="value-display" id="streamCount-value">800</span>
                    </div>
                </div>
                <div class="control-group">
                    <label>Flow Speed</label>
                    <div class="slider-container">
                        <input type="range" id="flowSpeed" min="0.5" max="4.0" step="0.1" value="1.5" oninput="updateParam('flowSpeed', this.value)">
                        <span class="value-display" id="flowSpeed-value">1.5</span>
                    </div>
                </div>
                <div class="control-group">
                    <label>Noise Scale</label>
                    <div class="slider-container">
                        <input type="range" id="noiseScale" min="0.001" max="0.015" step="0.001" value="0.004" oninput="updateParam('noiseScale', this.value)">
                        <span class="value-display" id="noiseScale-value">0.004</span>
                    </div>
                </div>
                <div class="control-group">
                    <label>Fragment Count</label>
                    <div class="slider-container">
                        <input type="range" id="fragmentCount" min="3" max="20" step="1" value="8" oninput="updateParam('fragmentCount', this.value)">
                        <span class="value-display" id="fragmentCount-value">8</span>
                    </div>
                </div>
                <div class="control-group">
                    <label>Time Warp</label>
                    <div class="slider-container">
                        <input type="range" id="timeWarp" min="0.0" max="1.0" step="0.05" value="0.5" oninput="updateParam('timeWarp', this.value)">
                        <span class="value-display" id="timeWarp-value">0.5</span>
                    </div>
                </div>
                <div class="control-group">
                    <label>Dissolution</label>
                    <div class="slider-container">
                        <input type="range" id="dissolution" min="0.0" max="1.0" step="0.05" value="0.3" oninput="updateParam('dissolution', this.value)">
                        <span class="value-display" id="dissolution-value">0.3</span>
                    </div>
                </div>
                <div class="control-group">
                    <label>Breath Speed</label>
                    <div class="slider-container">
                        <input type="range" id="breathSpeed" min="0.2" max="3.0" step="0.1" value="0.8" oninput="updateParam('breathSpeed', this.value)">
                        <span class="value-display" id="breathSpeed-value">0.8</span>
                    </div>
                </div>
            </div>

            <div class="control-section">
                <h3>Colors</h3>
                <div class="color-group">
                    <label>Abyss Background</label>
                    <div class="color-picker-container">
                        <input type="color" id="colorBg" value="#0A0E1A" onchange="updateColor('colorBg', this.value)">
                        <span class="color-value" id="colorBg-value">#0A0E1A</span>
                    </div>
                </div>
                <div class="color-group">
                    <label>Consciousness Cyan</label>
                    <div class="color-picker-container">
                        <input type="color" id="colorCyan" value="#00FFD4" onchange="updateColor('colorCyan', this.value)">
                        <span class="color-value" id="colorCyan-value">#00FFD4</span>
                    </div>
                </div>
                <div class="color-group">
                    <label>Dissolution Orange</label>
                    <div class="color-picker-container">
                        <input type="color" id="colorOrange" value="#FF6B35" onchange="updateColor('colorOrange', this.value)">
                        <span class="color-value" id="colorOrange-value">#FF6B35</span>
                    </div>
                </div>
            </div>

            <div class="control-section">
                <h3>Actions</h3>
                <div class="button-row">
                    <button class="button" onclick="resetParameters()">Reset</button>
                </div>
            </div>
        </div>

        <div class="canvas-area">
            <div id="canvas-container">
                <div class="loading">Initializing consciousness flow...</div>
            </div>
        </div>
    </div>

    <script>
        let params = {
            seed: 42,
            streamCount: 800,
            flowSpeed: 1.5,
            noiseScale: 0.004,
            fragmentCount: 8,
            timeWarp: 0.5,
            dissolution: 0.3,
            breathSpeed: 0.8,
            colorBg: '#0A0E1A',
            colorCyan: '#00FFD4',
            colorOrange: '#FF6B35'
        };

        let defaultParams = {...params};
        let streams = [];
        let fragments = [];
        let time = 0;

        function hexToRgb(hex) {
            let r = parseInt(hex.slice(1, 3), 16);
            let g = parseInt(hex.slice(3, 5), 16);
            let b = parseInt(hex.slice(5, 7), 16);
            return { r, g, b };
        }

        function setup() {
            let canvas = createCanvas(1200, 800);
            canvas.parent('canvas-container');
            document.querySelector('.loading').style.display = 'none';
            initializeSystem();
        }

        function initializeSystem() {
            randomSeed(params.seed);
            noiseSeed(params.seed);
            time = 0;

            streams = [];
            for (let i = 0; i < params.streamCount; i++) {
                streams.push(new ConsciousnessStream());
            }

            fragments = [];
            for (let i = 0; i < params.fragmentCount; i++) {
                fragments.push(new MemoryFragment(i));
            }

            let bg = hexToRgb(params.colorBg);
            background(bg.r, bg.g, bg.b);
        }

        function draw() {
            let bg = hexToRgb(params.colorBg);
            fill(bg.r, bg.g, bg.b, 12);
            noStroke();
            rect(0, 0, width, height);

            time += 0.016 * params.breathSpeed;

            let breathCycle = sin(time * 0.8) * 0.5 + 0.5;

            for (let frag of fragments) {
                frag.update();
                frag.render();
            }

            for (let stream of streams) {
                stream.update(breathCycle);
                stream.render();
            }

            renderTimeWarpOverlay();
            renderDissolutionOverlay();
            renderConsciousnessCore(breathCycle);
        }

        class ConsciousnessStream {
            constructor() {
                this.reset();
                this.memoryWeight = random(0.3, 1.0);
                this.baseAlpha = random(0.1, 0.5) * this.memoryWeight;
                this.trail = [];
                this.maxTrail = floor(random(8, 25));
                this.isCyan = random() > 0.35;
            }

            reset() {
                this.x = random(width);
                this.y = random(height);
                this.vx = 0;
                this.vy = 0;
                this.trail = [];
                this.life = random(200, 800);
                this.maxLife = this.life;
            }

            update(breathCycle) {
                let timeFactor = 1.0;
                if (params.timeWarp > 0) {
                    for (let frag of fragments) {
                        let dx = this.x - frag.x;
                        let dy = this.y - frag.y;
                        let dist = sqrt(dx * dx + dy * dy);
                        if (dist < 120) {
                            timeFactor *= 1.0 - params.timeWarp * (1.0 - dist / 120) * 0.6;
                        }
                    }
                }
                timeFactor = max(0.2, timeFactor);

                let angle = noise(this.x * params.noiseScale, this.y * params.noiseScale, time * 0.3) * TWO_PI * 4;
                let forceX = cos(angle) * params.flowSpeed * timeFactor;
                let forceY = sin(angle) * params.flowSpeed * timeFactor;

                for (let frag of fragments) {
                    let dx = frag.x - this.x;
                    let dy = frag.y - this.y;
                    let dist = sqrt(dx * dx + dy * dy);
                    if (dist < 150 && dist > 1) {
                        let attraction = frag.weight * 0.3 * (1.0 - dist / 150);
                        forceX += (dx / dist) * attraction;
                        forceY += (dy / dist) * attraction;
                        let tangentX = -dy / dist;
                        let tangentY = dx / dist;
                        forceX += tangentX * attraction * 0.5;
                        forceY += tangentY * attraction * 0.5;
                    }
                }

                this.vx = this.vx * 0.85 + forceX * 0.15;
                this.vy = this.vy * 0.85 + forceY * 0.15;
                this.x += this.vx;
                this.y += this.vy;

                this.trail.push({ x: this.x, y: this.y });
                if (this.trail.length > this.maxTrail) {
                    this.trail.shift();
                }

                this.life -= timeFactor;

                if (this.x < -20 || this.x > width + 20 || this.y < -20 || this.y > height + 20 || this.life <= 0) {
                    this.reset();
                }
            }

            render() {
                if (this.trail.length < 2) return;

                let lifeRatio = this.life / this.maxLife;
                let alpha = this.baseAlpha * lifeRatio;

                let edgeDist = min(this.x, this.y, width - this.x, height - this.y);
                let dissolveZone = params.dissolution * min(width, height) * 0.4;
                if (edgeDist < dissolveZone && params.dissolution > 0) {
                    alpha *= edgeDist / dissolveZone;
                }

                if (alpha < 0.01) return;

                let cyan = hexToRgb(params.colorCyan);
                let orange = hexToRgb(params.colorOrange);
                let colorMix = this.memoryWeight;

                for (let i = 1; i < this.trail.length; i++) {
                    let segAlpha = alpha * (i / this.trail.length);
                    let r = lerp(orange.r, cyan.r, this.isCyan ? 1 : colorMix * 0.3);
                    let g = lerp(orange.g, cyan.g, this.isCyan ? 1 : colorMix * 0.3);
                    let b = lerp(orange.b, cyan.b, this.isCyan ? 1 : colorMix * 0.3);

                    stroke(r, g, b, segAlpha * 255);
                    strokeWeight(max(0.5, 1.5 * lifeRatio * (i / this.trail.length)));
                    line(this.trail[i - 1].x, this.trail[i - 1].y, this.trail[i].x, this.trail[i].y);
                }
            }
        }

        class MemoryFragment {
            constructor(index) {
                this.index = index;
                let angle = (index / params.fragmentCount) * TWO_PI + random(-0.3, 0.3);
                let dist = random(100, width * 0.35);
                this.x = width / 2 + cos(angle) * dist;
                this.y = height / 2 + sin(angle) * dist;
                this.originX = this.x;
                this.originY = this.y;
                this.size = random(8, 20);
                this.rotation = random(TWO_PI);
                this.rotSpeed = random(-0.01, 0.01);
                this.weight = random(0.5, 1.0);
                this.pulsePhase = random(TWO_PI);
                this.shape = floor(random(3));
                this.driftPhase = random(TWO_PI);
                this.driftRadius = random(10, 30);
            }

            update() {
                this.rotation += this.rotSpeed;
                this.x = this.originX + sin(time * 0.3 + this.driftPhase) * this.driftRadius;
                this.y = this.originY + cos(time * 0.25 + this.driftPhase * 1.3) * this.driftRadius * 0.6;
            }

            render() {
                let pulse = sin(time * 1.5 + this.pulsePhase) * 0.3 + 0.7;
                let alpha = 0.25 * pulse * this.weight;

                push();
                translate(this.x, this.y);
                rotate(this.rotation);

                let cyan = hexToRgb(params.colorCyan);
                let orange = hexToRgb(params.colorOrange);
                let isCyan = this.index % 3 !== 0;
                let r = isCyan ? cyan.r : orange.r;
                let g = isCyan ? cyan.g : orange.g;
                let b = isCyan ? cyan.b : orange.b;

                let glowSize = this.size * 3 * pulse;
                noStroke();
                fill(r, g, b, alpha * 0.15);
                ellipse(0, 0, glowSize * 2, glowSize * 2);

                stroke(r, g, b, alpha * 255);
                strokeWeight(1);
                fill(r, g, b, alpha * 0.3 * 255);

                let s = this.size * (0.8 + pulse * 0.4);

                if (this.shape === 0) {
                    beginShape();
                    for (let i = 0; i < 6; i++) {
                        let a = (TWO_PI / 6) * i - HALF_PI;
                        vertex(cos(a) * s, sin(a) * s);
                    }
                    endShape(CLOSE);
                } else if (this.shape === 1) {
                    beginShape();
                    vertex(0, -s);
                    vertex(s * 0.6, 0);
                    vertex(0, s);
                    vertex(-s * 0.6, 0);
                    endShape(CLOSE);
                } else {
                    beginShape();
                    for (let i = 0; i < 3; i++) {
                        let a = (TWO_PI / 3) * i - HALF_PI;
                        vertex(cos(a) * s, sin(a) * s);
                    }
                    endShape(CLOSE);
                }

                pop();
            }
        }

        function renderConsciousnessCore(breathCycle) {
            let cx = width / 2;
            let cy = height / 2;
            let coreR = 15 + breathCycle * 25;
            let cyan = hexToRgb(params.colorCyan);

            noStroke();
            for (let layer = 4; layer >= 0; layer--) {
                let r = coreR * (1 + layer * 1.5);
                let alpha = (0.02 + breathCycle * 0.03) * (1 - layer * 0.18);
                fill(cyan.r, cyan.g, cyan.b, alpha * 255);
                ellipse(cx, cy, r * 2, r * 2);
            }

            fill(cyan.r, cyan.g, cyan.b, (0.15 + breathCycle * 0.1) * 255);
            ellipse(cx, cy, coreR * 2, coreR * 2);

            fill(255, 255, 255, (0.3 + breathCycle * 0.2) * 255);
            ellipse(cx, cy, coreR * 0.4, coreR * 0.4);

            let armCount = 5;
            let orange = hexToRgb(params.colorOrange);
            for (let arm = 0; arm < armCount; arm++) {
                let baseAngle = (arm / armCount) * TWO_PI + time * 0.15;
                stroke(cyan.r, cyan.g, cyan.b, 20);
                strokeWeight(0.6);
                noFill();
                beginShape();
                for (let d = 20; d < 350; d += 5) {
                    let spiralAngle = baseAngle + d * 0.015 + sin(d * 0.02 + time) * 0.2;
                    let x = cx + cos(spiralAngle) * d;
                    let y = cy + sin(spiralAngle) * d * 0.65;
                    vertex(x, y);
                }
                endShape();
            }
        }

        function renderTimeWarpOverlay() {
            if (params.timeWarp < 0.1) return;

            for (let frag of fragments) {
                let warpR = 80 * params.timeWarp;
                noFill();
                let cyan = hexToRgb(params.colorCyan);
                stroke(cyan.r, cyan.g, cyan.b, 8 * params.timeWarp);
                strokeWeight(0.5);
                ellipse(frag.x, frag.y, warpR * 2, warpR * 2);
                ellipse(frag.x, frag.y, warpR * 1.2, warpR * 1.2);
            }
        }

        function renderDissolutionOverlay() {
            if (params.dissolution < 0.1) return;

            let orange = hexToRgb(params.colorOrange);
            let dissolveWidth = params.dissolution * min(width, height) * 0.25;

            noStroke();
            for (let i = 0; i < 6; i++) {
                let crackAngle = time * 0.05 + i * 1.1;
                let startR = dissolveWidth * 0.3;
                let endR = dissolveWidth;
                let cx = width / 2 + cos(crackAngle) * (width * 0.4);
                let cy = height / 2 + sin(crackAngle) * (height * 0.4);

                let pulse = sin(time * 2 + i * 1.5) * 0.5 + 0.5;
                fill(orange.r, orange.g, orange.b, 5 * params.dissolution * pulse);
                ellipse(cx, cy, dissolveWidth * 2, dissolveWidth * 2);
            }

            for (let i = 0; i < 3; i++) {
                let x = random(width);
                let y = random(height);
                let edgeDist = min(x, y, width - x, height - y);
                if (edgeDist < dissolveWidth) {
                    stroke(orange.r, orange.g, orange.b, 15 * params.dissolution);
                    strokeWeight(0.5);
                    let len = random(10, 40);
                    let angle = random(TWO_PI);
                    line(x, y, x + cos(angle) * len, y + sin(angle) * len);
                }
            }
        }

        function updateParam(paramName, value) {
            let numVal = parseFloat(value);
            params[paramName] = numVal;
            document.getElementById(paramName + '-value').textContent = numVal;
            if (paramName === 'streamCount' || paramName === 'fragmentCount') {
                initializeSystem();
            }
        }

        function updateColor(colorId, value) {
            params[colorId] = value;
            document.getElementById(colorId + '-value').textContent = value;
        }

        function updateSeedDisplay() {
            document.getElementById('seed-input').value = params.seed;
        }

        function updateSeed() {
            let input = document.getElementById('seed-input');
            let newSeed = parseInt(input.value);
            if (newSeed && newSeed > 0) {
                params.seed = newSeed;
                initializeSystem();
            } else {
                updateSeedDisplay();
            }
        }

        function previousSeed() {
            params.seed = Math.max(1, params.seed - 1);
            updateSeedDisplay();
            initializeSystem();
        }

        function nextSeed() {
            params.seed = params.seed + 1;
            updateSeedDisplay();
            initializeSystem();
        }

        function randomSeedAndUpdate() {
            params.seed = Math.floor(Math.random() * 999999) + 1;
            updateSeedDisplay();
            initializeSystem();
        }

        function resetParameters() {
            params = {...defaultParams};
            document.getElementById('streamCount').value = params.streamCount;
            document.getElementById('streamCount-value').textContent = params.streamCount;
            document.getElementById('flowSpeed').value = params.flowSpeed;
            document.getElementById('flowSpeed-value').textContent = params.flowSpeed;
            document.getElementById('noiseScale').value = params.noiseScale;
            document.getElementById('noiseScale-value').textContent = params.noiseScale;
            document.getElementById('fragmentCount').value = params.fragmentCount;
            document.getElementById('fragmentCount-value').textContent = params.fragmentCount;
            document.getElementById('timeWarp').value = params.timeWarp;
            document.getElementById('timeWarp-value').textContent = params.timeWarp;
            document.getElementById('dissolution').value = params.dissolution;
            document.getElementById('dissolution-value').textContent = params.dissolution;
            document.getElementById('breathSpeed').value = params.breathSpeed;
            document.getElementById('breathSpeed-value').textContent = params.breathSpeed;
            document.getElementById('colorBg').value = params.colorBg;
            document.getElementById('colorBg-value').textContent = params.colorBg;
            document.getElementById('colorCyan').value = params.colorCyan;
            document.getElementById('colorCyan-value').textContent = params.colorCyan;
            document.getElementById('colorOrange').value = params.colorOrange;
            document.getElementById('colorOrange-value').textContent = params.colorOrange;
            updateSeedDisplay();
            initializeSystem();
        }

        window.addEventListener('load', function() {
            updateSeedDisplay();
        });
    </script>
</body>
</html>
